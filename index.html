<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio — Выбор фото для заказа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-nav: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #546e7a;
            --border-color: #e9eef2;
            --accent-primary: #007883;
            --accent-hover: #0a6570;
            --accent-light: #d9f0f2;
            --shadow-color: rgba(0, 120, 131, 0.2);
            --price-color: #007883;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-secondary);
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 3px solid var(--accent-primary);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--accent-primary);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-container {
            width: 300px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 50px;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            border: 2px solid var(--accent-primary);
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 0.7rem 0;
            width: 100%;
            outline: none;
        }

        .search-box button {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--accent-primary);
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            color: var(--accent-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-info-bar {
            background: var(--accent-light);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid var(--accent-primary);
        }

        .order-badge {
            background: white;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .main-layout {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Products in order */
        .order-products-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            border-left: 5px solid var(--accent-primary);
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        .order-product-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border-color);
            transition: all 0.2s;
        }

        .order-product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--accent-light);
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .product-sku {
            background: var(--accent-light);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .photo-count-badge {
            background: #f1f5f9;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 600;
        }

        .photo-selection-area {
            margin-top: 1rem;
        }

        .slot-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .slot-title {
            font-weight: 700;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .slot-badge {
            background: var(--accent-primary);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
        }

        .slot-badge.optional {
            background: #94a3b8;
        }

        .assigned-photo {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: white;
            padding: 0.8rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 0.8rem;
        }

        .photo-thumb {
            width: 60px;
            height: 60px;
            background: #e2e8f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow: hidden;
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-number-input {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .photo-number-input input {
            width: 100px;
            padding: 0.6rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
        }

        .btn-small {
            background: var(--accent-light);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .btn-random {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
        }

        .remaining-photos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .photo-number-chip {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .photo-number-chip:hover {
            border-color: var(--accent-primary);
            background: var(--accent-light);
        }

        .photo-number-chip.selected {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 2000;
            display: none;
        }

        .toast-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 0.8rem 1rem;
                flex-direction: column;
            }
            .right-actions {
                width: 100%;
            }
            .search-container {
                width: 100%;
            }
            .main-layout {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="logo">
            <div class="logo-text">WHITE FOX STUDIO</div>
        </div>
        <div class="right-actions">
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="orderNumberInput" placeholder="Order number">
                    <button id="searchOrderBtn">OK</button>
                </div>
            </div>
            <button class="lang-toggle" id="langToggle">
                <span id="lang-icon">🇬🇧</span>
                <span id="lang-text">EN</span>
            </button>
        </div>
    </div>

    <div class="order-info-bar" id="orderInfoBar">
        <span>📦 <strong id="orderNumberDisplay">WF-2412-001</strong></span>
        <span>📸 Total photos: <strong id="totalPhotosInOrder">0</strong></span>
        <span>🎯 Max per product: <strong>30</strong></span>
    </div>

    <div class="main-layout">
        <div class="order-products-section" id="orderProductsContainer">
            <!-- Products from order will be rendered here -->
        </div>
        
        <button class="btn-primary" id="confirmSelectionBtn">✅ Confirm photo selection</button>
    </div>

    <div id="toastMessage" class="toast-message"></div>

    <script>
        // ===================== MOCK ORDER DATA =====================
        // Имитация заказа из базы данных (товары с полем pose = количество фото)
        const mockOrder = {
            orderNumber: "WF-2412-001",
            products: [
                {
                    id: "prod_1",
                    sku: "CAL-2025",
                    name_th: "ปฏิทินตั้งโต๊ะ 2025",
                    name_en: "Desk Calendar 2025",
                    pose: 13,           // количество фото в товаре (13 страниц + обложка?)
                    type: "calendar",
                    requiresCover: true,
                    requiresBack: true
                },
                {
                    id: "prod_2",
                    sku: "PB-ALBUM",
                    name_th: "อัลบั้มภาพ Premium",
                    name_en: "Premium Photo Album",
                    pose: 20,           // 20 фото внутри
                    type: "album",
                    requiresCover: true,
                    requiresBack: true
                },
                {
                    id: "prod_3",
                    sku: "MAG-01",
                    name_th: "นิตยสารปกแข็ง",
                    name_en: "Hardcover Magazine",
                    pose: 30,           // 30 фото (максимум)
                    type: "magazine",
                    requiresCover: true,
                    requiresBack: false  // только обложка
                }
            ]
        };

        // Имитация доступных фото (номера от 1 до 50)
        // Пользователь получает листочек с номерами фото, вводит их вручную
        let availablePhotoNumbers = []; // будет заполняться из ввода пользователя
        
        // Структура для хранения назначений по каждому товару
        let productAssignments = {};

        let currentLang = 'en';
        
        const translations = {
            en: {
                cover: "Cover Photo",
                back: "Back Cover",
                interior: "Interior Photos",
                assignPhoto: "Assign photo #",
                randomFill: "🎲 Random fill remaining",
                enterNumber: "Enter photo number",
                confirm: "Confirm selection",
                toastSuccess: "Selection saved!",
                toastError: "Please enter photo numbers",
                toastDuplicate: "Photo already used",
                toastFull: "All slots filled"
            },
            th: {
                cover: "รูปปก",
                back: "รูปปกหลัง",
                interior: "รูปภายใน",
                assignPhoto: "เลือกรูปหมายเลข",
                randomFill: "🎲 สุ่มรูปที่เหลือ",
                enterNumber: "กรอกหมายเลขรูป",
                confirm: "ยืนยันการเลือก",
                toastSuccess: "บันทึกการเลือกแล้ว!",
                toastError: "กรุณากรอกหมายเลขรูป",
                toastDuplicate: "หมายเลขรูปนี้ถูกใช้แล้ว",
                toastFull: "ครบทุกตำแหน่งแล้ว"
            }
        };

        // Функция для отображения тоста
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Обновление языка
        function updateLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
            
            const langIcon = document.getElementById('lang-icon');
            const langText = document.getElementById('lang-text');
            if (currentLang === 'en') {
                langIcon.textContent = '🇬🇧';
                langText.textContent = 'EN';
            } else {
                langIcon.textContent = '🇹🇭';
                langText.textContent = 'TH';
            }
            
            // Перерендерим товары для обновления текстов
            renderOrderProducts();
        }

        // Инициализация назначений для товаров
        function initAssignments() {
            productAssignments = {};
            mockOrder.products.forEach(product => {
                const totalSlots = product.pose;
                productAssignments[product.id] = {
                    cover: null,
                    back: null,
                    interior: [],      // массив номеров фото
                    usedNumbers: new Set(),
                    totalSlots: totalSlots,
                    requiresCover: product.requiresCover,
                    requiresBack: product.requiresBack
                };
            });
        }

        // Получить все использованные номера в заказе
        function getAllUsedNumbers() {
            const used = new Set();
            Object.values(productAssignments).forEach(assignment => {
                if (assignment.cover) used.add(assignment.cover);
                if (assignment.back) used.add(assignment.back);
                assignment.interior.forEach(n => used.add(n));
            });
            return used;
        }

        // Проверка доступности номера
        function isNumberAvailable(photoNum, productId) {
            const allUsed = getAllUsedNumbers();
            return !allUsed.has(photoNum);
        }

        // Назначить фото на позицию
        function assignPhoto(productId, position, photoNum) {
            const assignment = productAssignments[productId];
            if (!assignment) return false;
            
            // Проверка на дубликат во всем заказе
            if (!isNumberAvailable(photoNum, productId)) {
                showToast(`${translations[currentLang].toastDuplicate}: ${photoNum}`, 'error');
                return false;
            }
            
            // Проверка на максимальное количество
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            if (currentCount >= assignment.totalSlots && position !== 'cover' && position !== 'back') {
                showToast(translations[currentLang].toastFull, 'error');
                return false;
            }
            
            // Удаляем старое назначение если есть
            if (position === 'cover' && assignment.cover) {
                assignment.cover = null;
            }
            if (position === 'back' && assignment.back) {
                assignment.back = null;
            }
            
            // Назначаем новое
            if (position === 'cover') {
                assignment.cover = photoNum;
            } else if (position === 'back') {
                assignment.back = photoNum;
            } else {
                assignment.interior.push(photoNum);
            }
            
            renderOrderProducts();
            return true;
        }

        // Удалить фото с позиции
        function removePhoto(productId, position, index = null) {
            const assignment = productAssignments[productId];
            if (!assignment) return;
            
            if (position === 'cover') {
                assignment.cover = null;
            } else if (position === 'back') {
                assignment.back = null;
            } else if (position === 'interior' && index !== null) {
                assignment.interior.splice(index, 1);
            }
            
            renderOrderProducts();
        }

        // Случайное заполнение оставшихся позиций
        function randomFillRemaining(productId) {
            const assignment = productAssignments[productId];
            if (!assignment) return;
            
            const allUsed = getAllUsedNumbers();
            const availableNumbers = [];
            
            // Доступные номера от 1 до 50, которые не используются
            for (let i = 1; i <= 50; i++) {
                if (!allUsed.has(i)) {
                    availableNumbers.push(i);
                }
            }
            
            // Перемешиваем
            for (let i = availableNumbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableNumbers[i], availableNumbers[j]] = [availableNumbers[j], availableNumbers[i]];
            }
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            const needed = assignment.totalSlots - currentCount;
            
            if (needed <= 0) {
                showToast(translations[currentLang].toastFull, 'error');
                return;
            }
            
            const toAdd = availableNumbers.slice(0, Math.min(needed, availableNumbers.length));
            toAdd.forEach(num => {
                assignment.interior.push(num);
            });
            
            renderOrderProducts();
            showToast(`Added ${toAdd.length} photos to ${assignment.totalSlots - (assignment.cover ? 1 : 0) - (assignment.back ? 1 : 0) - assignment.interior.length} remaining slots`);
        }

        // Сброс всех назначений для товара
        function resetProduct(productId) {
            const assignment = productAssignments[productId];
            if (assignment) {
                assignment.cover = null;
                assignment.back = null;
                assignment.interior = [];
            }
            renderOrderProducts();
        }

        // Рендер товаров заказа
        function renderOrderProducts() {
            const container = document.getElementById('orderProductsContainer');
            if (!container) return;
            
            container.innerHTML = '';
            
            mockOrder.products.forEach(product => {
                const assignment = productAssignments[product.id];
                if (!assignment) return;
                
                const name = currentLang === 'th' ? product.name_th : product.name_en;
                const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
                const remaining = assignment.totalSlots - currentCount;
                
                const productCard = document.createElement('div');
                productCard.className = 'order-product-card';
                productCard.innerHTML = `
                    <div class="order-product-header">
                        <div>
                            <span class="product-name">${name}</span>
                            <span class="product-sku" style="margin-left: 0.8rem;">${product.sku}</span>
                        </div>
                        <div class="photo-count-badge">
                            📷 ${currentCount}/${assignment.totalSlots} photos
                        </div>
                    </div>
                    <div class="photo-selection-area">
                        ${renderSlotSection(product.id, 'cover', assignment.cover, assignment.requiresCover, '📘')}
                        ${renderSlotSection(product.id, 'back', assignment.back, assignment.requiresBack, '📖')}
                        ${renderInteriorSection(product.id, assignment.interior, remaining)}
                        <div style="display: flex; gap: 0.8rem; margin-top: 1rem;">
                            <button class="btn-small btn-random" onclick="randomFillRemaining('${product.id}')" data-i18n="randomFill">🎲 Random fill remaining</button>
                            <button class="btn-small" onclick="resetProduct('${product.id}')" style="background:#fee2e2; color:#c44536;">🗑️ Reset</button>
                        </div>
                    </div>
                `;
                container.appendChild(productCard);
            });
            
            // Обновляем общее количество фото
            const allUsed = getAllUsedNumbers();
            document.getElementById('totalPhotosInOrder').textContent = allUsed.size;
        }
        
        function renderSlotSection(productId, position, assignedNumber, required, icon) {
            const label = translations[currentLang][position] || (position === 'cover' ? 'Cover' : 'Back Cover');
            const isRequired = required;
            
            let content = '';
            if (assignedNumber) {
                content = `
                    <div class="assigned-photo">
                        <div class="photo-thumb">
                            <img src="https://picsum.photos/id/${assignedNumber + 30}/60/60" alt="photo ${assignedNumber}" onerror="this.src='https://placehold.co/60x60?text=${assignedNumber}'">
                        </div>
                        <div style="flex:1">
                            <strong>Photo #${assignedNumber}</strong>
                        </div>
                        <button class="btn-small" onclick="removePhoto('${productId}', '${position}')">✖ Remove</button>
                    </div>
                `;
            } else {
                content = `
                    <div class="photo-number-input">
                        <span>${translations[currentLang].assignPhoto}:</span>
                        <input type="number" id="input-${productId}-${position}" placeholder="${translations[currentLang].enterNumber}" min="1" max="50">
                        <button class="btn-small" onclick="assignFromInput('${productId}', '${position}')">✓ Set</button>
                        ${!required ? '<span style="font-size:0.7rem; color:#94a3b8;">(optional)</span>' : ''}
                    </div>
                `;
            }
            
            return `
                <div class="slot-section">
                    <div class="slot-title">
                        ${icon} ${label}
                        ${isRequired ? '<span class="slot-badge">required</span>' : '<span class="slot-badge optional">optional</span>'}
                    </div>
                    ${content}
                </div>
            `;
        }
        
        function renderInteriorSection(productId, interiorNumbers, remaining) {
            const label = translations[currentLang].interior;
            
            let listHtml = '';
            if (interiorNumbers.length > 0) {
                listHtml = `
                    <div class="remaining-photos-list">
                        ${interiorNumbers.map((num, idx) => `
                            <div class="photo-number-chip">
                                #${num}
                                <button onclick="removePhoto('${productId}', 'interior', ${idx})" style="background:none; border:none; margin-left:6px; cursor:pointer; color:#c44536;">✕</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            return `
                <div class="slot-section">
                    <div class="slot-title">
                        🖼️ ${label}
                        <span class="slot-badge">${interiorNumbers.length} / ${remaining + interiorNumbers.length} filled</span>
                    </div>
                    <div class="photo-number-input" style="margin-bottom: 0.8rem;">
                        <span>➕ Add photo #:</span>
                        <input type="number" id="input-${productId}-interior" placeholder="1-50" min="1" max="50">
                        <button class="btn-small" onclick="addInteriorPhoto('${productId}')">Add</button>
                    </div>
                    ${listHtml}
                    ${remaining > 0 ? `<div style="margin-top: 0.5rem; font-size: 0.75rem; color: #64748b;">⚠️ ${remaining} more photo(s) needed to fill this product</div>` : '<div style="margin-top: 0.5rem; color: #2e7d5e;">✓ All slots filled!</div>'}
                </div>
            `;
        }
        
        // Глобальные функции для вызова из onclick
        window.assignFromInput = function(productId, position) {
            const input = document.getElementById(`input-${productId}-${position}`);
            if (!input) return;
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1 || photoNum > 50) {
                showToast(translations[currentLang].toastError, 'error');
                return;
            }
            if (assignPhoto(productId, position, photoNum)) {
                input.value = '';
            }
        };
        
        window.addInteriorPhoto = function(productId) {
            const input = document.getElementById(`input-${productId}-interior`);
            if (!input) return;
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1 || photoNum > 50) {
                showToast(translations[currentLang].toastError, 'error');
                return;
            }
            if (assignPhoto(productId, 'interior', photoNum)) {
                input.value = '';
            }
        };
        
        window.removePhoto = function(productId, position, index) {
            if (position === 'interior' && index !== undefined) {
                const assignment = productAssignments[productId];
                if (assignment && assignment.interior[index]) {
                    assignment.interior.splice(index, 1);
                    renderOrderProducts();
                }
            } else {
                const assignment = productAssignments[productId];
                if (assignment) {
                    if (position === 'cover') assignment.cover = null;
                    if (position === 'back') assignment.back = null;
                    renderOrderProducts();
                }
            }
        };
        
        window.randomFillRemaining = randomFillRemaining;
        window.resetProduct = resetProduct;
        
        // Подтверждение выбора
        function confirmSelection() {
            const allAssignments = [];
            mockOrder.products.forEach(product => {
                const assignment = productAssignments[product.id];
                const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
                const status = currentCount === assignment.totalSlots ? '✓ Complete' : `⚠️ ${assignment.totalSlots - currentCount} missing`;
                allAssignments.push({
                    product: product.sku,
                    cover: assignment.cover,
                    back: assignment.back,
                    interior: assignment.interior,
                    status: status
                });
            });
            
            console.log('Final selection:', allAssignments);
            showToast(translations[currentLang].toastSuccess);
            alert(JSON.stringify(allAssignments, null, 2));
        }
        
        // Поиск заказа (демо)
        function searchOrder() {
            const orderInput = document.getElementById('orderNumberInput').value.trim();
            if (orderInput) {
                document.getElementById('orderNumberDisplay').textContent = orderInput;
                showToast(`Loaded order: ${orderInput}`, 'success');
            } else {
                showToast('Enter order number', 'error');
            }
        }
        
        // Инициализация
        function init() {
            initAssignments();
            renderOrderProducts();
            
            document.getElementById('langToggle').addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'th' : 'en';
                updateLanguage();
            });
            
            document.getElementById('searchOrderBtn').addEventListener('click', searchOrder);
            document.getElementById('confirmSelectionBtn').addEventListener('click', confirmSelection);
            document.getElementById('orderNumberInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchOrder();
            });
            
            updateLanguage();
        }
        
        init();
    </script>
</body>
</html>
