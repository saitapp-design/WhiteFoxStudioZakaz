<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio - Smart Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        :root {
            --accent-primary: #007883;
            --accent-hover: #0a6570;
            --accent-light: rgba(0, 120, 131, 0.1);
            --accent-soft: #d9f0f2;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0, 120, 131, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-secondary);
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 3px solid var(--accent-primary);
        }

        .top-bar {
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-primary);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 0.1rem 0.1rem 0.1rem 1.5rem;
            border: 2px solid var(--accent-primary);
            height: 48px;
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            width: 250px;
            outline: none;
            font-size: 1rem;
        }

        .search-box button {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--accent-primary);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            color: var(--accent-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 48px;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 120px);
        }

        .login-screen {
            max-width: 500px;
            margin: 3rem auto;
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .login-screen h1 {
            font-size: 2rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }

        .order-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            outline: none;
            text-align: center;
            margin-bottom: 1rem;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .order-header {
            background: white;
            border-radius: 24px;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            border: 2px solid var(--accent-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .order-badge {
            background: var(--accent-soft);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .product-card {
            background: white;
            border-radius: 28px;
            margin-bottom: 1.8rem;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .product-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        .product-header {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            padding: 1.2rem 1.5rem;
            border-bottom: 2px solid var(--accent-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .product-sku-code {
            background: var(--accent-soft);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            font-family: monospace;
            color: var(--accent-primary);
            display: inline-block;
        }

        .product-type-badge {
            background: var(--info);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .product-pose {
            background: #e2e8f0;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .product-stats {
            text-align: right;
        }

        .photos-counter {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .assignment-grid {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        .slot-card {
            background: #fafcff;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid var(--border-color);
        }

        .slot-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .slot-icon {
            font-size: 1.3rem;
        }

        .slot-name {
            font-weight: 700;
            color: var(--text-primary);
        }

        .slot-badge {
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            background: var(--accent-soft);
            color: var(--accent-primary);
        }

        .slot-badge.required {
            background: var(--accent-primary);
            color: white;
        }

        .assigned-photo-card {
            background: var(--accent-soft);
            border-radius: 16px;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .photo-number-large {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent-primary);
        }

        .remove-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--danger);
        }

        .photo-input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .photo-input {
            flex: 1;
            padding: 0.6rem 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 40px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            width: 90px;
        }

        .action-btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        .action-btn-outline {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .interior-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .photo-tag {
            background: var(--accent-soft);
            padding: 0.3rem 0.7rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .photo-tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--danger);
            font-weight: bold;
        }

        .status-message {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            display: inline-block;
        }

        .status-warning {
            background: #fef3c7;
            color: var(--warning);
        }

        .status-success {
            background: #d1fae5;
            color: var(--success);
        }

        .product-footer {
            padding: 1rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        .global-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border-color);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; padding: 0.8rem 1rem; }
            .right-actions { width: 100%; flex-direction: column; }
            .search-box { width: 100%; }
            .search-box input { width: 100%; }
            .lang-toggle { width: 100%; justify-content: center; }
            .main-content { padding: 1rem; }
            .assignment-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <div class="logo-area">
                <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox Studio">
                <span class="logo-text">WHITE FOX STUDIO</span>
            </div>
            <div class="right-actions">
                <div class="search-box">
                    <input type="text" id="orderNumber" placeholder="Order number (1111)" value="1111">
                    <button id="checkOrderBtn">OK</button>
                </div>
                <button class="lang-toggle" id="langToggle">
                    <span id="lang-icon">🇬🇧</span>
                    <span id="lang-text">EN</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content" id="mainContent">
        <div class="login-screen" id="loginScreen">
            <h1 id="title">Enter Order Number</h1>
            <p class="subtitle" id="subtitle">Please enter your order number to select photos</p>
            <input type="text" id="orderNumberInput" class="order-input" placeholder="Enter order number (1111)" value="1111">
            <button class="btn-primary" id="loginBtn">Continue</button>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
        
        let supabaseClient = null;
        let allProducts = [];
        let currentOrder = null;
        let photoAssignments = {};
        
        // Product type detection based on name and pose
        function detectProductType(product) {
            const name = ((product.name_en || '') + ' ' + (product.name_th || '') + ' ' + (product.sku || '')).toLowerCase();
            const pose = product.pose || 0;
            
            // Single photo items (no interior, no back)
            if (pose === 1 || name.includes('canvas') || name.includes('poster') || 
                name.includes('mug') || name.includes('keyring') || name.includes('magnet') ||
                name.includes('card holder') || (name.includes('acrylic') && pose === 1)) {
                return { type: 'single', hasCover: true, hasBack: false, hasInterior: false, label: '📷 Single Photo' };
            }
            
            // Calendar type (has back cover)
            if (name.includes('calendar') || name.includes('ปฏิทิน')) {
                return { type: 'calendar', hasCover: true, hasBack: true, hasInterior: true, label: '📅 Calendar / Album' };
            }
            
            // Book/Album/Package type (has back cover)
            if (name.includes('book') || name.includes('album') || name.includes('package') ||
                name.includes('notebook') || name.includes('magazine') || pose >= 10) {
                return { type: 'book', hasCover: true, hasBack: true, hasInterior: true, label: '📚 Book / Album' };
            }
            
            // Default for multi-photo
            if (pose > 2) {
                return { type: 'multi', hasCover: true, hasBack: true, hasInterior: true, label: '📸 Multi-photo' };
            } else if (pose === 2) {
                return { type: 'double', hasCover: true, hasBack: false, hasInterior: true, label: '🖼️ Double Photo' };
            } else {
                return { type: 'single', hasCover: true, hasBack: false, hasInterior: false, label: '📷 Single Photo' };
            }
        }
        
        const translations = {
            en: {
                title: 'Enter Order Number',
                subtitle: 'Please enter your order number to select photos',
                loginBtn: 'Continue',
                toastError: 'Please enter order number',
                placeholder: 'Enter order number (1111)',
                toastOrderLoaded: '✅ Order loaded! Select photos for each product.',
                toastInvalidCode: 'Demo: Use code 1111',
                toastDuplicate: '⚠️ Photo #{num} already used in this product',
                toastAllFilled: '✓ All slots filled!',
                toastConfirm: '✅ Selection saved!',
                cover: 'Cover / Main Photo',
                back: 'Back Cover',
                interior: 'Interior Photos',
                required: 'required',
                optional: 'optional',
                notApplicable: 'not needed',
                set: 'Set',
                randomFill: '🎲 Random',
                reset: 'Reset',
                confirmAll: '✅ Confirm All Selections',
                backToLogin: '← Back',
                totalPhotos: 'Total photos',
                moreNeeded: 'more needed',
                filled: 'Complete!'
            },
            th: {
                title: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                subtitle: 'กรุณากรอกหมายเลขคำสั่งซื้อเพื่อเลือกรูปภาพ',
                loginBtn: 'ดำเนินการต่อ',
                toastError: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                placeholder: 'กรอกหมายเลขคำสั่งซื้อ (1111)',
                toastOrderLoaded: '✅ โหลดออเดอร์เรียบร้อย! เลือกรูปภาพด้านล่าง',
                toastInvalidCode: 'ทดสอบ: ใช้รหัส 1111',
                toastDuplicate: '⚠️ รูป #{num} ถูกใช้ในสินค้านี้แล้ว',
                toastAllFilled: '✓ ครบทุกตำแหน่งแล้ว!',
                toastConfirm: '✅ บันทึกการเลือกแล้ว!',
                cover: 'รูปปก / รูปหลัก',
                back: 'รูปปกหลัง',
                interior: 'รูปภายใน',
                required: 'จำเป็น',
                optional: 'ไม่จำเป็น',
                notApplicable: 'ไม่ต้องใช้',
                set: 'ตั้งค่า',
                randomFill: '🎲 สุ่ม',
                reset: 'รีเซ็ต',
                confirmAll: '✅ ยืนยันการเลือกทั้งหมด',
                backToLogin: '← กลับ',
                totalPhotos: 'รูปทั้งหมด',
                moreNeeded: 'ต้องเลือกเพิ่ม',
                filled: 'ครบถ้วน!'
            }
        };
        
        let currentLang = 'en';
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function updateLanguage() {
            if (document.getElementById('title')) {
                document.getElementById('title').textContent = translations[currentLang].title;
                document.getElementById('subtitle').textContent = translations[currentLang].subtitle;
                document.getElementById('loginBtn').textContent = translations[currentLang].loginBtn;
                document.getElementById('orderNumberInput').placeholder = translations[currentLang].placeholder;
            }
            const icon = document.getElementById('lang-icon');
            const text = document.getElementById('lang-text');
            icon.textContent = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
            text.textContent = currentLang === 'en' ? 'EN' : 'TH';
            if (currentOrder) renderOrderInterface();
        }
        
        async function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });
            await loadProductsFromSupabase();
            setTimeout(() => {
                if (document.getElementById('orderNumberInput')?.value === '1111') {
                    checkOrder();
                }
            }, 500);
        }
        
        async function loadProductsFromSupabase() {
            try {
                const { data: productCards } = await supabaseClient.from('product_cards').select('*');
                const { data: packages } = await supabaseClient.from('packages_with_price').select('*');
                
                allProducts = [];
                
                if (productCards) {
                    productCards.forEach(card => {
                        let pose = 0;
                        try {
                            if (card.variants) {
                                const vars = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                                if (vars[0]?.pose) pose = parseInt(vars[0].pose);
                            }
                        } catch(e) {}
                        if (!pose && card.pose) pose = parseInt(card.pose);
                        if (!pose && card.total_photos) pose = parseInt(card.total_photos);
                        
                        allProducts.push({
                            sku: card.sku || `card_${card.id}`,
                            name_en: card.name_en,
                            name_th: card.name_th,
                            pose: pose || 0
                        });
                    });
                }
                
                if (packages) {
                    packages.forEach(pkg => {
                        let total = pkg.total_photos || 0;
                        if (!total && pkg.contents) {
                            try {
                                const contents = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                                total = contents.reduce((s, i) => s + (i.qty || 1), 0);
                            } catch(e) {}
                        }
                        allProducts.push({
                            sku: pkg.sku || `pkg_${pkg.id}`,
                            name_en: pkg.name_en,
                            name_th: pkg.name_th,
                            pose: total || 0
                        });
                    });
                }
                
                console.log('✅ Products loaded:', allProducts.map(p => ({ sku: p.sku, name: p.name_en, pose: p.pose })));
            } catch(e) { 
                console.error('Error loading products:', e);
            }
        }
        
        async function checkOrder() {
            const code = document.getElementById('orderNumberInput')?.value.trim() || document.getElementById('orderNumber')?.value.trim();
            if (!code) { showToast(translations[currentLang].toastError); return; }
            if (code === '1111') {
                await loadDemoOrder();
                renderOrderInterface();
                showToast(translations[currentLang].toastOrderLoaded);
            } else {
                showToast(translations[currentLang].toastInvalidCode);
            }
        }
        
        async function loadDemoOrder() {
            // Find 3 different products from Supabase
            const items = [];
            
            // Find Package S (Q11 or similar)
            let packageProduct = allProducts.find(p => p.sku === 'Q11' || (p.name_en && p.name_en.includes('Package')));
            if (!packageProduct) {
                packageProduct = allProducts.find(p => p.pose >= 6 && p.pose <= 15);
            }
            
            // Find Calendar product
            let calendarProduct = allProducts.find(p => p.name_en && (p.name_en.includes('CALENDAR') || p.name_en.includes('ปฏิทิน')));
            if (!calendarProduct) {
                calendarProduct = allProducts.find(p => p.pose >= 13 && p.pose <= 30);
            }
            
            // Find Canvas or Single photo product
            let canvasProduct = allProducts.find(p => p.name_en && p.name_en.includes('CANVAS'));
            if (!canvasProduct) {
                canvasProduct = allProducts.find(p => p.pose === 1);
            }
            
            if (packageProduct) {
                items.push({
                    sku: packageProduct.sku,
                    name: packageProduct.name_en || packageProduct.name_th || 'Package Product',
                    pose: packageProduct.pose || 6,
                    productType: detectProductType(packageProduct)
                });
                console.log(`✅ Added: ${packageProduct.name_en || packageProduct.name_th} (${packageProduct.sku}) - ${packageProduct.pose} photos`);
            }
            
            if (calendarProduct) {
                items.push({
                    sku: calendarProduct.sku,
                    name: calendarProduct.name_en || calendarProduct.name_th || 'Calendar',
                    pose: calendarProduct.pose || 13,
                    productType: detectProductType(calendarProduct)
                });
                console.log(`✅ Added: ${calendarProduct.name_en || calendarProduct.name_th} (${calendarProduct.sku}) - ${calendarProduct.pose} photos`);
            }
            
            if (canvasProduct) {
                items.push({
                    sku: canvasProduct.sku,
                    name: canvasProduct.name_en || canvasProduct.name_th || 'Canvas / Photo',
                    pose: canvasProduct.pose || 1,
                    productType: detectProductType(canvasProduct)
                });
                console.log(`✅ Added: ${canvasProduct.name_en || canvasProduct.name_th} (${canvasProduct.sku}) - ${canvasProduct.pose} photos`);
            }
            
            // If we couldn't find 3 products, add some defaults
            if (items.length < 3) {
                const defaults = [
                    { sku: 'PKG-001', name: 'Package Set', pose: 6, productType: { type: 'book', hasCover: true, hasBack: true, hasInterior: true, label: '📚 Package' } },
                    { sku: 'CAL-2025', name: 'Desk Calendar', pose: 13, productType: { type: 'calendar', hasCover: true, hasBack: true, hasInterior: true, label: '📅 Calendar' } },
                    { sku: 'CANVAS-01', name: 'Canvas Print', pose: 1, productType: { type: 'single', hasCover: true, hasBack: false, hasInterior: false, label: '🖼️ Canvas' } }
                ];
                
                for (let i = items.length; i < 3; i++) {
                    if (defaults[i]) {
                        items.push(defaults[i]);
                    }
                }
            }
            
            currentOrder = { number: '1111', items: items };
            
            photoAssignments = {};
            items.forEach(item => {
                const safeSku = (item.sku || `product_${Date.now()}_${Math.random()}`).replace(/[^a-zA-Z0-9]/g, '_');
                photoAssignments[safeSku] = {
                    cover: null,
                    back: null,
                    interior: [],
                    total: item.pose,
                    name: item.name,
                    sku: item.sku,
                    originalSku: safeSku,
                    productType: item.productType
                };
            });
        }
        
        function isPhotoUsedInProduct(sku, num, exclude = null) {
            const a = photoAssignments[sku];
            if (!a) return false;
            if (exclude !== 'cover' && a.cover === num) return true;
            if (exclude !== 'back' && a.back === num) return true;
            return a.interior.includes(num);
        }
        
        function setPhoto(sku, pos, num) {
            const a = photoAssignments[sku];
            if (!a) return false;
            if (isPhotoUsedInProduct(sku, num, pos)) {
                showToast(translations[currentLang].toastDuplicate.replace('{num}', num));
                return false;
            }
            const count = (a.cover ? 1 : 0) + (a.back ? 1 : 0) + a.interior.length;
            if (count >= a.total) { showToast(translations[currentLang].toastAllFilled); return false; }
            if (pos === 'cover') a.cover = num;
            else if (pos === 'back') a.back = num;
            renderOrderInterface();
            return true;
        }
        
        function addInterior(sku, num) {
            const a = photoAssignments[sku];
            if (!a) return false;
            if (!a.productType.hasInterior) {
                showToast('This product does not have interior photos');
                return false;
            }
            if (isPhotoUsedInProduct(sku, num)) {
                showToast(translations[currentLang].toastDuplicate.replace('{num}', num));
                return false;
            }
            const count = (a.cover ? 1 : 0) + (a.back ? 1 : 0) + a.interior.length;
            if (count >= a.total) { showToast(translations[currentLang].toastAllFilled); return false; }
            a.interior.push(num);
            renderOrderInterface();
            return true;
        }
        
        function removePhoto(sku, pos, idx = null) {
            const a = photoAssignments[sku];
            if (!a) return;
            if (pos === 'cover') a.cover = null;
            else if (pos === 'back') a.back = null;
            else if (pos === 'interior' && idx !== null) a.interior.splice(idx, 1);
            renderOrderInterface();
        }
        
        function randomFill(sku) {
            const a = photoAssignments[sku];
            if (!a || !a.productType.hasInterior) return;
            
            const used = new Set();
            if (a.cover) used.add(a.cover);
            if (a.back) used.add(a.back);
            a.interior.forEach(n => used.add(n));
            const current = used.size;
            const need = a.total - current;
            if (need <= 0) { showToast(translations[currentLang].toastAllFilled); return; }
            
            const available = [];
            for (let i = 1; i <= 500; i++) if (!used.has(i)) available.push(i);
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            const added = available.slice(0, need);
            added.forEach(n => a.interior.push(n));
            renderOrderInterface();
            showToast(`Added ${added.length} random photos`);
        }
        
        function resetProduct(sku) {
            const a = photoAssignments[sku];
            if (a) { a.cover = null; a.back = null; a.interior = []; }
            renderOrderInterface();
        }
        
        function confirmAll() {
            let summary = '📸 PHOTO SELECTION CONFIRMED\n\n';
            for (const [sku, a] of Object.entries(photoAssignments)) {
                summary += `━━━ ${a.name} (${a.sku}) ━━━\n`;
                summary += `📘 ${translations[currentLang].cover}: ${a.cover || '❌ NOT SET'}\n`;
                if (a.productType.hasBack) {
                    summary += `📖 ${translations[currentLang].back}: ${a.back || '❌ NOT SET'}\n`;
                }
                if (a.productType.hasInterior) {
                    const interiorCount = a.total - (a.cover ? 1 : 0) - (a.back ? 1 : 0);
                    summary += `🖼️ ${translations[currentLang].interior} (${a.interior.length}/${interiorCount}): `;
                    if (a.interior.length) summary += `${a.interior.join(', ')}\n`;
                    else summary += 'none\n';
                }
                summary += '\n';
            }
            alert(summary);
            showToast(translations[currentLang].toastConfirm);
        }
        
        function backToLogin() {
            currentOrder = null;
            document.getElementById('mainContent').innerHTML = `
                <div class="login-screen">
                    <h1 id="title">${translations[currentLang].title}</h1>
                    <p class="subtitle">${translations[currentLang].subtitle}</p>
                    <input type="text" id="orderNumberInput" class="order-input" placeholder="${translations[currentLang].placeholder}" value="1111">
                    <button class="btn-primary" id="loginBtn">${translations[currentLang].loginBtn}</button>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', checkOrder);
            document.getElementById('orderNumberInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkOrder(); });
        }
        
        function renderOrderInterface() {
            const t = translations[currentLang];
            let totalSlots = 0, totalFilled = 0;
            let productsHtml = '';
            
            for (const [sku, a] of Object.entries(photoAssignments)) {
                const used = (a.cover?1:0) + (a.back?1:0) + a.interior.length;
                totalSlots += a.total;
                totalFilled += used;
                const remain = a.total - used;
                const safeSku = sku.replace(/[^a-zA-Z0-9]/g, '_');
                const productType = a.productType;
                
                productsHtml += `
                    <div class="product-card">
                        <div class="product-header">
                            <div class="product-info">
                                <div class="product-name">${escapeHtml(a.name)}</div>
                                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.3rem;">
                                    <span class="product-sku-code">${escapeHtml(a.sku || 'N/A')}</span>
                                    <span class="product-type-badge">${productType.label}</span>
                                    <span class="product-pose">📷 ${a.total} photos</span>
                                </div>
                            </div>
                            <div class="product-stats">
                                <div class="photos-counter">${used}/${a.total}</div>
                                <div class="photos-label">${t.totalPhotos}</div>
                            </div>
                        </div>
                        
                        <div class="assignment-grid">
                            <!-- Cover - always required -->
                            <div class="slot-card">
                                <div class="slot-title">
                                    <span class="slot-icon">📘</span>
                                    <span class="slot-name">${t.cover}</span>
                                    <span class="slot-badge required">${t.required}</span>
                                </div>
                                ${a.cover ? `
                                    <div class="assigned-photo-card">
                                        <span class="photo-number-large">#${a.cover}</span>
                                        <button class="remove-btn" onclick="removePhoto('${sku}', 'cover')">✕</button>
                                    </div>
                                ` : `
                                    <div class="photo-input-wrapper">
                                        <input type="number" id="cover-in-${safeSku}" class="photo-input" placeholder="#" min="1">
                                        <button class="action-btn" onclick="setFromInput('${sku}', 'cover')">${t.set}</button>
                                    </div>
                                `}
                            </div>
                            
                            <!-- Back Cover - only if needed -->
                            ${productType.hasBack ? `
                            <div class="slot-card">
                                <div class="slot-title">
                                    <span class="slot-icon">📖</span>
                                    <span class="slot-name">${t.back}</span>
                                    <span class="slot-badge">${t.optional}</span>
                                </div>
                                ${a.back ? `
                                    <div class="assigned-photo-card">
                                        <span class="photo-number-large">#${a.back}</span>
                                        <button class="remove-btn" onclick="removePhoto('${sku}', 'back')">✕</button>
                                    </div>
                                ` : `
                                    <div class="photo-input-wrapper">
                                        <input type="number" id="back-in-${safeSku}" class="photo-input" placeholder="#" min="1">
                                        <button class="action-btn" onclick="setFromInput('${sku}', 'back')">${t.set}</button>
                                    </div>
                                `}
                            </div>
                            ` : `
                            <div class="slot-card" style="background: #f1f5f9; opacity: 0.7;">
                                <div class="slot-title">
                                    <span class="slot-icon">📖</span>
                                    <span class="slot-name">${t.back}</span>
                                    <span class="slot-badge">${t.notApplicable}</span>
                                </div>
                                <div style="padding: 0.5rem; text-align: center; color: var(--text-muted); font-size: 0.8rem;">
                                    ⚡ ${t.notApplicable} for this product
                                </div>
                            </div>
                            `}
                            
                            <!-- Interior Photos - only if needed -->
                            ${productType.hasInterior ? `
                            <div class="slot-card">
                                <div class="slot-title">
                                    <span class="slot-icon">🖼️</span>
                                    <span class="slot-name">${t.interior}</span>
                                    <span class="slot-badge">${a.interior.length}/${a.total - (a.cover?1:0) - (a.back?1:0)}</span>
                                </div>
                                <div class="photo-input-wrapper" style="margin-bottom: 0.6rem;">
                                    <input type="number" id="int-in-${safeSku}" class="photo-input" placeholder="#" min="1">
                                    <button class="action-btn" onclick="addFromInput('${sku}')">${t.set}</button>
                                    <button class="action-btn-outline" onclick="randomFill('${sku}')">${t.randomFill}</button>
                                </div>
                                <div class="interior-list">
                                    ${a.interior.map((num, idx) => `
                                        <div class="photo-tag">
                                            #${num}
                                            <button onclick="removePhoto('${sku}', 'interior', ${idx})">✕</button>
                                        </div>
                                    `).join('')}
                                </div>
                                ${remain > 0 ? `<div class="status-message status-warning">⚠️ ${remain} ${t.moreNeeded}</div>` : `<div class="status-message status-success">✓ ${t.filled}</div>`}
                            </div>
                            ` : `
                            <div class="slot-card" style="background: #f1f5f9; opacity: 0.7;">
                                <div class="slot-title">
                                    <span class="slot-icon">🖼️</span>
                                    <span class="slot-name">${t.interior}</span>
                                    <span class="slot-badge">${t.notApplicable}</span>
                                </div>
                                <div style="padding: 0.5rem; text-align: center; color: var(--text-muted); font-size: 0.8rem;">
                                    ⚡ Single photo product - no interior pages
                                </div>
                            </div>
                            `}
                        </div>
                        
                        <div class="product-footer">
                            <button class="action-btn-outline" onclick="resetProduct('${sku}')">🔄 ${t.reset}</button>
                        </div>
                    </div>
                `;
            }
            
            const percent = totalSlots > 0 ? Math.round((totalFilled / totalSlots) * 100) : 0;
            
            document.getElementById('mainContent').innerHTML = `
                <div class="order-header">
                    <div class="order-badge">📦 Order: <strong>${currentOrder.number}</strong></div>
                    <div class="order-badge">🎯 ${totalFilled}/${totalSlots} photos selected (${percent}%)</div>
                    <button class="back-btn" id="backBtn">${t.backToLogin}</button>
                </div>
                ${productsHtml}
                <div class="global-actions">
                    <button class="btn-primary" id="confirmBtn" style="width: auto; padding: 0.8rem 2rem;">${t.confirmAll}</button>
                </div>
            `;
            
            document.getElementById('backBtn')?.addEventListener('click', backToLogin);
            document.getElementById('confirmBtn')?.addEventListener('click', confirmAll);
        }
        
        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        window.setFromInput = function(sku, pos) {
            const safe = sku.replace(/[^a-zA-Z0-9]/g, '_');
            const input = document.getElementById(`${pos}-in-${safe}`);
            if (!input) return;
            const num = parseInt(input.value);
            if (isNaN(num) || num < 1) { showToast('Enter valid number'); return; }
            if (setPhoto(sku, pos, num)) input.value = '';
        };
        
        window.addFromInput = function(sku) {
            const safe = sku.replace(/[^a-zA-Z0-9]/g, '_');
            const input = document.getElementById(`int-in-${safe}`);
            if (!input) return;
            const num = parseInt(input.value);
            if (isNaN(num) || num < 1) { showToast('Enter valid number'); return; }
            if (addInterior(sku, num)) input.value = '';
        };
        
        window.removePhoto = removePhoto;
        window.randomFill = randomFill;
        window.resetProduct = resetProduct;
        
        document.getElementById('langToggle').addEventListener('click', () => { currentLang = currentLang === 'en' ? 'th' : 'en'; updateLanguage(); });
        document.getElementById('checkOrderBtn').addEventListener('click', checkOrder);
        document.getElementById('orderNumber').addEventListener('keypress', e => { if (e.key === 'Enter') checkOrder(); });
        
        updateLanguage();
        initSupabase();
    </script>
</body>
</html>
