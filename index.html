<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        :root {
            --teal: #007883;
            --teal-dark: #0a6570;
            --teal-light: #d4e9ec;
            --border: #e2e8f0;
            --red: #dc2626;
            --red-light: #fee2e2;
            --slot-filled: #c8e6df;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 10px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 42px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 170px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.2rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 42px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 1rem 0;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .order-header {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 4px 12px rgba(0,120,131,0.1);
        }

        .product-header {
            padding: 0.8rem 1rem;
            background: #fafcfd;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .product-info {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex: 1;
        }

        .product-sku {
            background: var(--teal-light);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--teal);
            font-family: monospace;
        }

        .product-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--teal);
        }

        .badge-auto {
            background: var(--red-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--red);
            font-weight: 500;
        }

        .product-image {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
            background: #f5f5f5;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .slots-row {
            padding: 1rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .slot-group {
            background: #fafcff;
            border-radius: 1rem;
            padding: 0.8rem;
            border: 1px solid var(--border);
            min-width: 200px;
            flex: 1 1 auto;
        }

        .slot-group-title {
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--teal);
            margin-bottom: 0.6rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid var(--teal-light);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .slot-group-badge {
            font-size: 0.6rem;
            background: var(--teal-light);
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
        }

        .slot-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .oval {
            border-radius: 40px;
            background: white;
            border: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: all 0.15s;
            height: 42px;
            padding: 0 0.5rem;
            min-width: 70px;
        }

        .oval:hover {
            border-color: var(--teal-dark);
            background: #f0f9fa;
        }

        .oval.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .oval.disabled {
            background: #eef2f5;
            border-color: #cbd5e1;
            cursor: not-allowed;
            color: #94a3b8;
        }

        .oval.disabled:hover {
            background: #eef2f5;
        }

        .oval-input {
            border-radius: 40px;
            border: 2px solid var(--teal);
            background: white;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            outline: none;
            font-family: monospace;
            height: 42px;
            padding: 0 0.5rem;
            min-width: 70px;
        }

        .slot-number {
            font-size: 0.55rem;
            font-weight: 500;
            color: #8b9aab;
        }

        .auto-note {
            font-size: 0.55rem;
            font-weight: 500;
            color: var(--red);
            background: var(--red-light);
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
        }

        .note-disabled {
            font-size: 0.55rem;
            font-weight: 500;
            color: #6c757d;
            background: #e9ecef;
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
        }

        .global-actions {
            margin-top: 1.2rem;
            display: flex;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
        }

        @media (max-width: 700px) {
            .slots-row { gap: 0.8rem; justify-content: center; }
            .oval { height: 38px; font-size: 0.75rem; min-width: 60px; }
            .product-image { width: 45px; height: 45px; }
            .slot-group { min-width: 100%; }
            .toast { white-space: normal; max-width: 90vw; text-align: center; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox">
            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="right-actions">
            <div class="search-box">
                <input type="text" id="orderInput" placeholder="Order number" value="1111">
                <button id="checkBtn">OK</button>
            </div>
            <button class="lang-toggle" id="langBtn">
                <span id="langIcon">🇬🇧</span>
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>

<script>
    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;
    
    // ======================== ПАКЕТЫ (точная структура по ТЗ) ========================
    // Для каждого элемента указан selectable: true/false, изображение, размер, количество
    const PACKAGES_DATA = {
        "Q1": {
            sku: "Q1",
            name_en: "Package S",
            name_th: "แพ็คเกจ S",
            image: "https://disk.yandex.ru/i/l7Pizr2T-VrhvA",
            items: [
                { name_en: "Class Serious + Logo", name_th: "คลาสซีเรียส + โลโก้", size: "6x9 inch", qty: 1, selectable: false, image: "https://disk.yandex.ru/i/l7Pizr2T-VrhvA" },
                { name_en: "Individual + Logo", name_th: "รายบุคคล + โลโก้", size: "4x6 inch", qty: 1, selectable: true, image: "https://disk.yandex.ru/i/3D5xeSTEbfPNnQ" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "4x6 inch", qty: 4, selectable: true, image: "https://disk.yandex.ru/i/VgSC9iejFJjQ0g" }
            ]
        },
        "Q2": {
            sku: "Q2",
            name_en: "Package M",
            name_th: "แพ็คเกจ M",
            image: "https://disk.yandex.ru/i/l7Pizr2T-VrhvA",
            items: [
                { name_en: "Class Serious + Logo", name_th: "คลาสซีเรียส + โลโก้", size: "6x9 inch", qty: 1, selectable: false, image: "https://disk.yandex.ru/i/l7Pizr2T-VrhvA" },
                { name_en: "Class Sabai", name_th: "คลาสสบาย", size: "6x9 inch", qty: 1, selectable: false, image: "https://disk.yandex.ru/i/pR07jYALAaReFg" },
                { name_en: "Individual + Logo", name_th: "รายบุคคล + โลโก้", size: "6x9 inch", qty: 1, selectable: true, image: "https://disk.yandex.ru/i/R5-f_PglDSVPXQ" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "4x6 inch", qty: 8, selectable: true, image: "https://disk.yandex.ru/i/VgSC9iejFJjQ0g" }
            ]
        },
        "Q3": {
            sku: "Q3",
            name_en: "Package L",
            name_th: "แพ็คเกจ L",
            image: "https://disk.yandex.ru/i/dVjjX6wW7PC-9A",
            items: [
                { name_en: "Class Serious + Logo", name_th: "คลาสซีเรียส + โลโก้", size: "8x12 inch", qty: 1, selectable: false, image: "https://disk.yandex.ru/i/dVjjX6wW7PC-9A" },
                { name_en: "Individual + Logo", name_th: "รายบุคคล + โลโก้", size: "6x9 inch", qty: 1, selectable: true, image: "https://disk.yandex.ru/i/R5-f_PglDSVPXQ" },
                { name_en: "Class Sabai", name_th: "คลาสสบาย", size: "6x9 inch", qty: 1, selectable: false, image: "https://disk.yandex.ru/i/pR07jYALAaReFg" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "6x9 inch", qty: 1, selectable: true, image: "https://disk.yandex.ru/i/hJ6wp8pmLdMrGw" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "4x6 inch", qty: 10, selectable: true, image: "https://disk.yandex.ru/i/VgSC9iejFJjQ0g" }
            ]
        }
    };
    
    // Конвертер ссылок Яндекс.Диск для прямого отображения (превью)
    function getYandexDirectUrl(diskUrl) {
        if (!diskUrl) return null;
        // Если ссылка уже прямая или содержит /i/ — используем как есть (но для диска нужен особый формат)
        // Яндекс.Диск ссылки вида https://disk.yandex.ru/i/XXX — нельзя просто вставить в img.
        // Чтобы отобразить изображение, используем публичную ссылку через api или прямой превью.
        // Решение: используем стандартный превью-прокси: https://getfile.dokpub.com/yandex/get/ + код
        // Альтернативно: парсим ID и вставляем в ссылку просмотра. Для демо: покажем иконку, но откроется модалка с оригинальным URL.
        // Поскольку прямые ссылки не работают без авторизации, мы откроем модальное окно с ссылкой на страницу диска.
        // Но в ТЗ нужно "чтобы в начале была картинка из яндекс диска и чтобы всё нормально отображалось".
        // Сделаем: для превью используем placeholder, но по клику открывается страница диска в новой вкладке? Лучше открыть полноценный просмотр.
        // Для корректного отображения картинки используем сервис превью (публичный метод). Создадим функцию формирования миниатюры.
        // Яндекс позволяет вставить превью через https://yastatic.net/disk/pic-preview?url=...
        if (diskUrl.includes('disk.yandex.ru/i/')) {
            const fileId = diskUrl.split('/i/')[1];
            if (fileId) return `https://yastatic.net/disk/pic-preview?url=${encodeURIComponent(diskUrl)}&size=s`;
        }
        if (diskUrl.includes('disk.yandex.ru/d/')) {
            const fileId = diskUrl.split('/d/')[1];
            if (fileId) return `https://yastatic.net/disk/pic-preview?url=${encodeURIComponent(diskUrl)}&size=s`;
        }
        return diskUrl;
    }
    
    // Для модального окна: открываем прямую ссылку на Яндекс.Диск в новом окне или показываем предупреждение, 
    // потому что прямые изображения недоступны. По ТЗ сделаем: при клике на картинку откроется модальное окно с iframe или ссылка.
    // Реализуем: показываем изображение через встроенную Яндекс.Картинку? Лучше: открываем ссылку диска в новой вкладке.
    function showImageModal(diskUrl, productName) {
        if (!diskUrl) { toast("Image not available"); return; }
        // Создаём модальное окно с iframe (просмотр Яндекс.Диска)
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        const content = document.createElement('div');
        content.style.background = '#fff';
        content.style.borderRadius = '16px';
        content.style.padding = '1rem';
        content.style.maxWidth = '90vw';
        content.style.maxHeight = '90vh';
        content.style.overflow = 'auto';
        content.style.position = 'relative';
        
        const title = document.createElement('div');
        title.style.fontWeight = 'bold';
        title.style.marginBottom = '10px';
        title.style.color = '#007883';
        title.innerText = productName;
        
        const img = document.createElement('img');
        // Попытка получить превью-ссылку для отображения внутри модалки
        const previewUrl = getYandexDirectUrl(diskUrl);
        if (previewUrl && previewUrl.includes('yastatic')) {
            img.src = previewUrl;
        } else {
            // Если не удалось, ставим заглушку и ссылку
            img.src = "https://placehold.co/400x300?text=Preview+not+available";
        }
        img.style.maxWidth = '100%';
        img.style.borderRadius = '8px';
        img.style.marginBottom = '12px';
        img.alt = productName;
        
        const linkBtn = document.createElement('a');
        linkBtn.href = diskUrl;
        linkBtn.target = '_blank';
        linkBtn.innerText = '📂 Open on Yandex Disk';
        linkBtn.style.display = 'inline-block';
        linkBtn.style.marginTop = '8px';
        linkBtn.style.padding = '6px 12px';
        linkBtn.style.backgroundColor = '#007883';
        linkBtn.style.color = 'white';
        linkBtn.style.borderRadius = '30px';
        linkBtn.style.textDecoration = 'none';
        linkBtn.style.fontSize = '0.8rem';
        
        content.appendChild(title);
        content.appendChild(img);
        content.appendChild(linkBtn);
        modal.appendChild(content);
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        document.body.appendChild(modal);
    }
    
    let currentLang = 'en';
    let currentOrder = null;
    let assignments = {};   // { prodKey: { slots: {...}, isPackage, sku, nameEn, nameTh, image } }
    let editingSlot = null;
    
    const trans = {
        en: { 
            enter: "Enter Order Number", btn: "Continue", invalid: "Use code 1111", 
            ok: "✓ Order loaded", dup: "⚠️ Photo already used in this slot group", 
            range: `Use ${MIN_PHOTO}–${MAX_PHOTO}`, saved: "✓ Changes saved", back: "← Back", 
            notSelectable: "Fixed image", loading: "Loading packages...", error: "Error",
            viewPhoto: "View image", size: "Size", photos: "photos"
        },
        th: { 
            enter: "กรอกหมายเลขคำสั่งซื้อ", btn: "ดำเนินการ", invalid: "ใช้รหัส 1111", 
            ok: "✓ โหลดสำเร็จ", dup: "⚠️ หมายเลขรูปซ้ำในชุดเดียวกัน", range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, 
            saved: "✓ บันทึกแล้ว", back: "← กลับ", notSelectable: "รูปประจำแพ็ค", loading: "กำลังโหลดแพ็คเกจ...",
            error: "เกิดข้อผิดพลาด", viewPhoto: "ดูรูปสินค้า", size: "ขนาด", photos: "รูป"
        }
    };
    
    function t(key) { return trans[currentLang][key] || trans.en[key]; }
    
    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2800);
    }
    
    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO; }
    
    // Проверка дубликата в пределах одного слота (группы)
    function isUsedInSlotGroup(prodKey, slotKey, idx, num) {
        const a = assignments[prodKey];
        if (!a || !a.slots) return false;
        const slot = a.slots[slotKey];
        if (!slot) return false;
        for (let i = 0; i < slot.values.length; i++) {
            if (i !== idx && slot.values[i] === num) return true;
        }
        return false;
    }
    
    function setPackageSlotValue(prodKey, slotKey, idx, val) {
        const a = assignments[prodKey];
        if (!a || !a.isPackage) return false;
        const slot = a.slots[slotKey];
        if (!slot || slot.selectable === false) return false;
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInSlotGroup(prodKey, slotKey, idx, val)) { toast(t('dup')); return false; }
        slot.values[idx] = val;
        render();
        return true;
    }
    
    function getOvalWidth(poseCount) {
        if (poseCount <= 2) return 85;
        if (poseCount <= 4) return 80;
        if (poseCount <= 6) return 75;
        return 70;
    }
    
    function loadPackagesOrder() {
        if (!PACKAGES_DATA) return;
        const packagesList = Object.keys(PACKAGES_DATA).map(sku => PACKAGES_DATA[sku]);
        currentOrder = { number: "1111", products: packagesList };
        assignments = {};
        
        for (let pkg of packagesList) {
            const prodKey = `pkg_${pkg.sku}_${Date.now()}_${Math.random()}`;
            const slots = {};
            for (let item of pkg.items) {
                const slotKey = `slot_${item.name_en.replace(/\s/g, '_')}_${item.size.replace(/\s/g, '')}`;
                slots[slotKey] = {
                    name_en: item.name_en,
                    name_th: item.name_th,
                    size: item.size,
                    qty: item.qty,
                    selectable: item.selectable,
                    image: item.image || null,
                    values: new Array(item.qty).fill(null)
                };
            }
            assignments[prodKey] = {
                key: prodKey,
                sku: pkg.sku,
                nameEn: pkg.name_en,
                nameTh: pkg.name_th,
                isPackage: true,
                slots: slots,
                image: pkg.image
            };
        }
        render();
        toast(t('ok'));
    }
    
    function handleOvalClick(prodKey, slotKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || !a.isPackage) return;
        const slot = a.slots[slotKey];
        if (!slot || !slot.selectable) return;
        
        const ovalDiv = document.getElementById(`oval_${prodKey}_${slotKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${slotKey}_${idx}`) return;
        
        const width = ovalDiv.offsetWidth;
        const height = ovalDiv.offsetHeight;
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${width}px`;
        input.style.height = `${height}px`;
        
        ovalDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value, 10);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setPackageSlotValue(prodKey, slotKey, idx, newVal);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });
        editingSlot = `${prodKey}_${slotKey}_${idx}`;
    }
    
    function render() {
        const container = document.getElementById('app');
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card">
                <h3>${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadPackagesOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            if (a.isPackage) {
                for (let slot of Object.values(a.slots)) {
                    totalSlots += slot.values.length;
                    totalFilled += slot.values.filter(v => v !== null).length;
                }
            }
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ${currentOrder.number}</div>
            <div class="order-badge">📸 ${totalFilled}/${totalSlots}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const pkgImageUrl = asgn.image ? asgn.image : null;
            
            html += `<div class="product-card">
                <div class="product-header">
                    <div class="product-info">
                        <span class="product-sku">${asgn.sku}</span>
                        <span class="product-title">${name}</span>
                        <span class="badge-auto">📦 Package</span>
                    </div>
                    ${pkgImageUrl ? `<img class="product-image" src="https://placehold.co/55x55/teal/white?text=WF" data-pkg-img="${asgn.sku}" data-original="${pkgImageUrl}" onerror="this.src='https://placehold.co/55x55?text=Preview'" title="${t('viewPhoto')}">` : ''}
                </div>
                <div class="slots-row">`;
            
            for (let [slotKey, slot] of Object.entries(asgn.slots)) {
                const slotName = currentLang === 'en' ? slot.name_en : slot.name_th;
                const slotSize = slot.size;
                const isSelectable = slot.selectable;
                const ovalWidth = getOvalWidth(slot.qty);
                const ovalHeight = 42;
                
                // Иконка для слота (если есть изображение)
                const slotImg = slot.image ? slot.image : null;
                
                html += `<div class="slot-group">
                    <div class="slot-group-title">
                        <span>📷 ${slotName}</span>
                        <span class="slot-group-badge">${slotSize} • ${slot.qty} ${t('photos')}</span>
                    </div>
                    <div class="slot-items">`;
                
                for (let i = 0; i < slot.qty; i++) {
                    const val = slot.values[i];
                    const isFilled = val !== null;
                    
                    if (isSelectable) {
                        html += `<div class="slot-wrapper">
                            <div id="oval_${key}_${slotKey}_${i}" class="oval ${isFilled ? 'filled' : ''}" 
                                 style="width:${ovalWidth}px; height:${ovalHeight}px;"
                                 onclick="handleOvalClick('${key}', '${slotKey}', ${i}, ${val !== null ? val : 'null'})">${isFilled ? val : ''}</div>
                            <span class="slot-number">${i+1}</span>
                        </div>`;
                    } else {
                        // Невыбираемые слоты - показываем иконку "фиксированное фото" + надпись
                        html += `<div class="slot-wrapper">
                            <div class="oval disabled" style="width:${ovalWidth}px; height:${ovalHeight}px;">📷</div>
                            <span class="slot-number">${i+1}</span>
                            <span class="note-disabled">${t('notSelectable')}</span>
                        </div>`;
                    }
                }
                html += `</div>`;
                // Добавляем мини-превью изображения слота если есть и не selectable? Для информации покажем маленькую иконку
                if (slotImg && !isSelectable) {
                    html += `<div style="margin-top:6px;"><img src="https://placehold.co/30x30?text=pic" data-slot-img="${slot.name_en}" data-original="${slotImg}" style="width:28px; height:28px; object-fit:cover; border-radius:6px; opacity:0.7;" title="Sample image"></div>`;
                }
                html += `</div>`;
            }
            html += `</div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        // Подгружаем реальные превью картинок через data-атрибуты (добавляем обработку кликов)
        document.querySelectorAll('.product-image').forEach(img => {
            const originalUrl = img.getAttribute('data-original');
            if (originalUrl) {
                // Устанавливаем обработчик клика для увеличения
                img.onclick = (e) => {
                    e.stopPropagation();
                    showImageModal(originalUrl, img.closest('.product-card')?.querySelector('.product-title')?.innerText || 'Package');
                };
                // Устанавливаем превью заглушку, но при клике открываем модалку
                img.src = "https://placehold.co/55x55/e2e8f0/007883?text=View";
            }
        });
        
        // Для изображений слотов (невыбираемые) добавим клик
        document.querySelectorAll('[data-slot-img]').forEach(el => {
            const orig = el.getAttribute('data-original');
            if (orig) {
                el.style.cursor = 'pointer';
                el.onclick = () => showImageModal(orig, el.getAttribute('data-slot-img') || 'Sample');
            }
        });
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════\n   WHITE FOX STUDIO\n   PACKAGE SELECTION\n═══════════════════════\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n📦 ${a.sku} — ${name}\n`;
                for (let [slotKey, slot] of Object.entries(a.slots)) {
                    const slotName = currentLang === 'en' ? slot.name_en : slot.name_th;
                    summary += `   📷 ${slotName} (${slot.size}):\n`;
                    for (let i = 0; i < slot.values.length; i++) {
                        summary += `      ${i+1}: ${slot.values[i] || '❌ not assigned'}\n`;
                    }
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }
    
    window.handleOvalClick = handleOvalClick;
    window.showImageModal = showImageModal;
    
    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render();
        else render();
    }
    
    document.getElementById('langBtn')?.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        updateLang();
    });
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadPackagesOrder();
        else toast(t('invalid'));
    });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });
    
    // Инициализация
    (() => {
        render();
        updateLang();
    })();
</script>
</body>
</html>
