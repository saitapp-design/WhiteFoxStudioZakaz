<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        :root {
            --teal: #007883;
            --teal-dark: #0a6570;
            --teal-light: #d4e9ec;
            --border: #e2e8f0;
            --red: #dc2626;
            --red-light: #fee2e2;
            --slot-filled: #c8e6df;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 10px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 42px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 170px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.2rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 42px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 1rem 0;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .order-header {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 4px 12px rgba(0,120,131,0.1);
        }

        .product-header {
            padding: 0.8rem 1rem;
            background: #fafcfd;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .product-info {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex: 1;
        }

        .product-sku {
            background: var(--teal-light);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--teal);
            font-family: monospace;
        }

        .product-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--teal);
        }

        .product-size {
            font-size: 0.7rem;
            color: #6c757d;
            background: #e9ecef;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
        }

        .product-pose {
            font-size: 0.7rem;
            background: var(--teal-light);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            color: var(--teal);
            font-weight: 600;
        }

        .badge-auto {
            background: var(--red-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--red);
            font-weight: 500;
        }

        .product-image {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
            background: #f5f5f5;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .slots-row {
            padding: 1rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: flex-start;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .oval {
            border-radius: 40px;
            background: white;
            border: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: all 0.15s;
            height: 42px;
            padding: 0 0.5rem;
        }

        .oval:hover {
            border-color: var(--teal-dark);
            background: #f0f9fa;
        }

        .oval.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .oval.disabled {
            background: var(--red-light);
            border-color: var(--red);
            cursor: not-allowed;
        }

        .oval.disabled:hover {
            background: var(--red-light);
        }

        .oval-input {
            border-radius: 40px;
            border: 2px solid var(--teal);
            background: white;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            outline: none;
            font-family: monospace;
            height: 42px;
            padding: 0 0.5rem;
        }

        .slot-number {
            font-size: 0.55rem;
            font-weight: 500;
            color: #8b9aab;
        }

        .auto-note {
            font-size: 0.55rem;
            font-weight: 500;
            color: var(--red);
            background: var(--red-light);
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
        }

        .global-actions {
            margin-top: 1.2rem;
            display: flex;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
        }

        @media (max-width: 700px) {
            .slots-row { gap: 0.8rem; justify-content: center; }
            .oval { height: 38px; font-size: 0.75rem; }
            .product-image { width: 45px; height: 45px; }
        }
    </style>
</head>

    const trans = {

    function t(key) { return trans[currentLang][key] || trans.en[key]; }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2500);
    }

    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO; }

    function isUsedInProduct(prodKey, num, excludeIdx) {
        const a = assignments[prodKey];
        if (!a) return false;
        for (let i = 0; i < a.values.length; i++) {
            if (i !== excludeIdx && a.values[i] === num) return true;
        }
        return false;
    }

    function setValue(prodKey, idx, val) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return false;
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, val, idx)) { toast(t('dup')); return false; }
        a.values[idx] = val;
        render();
        return true;
    }

    function getOvalWidth(poseCount) {
        if (poseCount <= 2) return 95;
        if (poseCount <= 3) return 88;
        if (poseCount <= 4) return 82;
        if (poseCount <= 6) return 76;
        if (poseCount <= 10) return 70;
        if (poseCount <= 16) return 64;
        return 58;
    }

    function getYandexDirectUrl(diskUrl) {
        if (!diskUrl) return null;
        if (diskUrl.includes('disk.yandex.ru/i/')) return diskUrl;
        if (diskUrl.includes('disk.yandex.ru/d/')) return diskUrl.replace('/d/', '/i/');
        if (diskUrl.includes('drive.google.com')) return diskUrl;
        return diskUrl;
    }

    function showImageModal(imgUrl, productName) {
        const directUrl = getYandexDirectUrl(imgUrl);
        if (!directUrl) {
            toast('Image not available');
            return;
        }
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        const img = document.createElement('img');
        img.src = directUrl;
        img.alt = productName;
        img.onerror = () => {
            modal.innerHTML = '<div style="color:white; text-align:center; padding:2rem;">❌ Image not available</div>';
        };
        modal.appendChild(img);
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }

    async function loadProductsFromSupabase() {
        try {
            isLoading = true;
            render();
            
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Загружаем товары из таблицы product_cards
            const { data: productCards, error: cardsError } = await supabaseClient
                .from('product_cards')
                .select('*');
            
            if (cardsError) {
                console.warn('Supabase error, using fallback data:', cardsError);
                throw new Error(cardsError.message);
            }
            
            productsDB = [];
            
            if (productCards && productCards.length > 0) {
                for (const card of productCards) {
                    let pose = 1;
                    let selectable = true;
                    let sku = card.sku || card.card_id;
                    let article = card.article || card.sku;
                    let size = card.size || '';
                    let name_en = card.name_en || card.sku;
                    let name_th = card.name_th || card.name_en;
                    
                    // Определяем количество pose из variants или полей
                    if (card.variants) {
                        try {
                            const variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                            if (variants && variants.length > 0) {
                                if (variants[0].pose) pose = Math.min(parseInt(variants[0].pose), 31);
                                if (variants[0].sku) sku = variants[0].sku;
                                if (variants[0].size_label) size = variants[0].size_label;
                            }
                        } catch(e) {}
                    }
                    if (card.pose) pose = Math.min(parseInt(card.pose), 31);
                    if (card.total_photos) pose = Math.min(parseInt(card.total_photos), 31);
                    if (pose < 1) pose = 1;
                    
                    // Определяем, можно ли выбирать фото (групповые/логотипы нельзя)
                    const messField = card.mess || '';
                    const nameLower = (name_en + ' ' + name_th).toLowerCase();
                    if (messField.includes('group') || messField.includes('brand') ||
                        nameLower.includes('group') || nameLower.includes('logo') ||
                        nameLower.includes('класс') || nameLower.includes('лого')) {
                        selectable = false;
                    }
                    
                    productsDB.push({
                        article: article,
                        sku: sku,
                        name_en: name_en,
                        name_th: name_th,
                        size: size,
                        pose: pose,
                        selectable: selectable,
                        image: productImages[article] || productImages[sku] || null
                    });
                }
            }
            
            // Загружаем пакеты
            const { data: packages, error: packagesError } = await supabaseClient
                .from('packages_with_price')
                .select('*');
            
            if (packages && packages.length > 0 && !packagesError) {
                for (const pkg of packages) {
                    let totalPhotos = pkg.total_photos || 1;
                    if (totalPhotos < 1) totalPhotos = 1;
                    totalPhotos = Math.min(totalPhotos, 31);
                    
                    productsDB.push({
                        article: pkg.sku || pkg.slug,
                        sku: pkg.sku || pkg.slug,
                        name_en: pkg.name_en || 'Package',
                        name_th: pkg.name_th || 'แพ็คเกจ',
                        size: '',
                        pose: totalPhotos,
                        selectable: false,
                        image: productImages[pkg.sku] || null
                    });
                }
            }
            
            // Если данных нет, используем fallback
            if (productsDB.length === 0) {
                productsDB = getFallbackData();
            }
            
            isLoading = false;
            toast(`✅ Loaded ${productsDB.length} products from database`);
            
        } catch (error) {
            console.error('Error loading from Supabase:', error);
            productsDB = getFallbackData();
            isLoading = false;
            toast(t('error'));
        }
    }
    
    function getFallbackData() {
        return [
            { article: "W16", sku: "W16", name_en: "FLOAT FRAME design", name_th: "การออกแบบกรอบลอย", size: "12x18", pose: 3, selectable: true, image: productImages["W16"] },
            { article: "A11", sku: "A11", name_en: "ACRYLIC PHOTO class logo", name_th: "โลโก้ชั้นเรียนภาพถ่ายอะคริลิค", size: "8x12", pose: 1, selectable: false, image: productImages["A11"] },
            { article: "C15", sku: "C15", name_en: "CANVAS design", name_th: "การออกแบบผ้าใบ", size: "20x20", pose: 9, selectable: true, image: productImages["C15"] },
            { article: "W17", sku: "W17", name_en: "FLOAT FRAME class logo", name_th: "เฟรมลอยโลโก้คลาส", size: "16x24", pose: 1, selectable: false, image: productImages["W17"] },
            { article: "F12", sku: "F12", name_en: "PHOTO COLLAGE", name_th: "ภาพตัดปะกรอบอลูมิเนียม", size: "8x12", pose: 2, selectable: true, image: productImages["F12"] },
            { article: "B11", sku: "B11", name_en: "INSTABOOK 16 pages", name_th: "อินสตาบุ๊ค 16 หน้า", size: "5.5x5.5", pose: 16, selectable: true, image: productImages["B11"] },
            { article: "K11", sku: "K11", name_en: "WALL CALENDAR 13 pages", name_th: "ปฏิทินติดผนัง 13 หน้า", size: "30x42cm", pose: 13, selectable: true, image: productImages["K11"] }
        ];
    }

    function loadRandomOrder() {
        if (productsDB.length === 0) return;
        
        const shuffled = [...productsDB];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        const selected = shuffled.slice(0, Math.min(6, shuffled.length));
        
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `p_${prod.article}_${Date.now()}_${Math.random()}`;
            assignments[key] = {
                key: key,
                article: prod.article,
                sku: prod.sku,
                nameEn: prod.name_en,
                nameTh: prod.name_th,
                size: prod.size,
                pose: prod.pose,
                selectable: prod.selectable,
                image: prod.image,
                values: new Array(prod.pose).fill(null)
            };
        }
        render();
        toast(t('ok'));
    }

    function handleOvalClick(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return;
        
        const ovalDiv = document.getElementById(`oval_${prodKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${idx}`) return;
        
        const width = ovalDiv.offsetWidth;
        const height = ovalDiv.offsetHeight;
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${width}px`;
        input.style.height = `${height}px`;
        
        ovalDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setValue(prodKey, idx, newVal);
            } else if (isNaN(newVal) && currentVal !== null) {
                setValue(prodKey, idx, null);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') save();
        });
        
        editingSlot = `${prodKey}_${idx}`;
    }

    function render() {
        const container = document.getElementById('app');
        
        if (isLoading) {
            container.innerHTML = `<div class="login-card"><div style="text-align:center; padding:1rem;">⏳ ${t('loading')}</div></div>`;
            return;
        }
        
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card">
                <h3>${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadRandomOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            totalSlots += a.values.length;
            totalFilled += a.values.filter(v => v !== null).length;
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ${currentOrder.number}</div>
            <div class="order-badge">${totalFilled}/${totalSlots}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const poseCount = asgn.pose;
            const ovalWidth = getOvalWidth(poseCount);
            const ovalHeight = 42;
            const imageUrl = asgn.image ? getYandexDirectUrl(asgn.image) : null;
            
            html += `<div class="product-card">
                <div class="product-header">
                    <div class="product-info">
                        <span class="product-sku">${asgn.sku || asgn.article}</span>
                        <span class="product-title">${name || asgn.article}</span>
                        <span class="product-size">📏 ${t('size')}: ${asgn.size || '—'}</span>
                        <span class="product-pose">📷 ${t('pose')}: ${poseCount}</span>
                        ${!asgn.selectable ? `<span class="badge-auto">🔴 ${t('notSelectable')}</span>` : ''}
                    </div>
                    ${imageUrl ? `<img class="product-image" src="${imageUrl}" alt="${name}" onerror="this.style.display='none'" onclick="showImageModal('${imageUrl}', '${name.replace(/'/g, "\\'")}')" title="${t('viewPhoto')}">` : '<div style="width:55px;"></div>'}
                </div>
                <div class="slots-row">`;
            
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isFilled = val !== null;
                const ovalClass = `oval ${isFilled ? 'filled' : ''} ${asgn.selectable ? 'editable' : 'disabled'}`;
                const displayText = isFilled ? val : '';
                
                if (asgn.selectable) {
                    html += `<div class="slot-wrapper">
                        <div id="oval_${key}_${i}" class="${ovalClass}" 
                             style="width:${ovalWidth}px; height:${ovalHeight}px;"
                             onclick="handleOvalClick('${key}', ${i}, ${val !== null ? val : 'null'})">${displayText}</div>
                        <span class="slot-number">${i+1}</span>
                    </div>`;
                } else {
                    html += `<div class="slot-wrapper">
                        <div class="oval disabled" style="width:${ovalWidth}px; height:${ovalHeight}px;"></div>
                        <span class="slot-number">${i+1}</span>
                        <span class="auto-note">🚫 ${t('notSelectable')}</span>
                    </div>`;
                }
            }
            html += `</div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════════\n   WHITE FOX STUDIO\n   PHOTO SELECTION CONFIRMED\n═══════════════════════════\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n📌 ${a.sku || a.article} — ${name}\n   📐 Size: ${a.size || '—'}  |  🖼️ Poses: ${a.pose}\n`;
                for (let i = 0; i < a.values.length; i++) {
                    summary += `   Photo ${i+1}: ${a.values[i] || '❌ NOT SET'}\n`;
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleOvalClick = handleOvalClick;
    window.showImageModal = showImageModal;

    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render();
        else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        updateLang();
    });
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadRandomOrder();
        else toast(t('invalid'));
    });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });

    // Запуск
    (async () => {
        await loadProductsFromSupabase();
        render();
        updateLang();
    })();
</script>
</body>
</html>
