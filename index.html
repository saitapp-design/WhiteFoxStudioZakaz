<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>White Fox Studio · Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        :root {
            --teal: #007883;
            --teal-dark: #0a6570;
            --teal-light: #d4e9ec;
            --border: #e2e8f0;
            --red: #dc2626;
            --red-light: #fee2e2;
            --slot-filled: #c8e6df;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 8px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1rem;
            font-weight: 800;
            color: var(--teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 36px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 0.8rem;
            width: 120px;
            font-size: 0.8rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 0.8rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 0.8rem;
            height: 36px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        .login-card {
            background: white;
            max-width: 340px;
            margin: 2rem auto;
            padding: 1.5rem;
            border-radius: 1.2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.7rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 0.8rem 0;
            text-align: center;
            font-size: 0.9rem;
            outline: none;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.65rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
        }

        .order-header {
            background: white;
            border-radius: 0.8rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--teal);
        }

        .product-card {
            background: white;
            border-radius: 0.8rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .product-header {
            padding: 0.6rem 0.8rem;
            background: #fafcfd;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .product-info {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.4rem;
            flex: 1;
        }

        .product-sku {
            background: var(--teal-light);
            padding: 0.15rem 0.5rem;
            border-radius: 16px;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--teal);
            font-family: monospace;
        }

        .product-title {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--teal);
        }

        .badge-auto {
            background: var(--red-light);
            padding: 0.15rem 0.5rem;
            border-radius: 16px;
            font-size: 0.6rem;
            color: var(--red);
            font-weight: 500;
        }

        .product-image {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: #f5f5f5;
        }

        .slots-row {
            padding: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-start;
        }

        .slot-group {
            background: #fafcff;
            border-radius: 0.8rem;
            padding: 0.6rem;
            border: 1px solid var(--border);
            flex: 1;
            min-width: 140px;
        }

        .slot-group-title {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--teal);
            margin-bottom: 0.5rem;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid var(--teal-light);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .slot-group-badge {
            font-size: 0.55rem;
            background: var(--teal-light);
            padding: 0.1rem 0.4rem;
            border-radius: 16px;
        }

        .slot-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        .oval {
            border-radius: 30px;
            background: white;
            border: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: all 0.15s;
            height: 34px;
            padding: 0 0.4rem;
            min-width: 55px;
        }

        .oval:hover {
            border-color: var(--teal-dark);
            background: #f0f9fa;
        }

        .oval.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .oval.disabled {
            background: var(--red-light);
            border-color: var(--red);
            cursor: not-allowed;
        }

        .oval-input {
            border-radius: 30px;
            border: 2px solid var(--teal);
            background: white;
            text-align: center;
            font-weight: 600;
            font-size: 0.7rem;
            outline: none;
            font-family: monospace;
            height: 34px;
            padding: 0 0.3rem;
            min-width: 55px;
        }

        .slot-number {
            font-size: 0.5rem;
            font-weight: 500;
            color: #8b9aab;
        }

        .auto-note {
            font-size: 0.5rem;
            font-weight: 500;
            color: var(--red);
            background: var(--red-light);
            padding: 0.1rem 0.3rem;
            border-radius: 16px;
        }

        .global-actions {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .slot-group { min-width: 100%; }
            .oval { height: 32px; min-width: 50px; font-size: 0.7rem; }
            .product-title { font-size: 0.75rem; }
            .product-sku { font-size: 0.6rem; }
            .toast { white-space: normal; max-width: 85%; text-align: center; }
            .order-header { flex-direction: column; align-items: stretch; text-align: center; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox">
            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="right-actions">
            <div class="search-box">
                <input type="text" id="orderInput" placeholder="Order" value="1111">
                <button id="checkBtn">OK</button>
            </div>
            <button class="lang-toggle" id="langBtn">
                <span id="langIcon">🇬🇧</span>
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;
    
    const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
    
    // Яндекс.Диск картинки (прямые ссылки через прокси)
    const productImages = {
        "Q1": "https://disk.yandex.ru/i/l7Pizr2T-VrhvA",
        "Q2": "https://disk.yandex.ru/i/l7Pizr2T-VrhvA",
        "Q3": "https://disk.yandex.ru/i/dVjjX6wW7PC-9A",
        "individual_logo_4x6": "https://disk.yandex.ru/i/3D5xeSTEbfPNnQ",
        "individual_4x6": "https://disk.yandex.ru/i/VgSC9iejFJjQ0g",
        "individual_6x9": "https://disk.yandex.ru/i/hJ6wp8pmLdMrGw",
        "individual_logo_6x9": "https://disk.yandex.ru/i/R5-f_PglDSVPXQ",
        "class_sabai_6x9": "https://disk.yandex.ru/i/pR07jYALAaReFg",
        "class_serious_6x9": "https://disk.yandex.ru/i/l7Pizr2T-VrhvA",
        "class_serious_8x12": "https://disk.yandex.ru/i/dVjjX6wW7PC-9A"
    };
    
    // Конвертация Яндекс.Диск ссылки в прямой URL
    function getDirectImageUrl(url) {
        if (!url) return null;
        if (url.includes('disk.yandex.ru/i/')) {
            return url;
        }
        if (url.includes('disk.yandex.ru/d/')) {
            return url.replace('/d/', '/i/');
        }
        return url;
    }
    
    let supabaseClient = null;
    let productsDB = [];
    let currentLang = 'en';
    let currentOrder = null;
    let assignments = {};
    let editingSlot = null;
    let isLoading = true;

    const trans = {
        en: { 
            enter: "Order Number", btn: "Continue", invalid: "Use 1111", 
            ok: "✓ Loaded", dup: "⚠️ Photo used", range: `Use ${MIN_PHOTO}–${MAX_PHOTO}`, 
            saved: "✓ Confirmed", back: "← Back", notSelectable: "Not selectable",
            loading: "Loading...", error: "Error", viewPhoto: "View", photos: "pcs"
        },
        th: { 
            enter: "หมายเลขคำสั่งซื้อ", btn: "ดำเนินการ", invalid: "ใช้ 1111", 
            ok: "✓ โหลดแล้ว", dup: "⚠️ หมายเลขรูปซ้ำ", range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, 
            saved: "✓ บันทึกแล้ว", back: "← กลับ", notSelectable: "เลือกไม่ได้",
            loading: "กำลังโหลด...", error: "ผิดพลาด", viewPhoto: "ดูรูป", photos: "รูป"
        }
    };

    function t(key) { return trans[currentLang][key] || trans.en[key]; }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO; }

    function isUsedInProduct(prodKey, slotKey, idx, num) {
        const a = assignments[prodKey];
        if (!a || !a.slots) return false;
        const slot = a.slots[slotKey];
        if (!slot) return false;
        for (let i = 0; i < slot.values.length; i++) {
            if (i !== idx && slot.values[i] === num) return true;
        }
        return false;
    }

    function setPackageSlotValue(prodKey, slotKey, idx, val) {
        const a = assignments[prodKey];
        if (!a || !a.isPackage) return false;
        const slot = a.slots[slotKey];
        if (!slot || slot.selectable === false) return false;
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, slotKey, idx, val)) { toast(t('dup')); return false; }
        slot.values[idx] = val;
        render();
        return true;
    }

    function getOvalWidth(qty) {
        if (qty <= 2) return 65;
        if (qty <= 3) return 60;
        if (qty <= 4) return 55;
        return 50;
    }

    function showImageModal(imgUrl, productName) {
        const directUrl = getDirectImageUrl(imgUrl);
        if (!directUrl) { toast('No image'); return; }
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        const img = document.createElement('img');
        img.src = directUrl;
        img.alt = productName;
        img.onerror = () => { modal.innerHTML = '<div style="color:white; padding:1rem;">❌</div>'; };
        modal.appendChild(img);
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }

    // Пакеты
    const packageData = {
        "Q1": {
            sku: "Q1", name_en: "Package S", name_th: "แพ็คเกจ S",
            items: [
                { name_en: "Class Serious + Logo", name_th: "คลาสซีเรียส + โลโก้", size: "6x9", qty: 1, selectable: false, imageKey: "class_serious_6x9" },
                { name_en: "Individual + Logo", name_th: "รายบุคคล + โลโก้", size: "4x6", qty: 1, selectable: true, imageKey: "individual_logo_4x6" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "4x6", qty: 4, selectable: true, imageKey: "individual_4x6" }
            ]
        },
        "Q2": {
            sku: "Q2", name_en: "Package M", name_th: "แพ็คเกจ M",
            items: [
                { name_en: "Class Serious + Logo", name_th: "คลาสซีเรียส + โลโก้", size: "6x9", qty: 1, selectable: false, imageKey: "class_serious_6x9" },
                { name_en: "Class Sabai", name_th: "คลาสสบาย", size: "6x9", qty: 1, selectable: false, imageKey: "class_sabai_6x9" },
                { name_en: "Individual + Logo", name_th: "รายบุคคล + โลโก้", size: "6x9", qty: 1, selectable: true, imageKey: "individual_logo_6x9" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "4x6", qty: 8, selectable: true, imageKey: "individual_4x6" }
            ]
        },
        "Q3": {
            sku: "Q3", name_en: "Package L", name_th: "แพ็คเกจ L",
            items: [
                { name_en: "Class Serious + Logo", name_th: "คลาสซีเรียส + โลโก้", size: "8x12", qty: 1, selectable: false, imageKey: "class_serious_8x12" },
                { name_en: "Individual + Logo", name_th: "รายบุคคล + โลโก้", size: "6x9", qty: 1, selectable: true, imageKey: "individual_logo_6x9" },
                { name_en: "Class Sabai", name_th: "คลาสสบาย", size: "6x9", qty: 1, selectable: false, imageKey: "class_sabai_6x9" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "6x9", qty: 1, selectable: true, imageKey: "individual_6x9" },
                { name_en: "Individual", name_th: "รายบุคคล", size: "4x6", qty: 10, selectable: true, imageKey: "individual_4x6" }
            ]
        }
    };

    async function loadProductsFromSupabase() {
        try {
            isLoading = true;
            render();
            
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const { data: productCards, error: cardsError } = await supabaseClient
                .from('product_cards')
                .select('*');
            
            productsDB = [];
            
            if (productCards && productCards.length > 0 && !cardsError) {
                for (const card of productCards) {
                    let pose = card.pose || 1;
                    let selectable = true;
                    const nameLower = (card.name_en || '').toLowerCase();
                    if (nameLower.includes('group') || nameLower.includes('logo')) selectable = false;
                    
                    productsDB.push({
                        type: 'simple',
                        sku: card.sku,
                        name_en: card.name_en,
                        name_th: card.name_th,
                        size: card.size,
                        pose: Math.min(pose, 31),
                        selectable: selectable,
                        image: productImages[card.sku] || null
                    });
                }
            }
            
            // Добавляем пакеты
            for (const [sku, pkg] of Object.entries(packageData)) {
                productsDB.push({
                    type: 'package',
                    sku: sku,
                    name_en: pkg.name_en,
                    name_th: pkg.name_th,
                    packageItems: pkg.items,
                    image: productImages[sku] || null
                });
            }
            
            if (productsDB.length === 0) {
                for (const [sku, pkg] of Object.entries(packageData)) {
                    productsDB.push({
                        type: 'package', sku: sku, name_en: pkg.name_en, name_th: pkg.name_th,
                        packageItems: pkg.items, image: productImages[sku]
                    });
                }
            }
            
            isLoading = false;
            toast(`✅ ${productsDB.length} products`);
            
        } catch (error) {
            console.error(error);
            for (const [sku, pkg] of Object.entries(packageData)) {
                productsDB.push({
                    type: 'package', sku: sku, name_en: pkg.name_en, name_th: pkg.name_th,
                    packageItems: pkg.items, image: productImages[sku]
                });
            }
            isLoading = false;
            toast(t('error'));
        }
    }

    function loadRandomOrder() {
        if (productsDB.length === 0) return;
        
        const packages = productsDB.filter(p => p.type === 'package');
        const selected = packages.slice(0, Math.min(3, packages.length));
        
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `pkg_${prod.sku}_${Date.now()}`;
            const slots = {};
            
            for (let item of prod.packageItems) {
                const slotKey = `slot_${item.name_en.replace(/\s/g, '_')}`;
                slots[slotKey] = {
                    name_en: item.name_en,
                    name_th: item.name_th,
                    size: item.size,
                    qty: item.qty,
                    selectable: item.selectable,
                    imageKey: item.imageKey,
                    values: new Array(item.qty).fill(null)
                };
            }
            
            assignments[key] = {
                key: key,
                sku: prod.sku,
                nameEn: prod.name_en,
                nameTh: prod.name_th,
                isPackage: true,
                slots: slots,
                image: prod.image
            };
        }
        render();
        toast(t('ok'));
    }

    function handleOvalClick(prodKey, slotKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || !a.isPackage) return;
        const slot = a.slots[slotKey];
        if (!slot || !slot.selectable) return;
        
        const ovalDiv = document.getElementById(`oval_${prodKey}_${slotKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${slotKey}_${idx}`) return;
        
        const width = ovalDiv.offsetWidth;
        const height = ovalDiv.offsetHeight;
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${width}px`;
        input.style.height = `${height}px`;
        
        ovalDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setPackageSlotValue(prodKey, slotKey, idx, newVal);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });
        editingSlot = `${prodKey}_${slotKey}_${idx}`;
    }

    function render() {
        const container = document.getElementById('app');
        
        if (isLoading) {
            container.innerHTML = `<div class="login-card"><div style="text-align:center;">⏳ ${t('loading')}</div></div>`;
            return;
        }
        
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card">
                <h3>${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadRandomOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            if (a.isPackage) {
                for (let slot of Object.values(a.slots)) {
                    totalSlots += slot.values.length;
                    totalFilled += slot.values.filter(v => v !== null).length;
                }
            }
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ${currentOrder.number}</div>
            <div class="order-badge">${totalFilled}/${totalSlots}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const imageUrl = asgn.image ? getDirectImageUrl(asgn.image) : null;
            
            html += `<div class="product-card">
                <div class="product-header">
                    <div class="product-info">
                        <span class="product-sku">${asgn.sku}</span>
                        <span class="product-title">${name}</span>
                        <span class="badge-auto">📦 Package</span>
                    </div>
                    ${imageUrl ? `<img class="product-image" src="${imageUrl}" onerror="this.style.display='none'" onclick="showImageModal('${imageUrl}', '${name.replace(/'/g, "\\'")}')" title="${t('viewPhoto')}">` : '<div style="width:40px;"></div>'}
                </div>
                <div class="slots-row">`;
            
            for (let [slotKey, slot] of Object.entries(asgn.slots)) {
                const slotName = currentLang === 'en' ? slot.name_en : slot.name_th;
                const isSelectable = slot.selectable;
                const ovalWidth = getOvalWidth(slot.qty);
                const ovalHeight = 34;
                
                html += `<div class="slot-group">
                    <div class="slot-group-title">
                        <span>📷 ${slotName}</span>
                        <span class="slot-group-badge">${slot.size} • ${slot.qty} ${t('photos')}</span>
                    </div>
                    <div class="slot-items">`;
                
                for (let i = 0; i < slot.qty; i++) {
                    const val = slot.values[i];
                    const isFilled = val !== null;
                    
                    if (isSelectable) {
                        html += `<div class="slot-wrapper">
                            <div id="oval_${key}_${slotKey}_${i}" class="oval ${isFilled ? 'filled' : ''}" 
                                 style="width:${ovalWidth}px; height:${ovalHeight}px;"
                                 onclick="handleOvalClick('${key}', '${slotKey}', ${i}, ${val !== null ? val : 'null'})">${isFilled ? val : ''}</div>
                            <span class="slot-number">${i+1}</span>
                        </div>`;
                    } else {
                        html += `<div class="slot-wrapper">
                            <div class="oval disabled" style="width:${ovalWidth}px; height:${ovalHeight}px;"></div>
                            <span class="slot-number">${i+1}</span>
                            <span class="auto-note">🚫</span>
                        </div>`;
                    }
                }
                html += `</div></div>`;
            }
            html += `</div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.4rem 1.2rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════\n   WHITE FOX STUDIO\n═══════════════════════\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n📦 ${a.sku} — ${name}\n`;
                for (let [slotKey, slot] of Object.entries(a.slots)) {
                    const slotName = currentLang === 'en' ? slot.name_en : slot.name_th;
                    summary += `   📷 ${slotName} (${slot.size}):\n`;
                    for (let i = 0; i < slot.values.length; i++) {
                        summary += `      ${i+1}: ${slot.values[i] || '❌'}\n`;
                    }
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleOvalClick = handleOvalClick;
    window.showImageModal = showImageModal;

    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render();
        else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        updateLang();
    });
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadRandomOrder();
        else toast(t('invalid'));
    });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });

    (async () => {
        await loadProductsFromSupabase();
        render();
        updateLang();
    })();
</script>
</body>
</html>
