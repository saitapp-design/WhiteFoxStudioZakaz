<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --teal: #007883;
            --teal-dark: #005f68;
            --teal-light: #e0f0f2;
            --teal-soft: #d4e9ec;
            --border: #e9edf2;
            --gray-500: #6c757d;
            --gray-700: #2c3e44;
            --slot-filled: #d1f0eb;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-hover: 0 8px 20px rgba(0,120,131,0.1);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            border-bottom: 2px solid var(--teal);
            box-shadow: var(--shadow);
        }

        .top-bar {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0.7rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--teal);
            letter-spacing: -0.3px;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 1.5px solid var(--teal);
            height: 42px;
            overflow: hidden;
        }
        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 160px;
            font-size: 0.9rem;
            outline: none;
            font-weight: 500;
        }
        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.2rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .lang-toggle {
            background: white;
            border: 1.5px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 42px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.8rem 1.5rem;
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 1rem 0;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }
        .order-input:focus {
            border-color: var(--teal);
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: var(--teal-dark);
        }

        .order-header {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
            background: var(--teal-light);
        }
        .order-badge {
            background: white;
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        /* PRODUCT CARD - полная ширина */
        .product-card {
            background: white;
            border-radius: 1.25rem;
            margin-bottom: 1.2rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
            width: 100%;
        }
        .product-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--teal-soft);
        }

        .product-content {
            padding: 1.2rem 1.5rem;
        }

        /* Верхняя часть: SKU и название в одной строке */
        .product-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 0.75rem;
        }
        .sku-badge {
            background: var(--teal-light);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--teal);
            font-family: monospace;
        }
        .product-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--gray-700);
        }
        .badge-package {
            background: #ffecb3;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #b76e0e;
            margin-left: 0.5rem;
        }

        .product-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .meta-item {
            font-size: 0.7rem;
            font-weight: 500;
            background: #f0f2f5;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            color: var(--gray-500);
        }

        .product-image-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .product-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: #f8f9fa;
        }
        .image-placeholder {
            width: 80px;
            height: 80px;
            background: #f0f2f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--gray-500);
            border: 1px solid var(--border);
        }

        /* SLOTS - красивое расположение */
        .slots-container {
            margin-top: 0.5rem;
        }
        .slot-item {
            background: #fafbfc;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .slot-item:last-child {
            margin-bottom: 0;
        }
        .slot-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.7rem;
            flex-wrap: wrap;
        }
        .slot-number-badge {
            background: var(--teal);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .slot-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--gray-700);
        }
        .slot-desc {
            font-size: 0.7rem;
            color: var(--gray-500);
            margin-left: 0.5rem;
        }
        .slot-auto-badge {
            background: #fef3c7;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            color: #b76e0e;
        }
        .photo-input-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .photo-number {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 48px;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--teal-dark);
            min-width: 100px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .photo-number.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
        }
        .photo-number.empty {
            color: var(--gray-500);
            background: white;
        }
        .photo-number:hover:not(.disabled-slot) {
            background: var(--teal-light);
            transform: scale(0.98);
        }
        .photo-number.disabled-slot {
            background: #e9ecef;
            border-color: #ced4da;
            cursor: not-allowed;
            color: #adb5bd;
        }
        .photo-input-field {
            border: 2px solid var(--teal);
            border-radius: 48px;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            width: 120px;
            text-align: center;
            outline: none;
            font-weight: 600;
        }
        .slot-hint {
            font-size: 0.7rem;
            color: var(--gray-500);
            margin-left: 0.5rem;
        }

        .global-actions {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--teal);
        }

        @media (max-width: 600px) {
            .main-content { padding: 1rem; }
            .product-content { padding: 1rem; }
            .photo-number { padding: 0.5rem 1rem; min-width: 80px; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox">
            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="right-actions">
            <div class="search-box">
                <input type="text" id="orderInput" placeholder="Order number" value="1111">
                <button id="checkBtn">OK</button>
            </div>
            <button class="lang-toggle" id="langBtn">
                <span id="langIcon">🇬🇧</span>
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;
    const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
    
    let supabaseClient = null;
    let productsDB = [];
    let currentLang = 'en';
    let currentOrder = null;
    let assignments = {};
    let editingSlot = null;
    let isLoading = true;

    // Product data from your table
    const PRODUCTS_DATA = [
        { article: "A11", name_en: "ACRYLIC PHOTO class logo", name_th: "อะคริลิคคลาสโลโก้", size: "8x12", pose: 1, note: "group photo", isPackage: false },
        { article: "A12", name_en: "ACRYLIC PHOTO", name_th: "ภาพถ่ายอะคริลิค", size: "12x12", pose: 1, isPackage: false },
        { article: "A13", name_en: "ACRYLIC PHOTO", name_th: "ภาพถ่ายอะคริลิค", size: "5x5", pose: 1, isPackage: false },
        { article: "A14", name_en: "ACRYLIC PHOTO class + individual logo", name_th: "คลาส+โลโก้ส่วนตัว", size: "12x12", pose: 2, isPackage: false, slotNames: ["Front/Group", "Portrait+Logo"] },
        { article: "W11", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "10x10", pose: 1, isPackage: false },
        { article: "W12", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "12x12", pose: 1, isPackage: false },
        { article: "W13", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "16x16", pose: 1, isPackage: false },
        { article: "W14", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "8x12", pose: 1, isPackage: false },
        { article: "W15", name_en: "FLOAT FRAME individual logo", name_th: "กรอบลอยโลโก้", size: "10x15", pose: 1, isPackage: false },
        { article: "W16", name_en: "FLOAT FRAME design", name_th: "ออกแบบกรอบลอย", size: "12x18", pose: 3, isPackage: false },
        { article: "C11", name_en: "CANVAS", name_th: "ผ้าใบ", size: "12x18", pose: 1, isPackage: false },
        { article: "C12", name_en: "CANVAS", name_th: "ผ้าใบ", size: "16x24", pose: 1, isPackage: false },
        { article: "C13", name_en: "CANVAS", name_th: "ผ้าใบ", size: "20x30", pose: 1, isPackage: false },
        { article: "C15", name_en: "CANVAS design", name_th: "ออกแบบผ้าใบ", size: "20x20", pose: 9, isPackage: false },
        { article: "F12", name_en: "PHOTO COLLAGE", name_th: "ภาพตัดปะ", size: "8x12", pose: 2, isPackage: false, slotNames: ["Photo 1", "Photo 2"] },
        { article: "B11", name_en: "INSTABOOK", name_th: "อินสตาบุ๊ค", size: "5.5x5.5", pose: 16, isPackage: false },
        { article: "B12", name_en: "MINI BOOK", name_th: "หนังสือขนาดเล็ก", size: "6x8", pose: 14, isPackage: false },
        { article: "B13", name_en: "ELITE SCHOOL BOOK", name_th: "หนังสือเรียนชั้นสูง", size: "8x12", pose: 31, isPackage: false },
        { article: "K11", name_en: "WALL CALENDAR", name_th: "ปฏิทินติดผนัง", size: "30x42cm", pose: 20, isPackage: false },
        { article: "S11", name_en: "SHAKING HEAD ACRYLIC STAND boy", name_th: "ขาตั้งอะคริลิค", size: "10x10cm", pose: 1, isPackage: false },
        { article: "S12", name_en: "SHAKING HEAD ACRYLIC STAND girl", name_th: "ขาตั้งอะคริลิค", size: "10x10cm", pose: 1, isPackage: false },
        { article: "S13", name_en: "SHAKING HEAD teacher+student", name_th: "ขาตั้งครู+นักเรียน", size: "10x10cm", pose: 2, isPackage: false, slotNames: ["Teacher", "Student"] },
        { article: "E14", name_en: "KEYRING ALUM", name_th: "พวงกุญแจ", size: "5cm", pose: 2, isPackage: false, slotNames: ["Front side", "Back side"] },
        { article: "E15", name_en: "HAND MIRROR", name_th: "กระจกมือ", size: "7.5cm", pose: 1, isPackage: false },
        { article: "E16", name_en: "MINI PILLOW", name_th: "หมอนมินิ", size: "7.5x7.5cm", pose: 4, isPackage: false },
        // Packages
        { article: "PACKAGE-S", name_en: "Package S - Class Serious + Logo", name_th: "แพ็คเกจ S", size: "Mixed", pose: 3, isPackage: true, autoSlots: [0] },
        { article: "PACKAGE-M", name_en: "Package M - Class Serious + Sabai", name_th: "แพ็คเกจ M", size: "Mixed", pose: 4, isPackage: true, autoSlots: [0,1] },
        { article: "PACKAGE-L", name_en: "Package L - Deluxe", name_th: "แพ็คเกจ L", size: "Mixed", pose: 5, isPackage: true, autoSlots: [0,1] }
    ];

    async function loadProducts() {
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            isLoading = true;
            render();
            
            const { data: productCardsData } = await supabaseClient.from('product_cards').select('*');
            const { data: packagesData } = await supabaseClient.from('packages_with_price').select('*');
            
            let processed = [];
            if (productCardsData && productCardsData.length) {
                productCardsData.forEach(card => {
                    processed.push({
                        id: card.card_id, sku: card.sku || card.card_id,
                        name_en: card.name_en, name_th: card.name_th,
                        size: card.size, pose: card.pose || 1,
                        isPackage: false, image_url: card.cover_image
                    });
                });
            }
            if (!processed.length) {
                processed = PRODUCTS_DATA.map(p => ({
                    id: p.article, sku: p.article, name_en: p.name_en, name_th: p.name_th,
                    size: p.size, pose: p.pose, isPackage: p.isPackage || false,
                    autoSlots: p.autoSlots || null, slotNames: p.slotNames || null
                }));
            }
            if (packagesData?.length) {
                packagesData.forEach(pkg => {
                    if (pkg.visible !== false) {
                        processed.push({
                            id: pkg.sku, sku: pkg.sku, name_en: pkg.name_en, name_th: pkg.name_th,
                            size: pkg.size, pose: pkg.total_photos || 3, isPackage: true,
                            autoSlots: pkg.sku?.includes('S') ? [0] : (pkg.sku?.includes('M') ? [0,1] : null),
                            image_url: pkg.image_url
                        });
                    }
                });
            }
            productsDB = processed.length ? processed : PRODUCTS_DATA;
            isLoading = false;
            toast(`✅ ${productsDB.length} products ready`);
        } catch(e) {
            console.warn(e);
            productsDB = PRODUCTS_DATA;
            isLoading = false;
            toast(`📦 Demo: ${productsDB.length} products`);
        }
    }

    function loadOrder() {
        if (!productsDB.length) return;
        const shuffled = [...productsDB];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const selected = shuffled.slice(0, Math.min(6, shuffled.length));
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `${prod.isPackage ? 'pkg' : 'prd'}_${prod.sku}_${Date.now()}_${Math.random()}`;
            const poseCount = prod.pose || 1;
            let selectableMask = new Array(poseCount).fill(true);
            let autoLabels = new Array(poseCount).fill(null);
            
            if (prod.isPackage && prod.autoSlots) {
                prod.autoSlots.forEach(idx => {
                    if (idx < poseCount) { selectableMask[idx] = false; autoLabels[idx] = "Auto assigned"; }
                });
            }
            
            // Для товаров с 2 фото: слот 1 = передний план, слот 2 = задний план
            let slotDisplayNames = [];
            if (poseCount === 2) {
                slotDisplayNames = ["🎬 Foreground / Front", "🌄 Background / Back"];
            } else if (prod.slotNames) {
                slotDisplayNames = prod.slotNames;
            } else {
                for (let i = 0; i < poseCount; i++) slotDisplayNames.push(`Photo ${i+1}`);
            }
            
            assignments[key] = {
                key, sku: prod.sku, nameEn: prod.name_en, nameTh: prod.name_th,
                size: prod.size, pose: poseCount, image: prod.image_url,
                isPackage: prod.isPackage || false,
                values: new Array(poseCount).fill(null),
                selectableMask, autoLabels,
                slotNames: slotDisplayNames
            };
        }
        render();
        toast(t('ok'));
    }

    const trans = {
        en: { enter: "Enter order number", btn: "Continue", invalid: "Use code 1111", ok: "✓ Order loaded",
              dup: "⚠️ Photo number already used", range: `Use ${MIN_PHOTO}–${MAX_PHOTO}`, saved: "✓ Selection saved",
              back: "← Back", notSelectable: "Auto", loading: "Loading...", viewPhoto: "View photo",
              size: "Size", photos: "Photos", package: "Package", enterNumber: "Enter photo number" },
        th: { enter: "กรอกหมายเลขคำสั่งซื้อ", btn: "ดำเนินการ", invalid: "ใช้รหัส 1111", ok: "✓ โหลดแล้ว",
              dup: "⚠️ หมายเลขรูปซ้ำ", range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, saved: "✓ บันทึกแล้ว",
              back: "← กลับ", notSelectable: "กำหนดอัตโนมัติ", loading: "กำลังโหลด...", viewPhoto: "ดูรูป",
              size: "ขนาด", photos: "จำนวนรูป", package: "แพ็คเกจ", enterNumber: "กรอกหมายเลขรูป" }
    };
    function t(key) { return trans[currentLang][key] || trans.en[key]; }
    function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 2000); }
    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO && Number.isInteger(n); }
    function isUsedInProduct(prodKey, idx, num) { const a = assignments[prodKey]; if (!a) return false; for (let i=0; i<a.values.length; i++) if (i!==idx && a.values[i]===num) return true; return false; }

    function setValue(prodKey, idx, val) {
        const a = assignments[prodKey];
        if (!a) return false;
        if (a.selectableMask && a.selectableMask[idx] === false) { toast(t('notSelectable')); return false; }
        if (val !== null && val !== undefined) {
            if (!isValid(val)) { toast(t('range')); return false; }
            if (isUsedInProduct(prodKey, idx, val)) { toast(t('dup')); return false; }
            a.values[idx] = val;
        } else {
            a.values[idx] = null;
        }
        render();
        return true;
    }

    function startEditing(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || (a.selectableMask && a.selectableMask[idx] === false)) { toast(t('notSelectable')); return; }
        if (editingSlot === `${prodKey}_${idx}`) return;
        
        const container = document.getElementById(`slot_display_${prodKey}_${idx}`);
        if (!container) return;
        
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'photo-input-field';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = '120px';
        
        container.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(container);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setValue(prodKey, idx, newVal);
            } else if (isNaN(newVal) && currentVal !== null) {
                setValue(prodKey, idx, null);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });
        editingSlot = `${prodKey}_${idx}`;
    }

    function showImageModal(url, name) {
        if (!url) { toast('No image'); return; }
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        const img = document.createElement('img');
        img.src = url;
        img.alt = name;
        modal.appendChild(img);
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }

    function render() {
        const container = document.getElementById('app');
        if (isLoading) {
            container.innerHTML = `<div class="login-card"><div class="loading">⏳ ${t('loading')}</div></div>`;
            return;
        }
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card"><h3>📸 ${t('enter')}</h3><input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111"><button class="btn-primary" id="loginExec">${t('btn')}</button></div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => { const code = document.getElementById('loginCode').value.trim(); if (code === '1111') loadOrder(); else toast(t('invalid')); });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            totalSlots += a.values.length;
            totalFilled += a.values.filter(v => v !== null).length;
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ORDER #${currentOrder.number}</div>
            <div class="order-badge">📸 ${totalFilled}/${totalSlots} photos</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const poseCount = asgn.pose;
            const imgUrl = asgn.image;
            
            html += `<div class="product-card">
                <div class="product-content">
                    <div class="product-header-row">
                        <span class="sku-badge">🔖 ${asgn.sku}</span>
                        <div class="product-title">
                            ${name || asgn.sku}
                            ${asgn.isPackage ? `<span class="badge-package">📦 ${t('package')}</span>` : ''}
                        </div>
                    </div>
                    <div class="product-meta">
                        ${asgn.size ? `<span class="meta-item">📏 ${t('size')}: ${asgn.size}</span>` : ''}
                        <span class="meta-item">📷 ${t('photos')}: ${poseCount}</span>
                    </div>`;
            
            if (imgUrl) {
                html += `<div class="product-image-row">
                    <img class="product-image" src="${imgUrl}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2080%2080%22%3E%3Crect%20width%3D%2280%22%20height%3D%2280%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2240%22%20y%3D%2245%22%20text-anchor%3D%22middle%22%20fill%3D%22%23999%22%20font-size%3D%2212%22%3ENo%20img%3C%2Ftext%3E%3C%2Fsvg%3E'" onclick="showImageModal('${imgUrl}', '${name}')" title="${t('viewPhoto')}">
                </div>`;
            }
            
            html += `<div class="slots-container">`;
            
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isFilled = val !== null;
                const isAuto = asgn.selectableMask && asgn.selectableMask[i] === false;
                const autoLabel = asgn.autoLabels?.[i];
                const slotName = asgn.slotNames?.[i] || (poseCount === 2 ? (i === 0 ? "🎬 Foreground / Front" : "🌄 Background / Back") : `Photo ${i+1}`);
                
                html += `<div class="slot-item">
                    <div class="slot-header">
                        <span class="slot-number-badge">${i+1}</span>
                        <span class="slot-name">${slotName}</span>`;
                
                if (isAuto && autoLabel) {
                    html += `<span class="slot-auto-badge">🔒 ${autoLabel}</span>`;
                }
                html += `</div>
                    <div class="photo-input-area">`;
                
                if (isAuto) {
                    html += `<div class="photo-number disabled-slot" style="background:#e9ecef;">— ${t('notSelectable')} —</div>`;
                } else {
                    const displayVal = isFilled ? val : '___';
                    html += `<div id="slot_display_${key}_${i}" class="photo-number ${isFilled ? 'filled' : 'empty'}" onclick="startEditing('${key}', ${i}, ${val !== null ? val : 'null'})">${displayVal}</div>
                        <span class="slot-hint">📷 ${t('enterNumber')}</span>`;
                }
                html += `</div></div>`;
            }
            html += `</div></div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.6rem 1.8rem;">💾 ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════\n   WHITE FOX STUDIO\n   PHOTO SELECTION\n═══════════════════════\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n📦 ${a.sku} — ${name}\n📏 ${a.size || '—'}  |  📷 ${a.pose} photos\n`;
                for (let i = 0; i < a.values.length; i++) {
                    const slotLabel = a.slotNames?.[i] || (a.pose === 2 ? (i === 0 ? "Foreground" : "Background") : `Photo ${i+1}`);
                    const isAuto = a.selectableMask && a.selectableMask[i] === false;
                    summary += `   ${slotLabel}: ${a.values[i] || '❌ not set'}${isAuto ? ' [Auto]' : ''}\n`;
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.startEditing = startEditing;
    window.showImageModal = showImageModal;

    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render(); else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => { currentLang = currentLang === 'en' ? 'th' : 'en'; updateLang(); });
    document.getElementById('checkBtn')?.addEventListener('click', () => { const code = document.getElementById('orderInput').value.trim(); if (code === '1111') loadOrder(); else toast(t('invalid')); });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('checkBtn')?.click(); });
    
    (async () => {
        await loadProducts();
        render();
        updateLang();
    })();
</script>
</body>
</html>
