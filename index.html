<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        :root {
            --teal: #007883;
            --teal-dark: #0a6570;
            --teal-light: #d4e9ec;
            --border: #e2e8f0;
            --red: #dc2626;
            --red-light: #fee2e2;
            --slot-filled: #c8e6df;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 10px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 42px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 170px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.2rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 42px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 1rem 0;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .order-header {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .product-header {
            padding: 0.8rem 1rem;
            background: #fafcfd;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .product-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--teal);
        }

        .product-sku {
            background: var(--teal-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .product-size {
            font-size: 0.7rem;
            color: #6c757d;
            margin-left: 0.3rem;
        }

        .badge-auto {
            background: var(--red-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--red);
            font-weight: 500;
        }

        /* slots row - компактные овалы */
        .slots-row {
            padding: 1rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: flex-start;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        /* овальные слоты - низкие */
        .oval {
            border-radius: 40px;
            background: white;
            border: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: all 0.15s;
            height: 44px;
        }

        .oval:hover {
            border-color: var(--teal-dark);
            background: #f0f9fa;
        }

        .oval.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .oval.disabled {
            background: var(--red-light);
            border-color: var(--red);
            cursor: not-allowed;
        }

        .oval.disabled:hover {
            background: var(--red-light);
        }

        .oval-input {
            border-radius: 40px;
            border: 2px solid var(--teal);
            background: white;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            outline: none;
            font-family: monospace;
            height: 44px;
        }

        .slot-number {
            font-size: 0.55rem;
            font-weight: 500;
            color: #8b9aab;
        }

        .auto-note {
            font-size: 0.55rem;
            font-weight: 500;
            color: var(--red);
            background: var(--red-light);
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
        }

        .global-actions {
            margin-top: 1.2rem;
            display: flex;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
        }

        @media (max-width: 700px) {
            .slots-row { gap: 0.8rem; justify-content: center; }
            .oval { height: 38px; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox">
            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="right-actions">
            <div class="search-box">
                <input type="text" id="orderInput" placeholder="Order number" value="1111">
                <button id="checkBtn">OK</button>
            </div>
            <button class="lang-toggle" id="langBtn">
                <span id="langIcon">🇬🇧</span>
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;
    
    const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
    
    let supabaseClient = null;
    let productsDB = [];
    let currentLang = 'en';
    let currentOrder = null;
    let assignments = {};
    let editingSlot = null;
    let isLoading = true;

    const trans = {
        en: { 
            enter: "Enter Order Number", btn: "Continue", invalid: "Use code 1111", 
            ok: "✓ Loaded", dup: "Photo already used", range: `Use ${MIN_PHOTO}–${MAX_PHOTO}`, 
            saved: "✓ Confirmed", back: "← Back", notSelectable: "Not selectable",
            loading: "Loading...", error: "Error"
        },
        th: { 
            enter: "กรอกหมายเลขคำสั่งซื้อ", btn: "ดำเนินการ", invalid: "ใช้รหัส 1111", 
            ok: "✓ โหลดแล้ว", dup: "หมายเลขรูปซ้ำ", range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, 
            saved: "✓ บันทึกแล้ว", back: "← กลับ", notSelectable: "ไม่สามารถเลือกได้",
            loading: "กำลังโหลด...", error: "เกิดข้อผิดพลาด"
        }
    };

    function t(key) { return trans[currentLang][key] || trans.en[key]; }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO; }

    function isUsedInProduct(prodKey, num, excludeIdx) {
        const a = assignments[prodKey];
        if (!a) return false;
        for (let i = 0; i < a.values.length; i++) {
            if (i !== excludeIdx && a.values[i] === num) return true;
        }
        return false;
    }

    function setValue(prodKey, idx, val) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return false;
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, val, idx)) { toast(t('dup')); return false; }
        a.values[idx] = val;
        render();
        return true;
    }

    function getOvalWidth(poseCount) {
        if (poseCount <= 2) return 95;
        if (poseCount <= 3) return 88;
        if (poseCount <= 4) return 82;
        if (poseCount <= 6) return 76;
        if (poseCount <= 10) return 70;
        if (poseCount <= 16) return 64;
        return 58;
    }

    async function loadProductsFromSupabase() {
        try {
            isLoading = true;
            render();
            
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const { data: productCards, error: cardsError } = await supabaseClient
                .from('product_cards')
                .select('*');
            
            if (cardsError) {
                console.warn('Error loading product_cards:', cardsError);
            }
            
            const { data: packages, error: packagesError } = await supabaseClient
                .from('packages_with_price')
                .select('*');
            
            if (packagesError) {
                console.warn('Error loading packages:', packagesError);
            }
            
            productsDB = [];
            
            if (productCards && productCards.length > 0) {
                for (const card of productCards) {
                    let pose = 1;
                    let selectable = true;
                    let mess = '';
                    
                    if (card.variants) {
                        try {
                            const variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                            if (variants && variants.length > 0) {
                                if (variants[0].pose) pose = Math.min(parseInt(variants[0].pose), 31);
                                if (variants[0].mess) mess = variants[0].mess;
                            }
                        } catch(e) {}
                    }
                    
                    if (card.pose) pose = Math.min(parseInt(card.pose), 31);
                    if (card.total_photos) pose = Math.min(parseInt(card.total_photos), 31);
                    if (pose < 1) pose = 1;
                    
                    const messLower = (mess || '').toLowerCase();
                    const nameEnLower = (card.name_en || '').toLowerCase();
                    const nameThLower = (card.name_th || '').toLowerCase();
                    
                    if (messLower.includes('group') || messLower.includes('brand') ||
                        nameEnLower.includes('group') || nameEnLower.includes('logo') ||
                        nameThLower.includes('กลุ่ม') || nameThLower.includes('โลโก้')) {
                        selectable = false;
                    }
                    
                    productsDB.push({
                        article: card.sku || card.card_id || `PROD_${Date.now()}`,
                        name_en: card.name_en || card.sku || 'Product',
                        name_th: card.name_th || card.name_en || 'สินค้า',
                        size: card.size || '',
                        pose: pose,
                        selectable: selectable
                    });
                }
            }
            
            if (packages && packages.length > 0) {
                for (const pkg of packages) {
                    let totalPhotos = pkg.total_photos || 1;
                    if (totalPhotos < 1) totalPhotos = 1;
                    totalPhotos = Math.min(totalPhotos, 31);
                    
                    productsDB.push({
                        article: pkg.sku || pkg.slug || `PKG_${Date.now()}`,
                        name_en: pkg.name_en || pkg.sku || 'Package',
                        name_th: pkg.name_th || pkg.name_en || 'แพ็คเกจ',
                        size: '',
                        pose: totalPhotos,
                        selectable: false
                    });
                }
            }
            
            if (productsDB.length === 0) {
                productsDB = [
                    { article: "W16", name_en: "FLOAT FRAME design", name_th: "การออกแบบกรอบลอย", size: "12x18", pose: 3, selectable: true },
                    { article: "A11", name_en: "ACRYLIC PHOTO class logo", name_th: "โลโก้ชั้นเรียน", size: "8x12", pose: 1, selectable: false },
                    { article: "C15", name_en: "CANVAS design", name_th: "การออกแบบผ้าใบ", size: "20x20", pose: 9, selectable: true },
                    { article: "W17", name_en: "FLOAT FRAME class logo", name_th: "เฟรมลอยโลโก้คลาส", size: "16x24", pose: 1, selectable: false },
                    { article: "F12", name_en: "PHOTO COLLAGE", name_th: "ภาพตัดปะ", size: "8x12", pose: 2, selectable: true }
                ];
            }
            
            isLoading = false;
            toast(`✅ Loaded ${productsDB.length} products`);
            
        } catch (error) {
            console.error('Error:', error);
            toast(t('error'));
            isLoading = false;
            productsDB = [
                { article: "W16", name_en: "FLOAT FRAME design", name_th: "การออกแบบกรอบลอย", size: "12x18", pose: 3, selectable: true },
                { article: "A11", name_en: "ACRYLIC PHOTO class logo", name_th: "โลโก้ชั้นเรียน", size: "8x12", pose: 1, selectable: false },
                { article: "C15", name_en: "CANVAS design", name_th: "การออกแบบผ้าใบ", size: "20x20", pose: 9, selectable: true }
            ];
        }
    }

    function loadRandomOrder() {
        if (productsDB.length === 0) return;
        
        const shuffled = [...productsDB];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        const selected = shuffled.slice(0, Math.min(6, shuffled.length));
        
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `p_${prod.article}_${Date.now()}_${Math.random()}`;
            assignments[key] = {
                key: key,
                article: prod.article,
                nameEn: prod.name_en,
                nameTh: prod.name_th,
                size: prod.size,
                pose: prod.pose,
                selectable: prod.selectable,
                values: new Array(prod.pose).fill(null)
            };
        }
        render();
        toast(t('ok'));
    }

    function handleOvalClick(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return;
        
        const ovalDiv = document.getElementById(`oval_${prodKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${idx}`) return;
        
        const width = ovalDiv.offsetWidth;
        const height = ovalDiv.offsetHeight;
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${width}px`;
        input.style.height = `${height}px`;
        input.style.fontSize = '0.9rem';
        
        ovalDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setValue(prodKey, idx, newVal);
            } else if (isNaN(newVal) && currentVal !== null) {
                setValue(prodKey, idx, null);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') save();
        });
        
        editingSlot = `${prodKey}_${idx}`;
    }

    function render() {
        const container = document.getElementById('app');
        
        if (isLoading) {
            container.innerHTML = `<div class="login-card"><div style="text-align:center; padding:1rem;">⏳ ${t('loading')}</div></div>`;
            return;
        }
        
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card">
                <h3>${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadRandomOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            totalSlots += a.values.length;
            totalFilled += a.values.filter(v => v !== null).length;
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ${currentOrder.number}</div>
            <div class="order-badge">${totalFilled}/${totalSlots}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const poseCount = asgn.pose;
            const ovalWidth = getOvalWidth(poseCount);
            const ovalHeight = 44;
            
            html += `<div class="product-card">
                <div class="product-header">
                    <div>
                        <span class="product-title">${name || asgn.article}</span>
                        <span class="product-sku">${asgn.article}</span>
                        <span class="product-size">${asgn.size}</span>
                        ${!asgn.selectable ? `<span class="badge-auto">🔴 ${t('notSelectable')}</span>` : `<span class="badge-auto">📷 ${poseCount}</span>`}
                    </div>
                </div>
                <div class="slots-row">`;
            
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isFilled = val !== null;
                const ovalClass = `oval ${isFilled ? 'filled' : ''} ${asgn.selectable ? 'editable' : 'disabled'}`;
                const displayText = isFilled ? val : '';
                
                if (asgn.selectable) {
                    html += `<div class="slot-wrapper">
                        <div id="oval_${key}_${i}" class="${ovalClass}" 
                             style="width:${ovalWidth}px; height:${ovalHeight}px;"
                             onclick="handleOvalClick('${key}', ${i}, ${val !== null ? val : 'null'})">${displayText}</div>
                        <span class="slot-number">${i+1}</span>
                    </div>`;
                } else {
                    html += `<div class="slot-wrapper">
                        <div class="oval disabled" style="width:${ovalWidth}px; height:${ovalHeight}px;"></div>
                        <span class="slot-number">${i+1}</span>
                        <span class="auto-note">🚫 ${t('notSelectable')}</span>
                    </div>`;
                }
            }
            html += `</div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "WHITE FOX STUDIO\n━━━━━━━━━━━━\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n${a.article} — ${name}\n`;
                for (let i = 0; i < a.values.length; i++) {
                    summary += `  ${i+1}: ${a.values[i] || '—'}\n`;
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleOvalClick = handleOvalClick;

    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render();
        else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        updateLang();
    });
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadRandomOrder();
        else toast(t('invalid'));
    });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });

    (async () => {
        await loadProductsFromSupabase();
        render();
        updateLang();
    })();
</script>
</body>
</html>
