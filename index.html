<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Fox Studio - Photo Selection for Order</title>
    <style>
        /* ===== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ===== */
        :root {
            --accent-primary: #007883;
            --accent-hover: #0a6570;
            --accent-light: rgba(0, 120, 131, 0.1);
            --bg-secondary: #ffffff;
            --bg-form: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0, 120, 131, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8f8f8;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-secondary);
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 3px solid var(--accent-primary);
        }

        .top-bar {
            padding: 0.8rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: var(--bg-secondary);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-primary);
            letter-spacing: 0.5px;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-container {
            flex: 1;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 0.1rem 0.1rem 0.1rem 1.5rem;
            border: 2px solid var(--accent-primary);
            height: 48px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(0,120,131,0.1);
        }

        .search-box:focus-within {
            box-shadow: 0 4px 20px var(--accent-light);
            border-color: var(--accent-hover);
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            width: 100%;
            outline: none;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-box button {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            height: 40px;
        }

        .search-box button:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--accent-primary);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 1rem;
            cursor: pointer;
            color: var(--accent-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            height: 48px;
            min-width: 90px;
            transition: all 0.2s;
        }

        .lang-toggle:hover {
            background: var(--accent-primary);
            color: white;
        }

        #lang-icon {
            font-size: 1.2rem;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            min-height: calc(100vh - 120px);
        }

        .login-screen {
            max-width: 500px;
            margin: 3rem auto;
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .login-screen h1 {
            font-size: 2.2rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .order-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            margin-bottom: 1rem;
        }

        .order-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        /* Modal Styles */
        .photo-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }
        
        .photo-modal.active {
            display: flex;
        }
        
        .photo-modal-content {
            background: white;
            border-radius: 32px;
            max-width: 950px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid var(--accent-primary);
        }
        
        .photo-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent-primary);
            margin-bottom: 1.5rem;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .photo-modal-header h2 {
            color: var(--accent-primary);
            font-size: 1.5rem;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        
        .order-product-item {
            background: #f8fafc;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border-color);
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--accent-light);
        }
        
        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .product-sku-badge {
            background: var(--accent-light);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .photo-count-badge {
            background: var(--accent-primary);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .photo-assignment-area {
            margin-top: 1rem;
        }
        
        .slot-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
            padding: 0.5rem;
            background: white;
            border-radius: 16px;
        }
        
        .slot-label {
            min-width: 100px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .assigned-photo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent-light);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
        }
        
        .photo-input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .photo-input-group input {
            width: 80px;
            padding: 0.4rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
        }
        
        .btn-small {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .btn-small-outline {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .interior-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .photo-chip {
            background: var(--accent-light);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .photo-chip button {
            background: none;
            border: none;
            cursor: pointer;
            color: #c44536;
            font-weight: bold;
        }
        
        .modal-footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            position: sticky;
            bottom: 0;
            background: white;
        }
        
        .btn-primary-modal {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .order-info-banner {
            background: var(--accent-light);
            padding: 0.8rem 2rem;
            display: none;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid var(--accent-primary);
        }
        
        .order-code-badge {
            background: white;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            color: var(--accent-primary);
        }
        
        .select-photos-btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .select-photos-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 20px var(--shadow-color);
            border: 2px solid white;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 0.8rem 1rem;
            }

            .right-actions {
                flex-direction: column;
            }

            .lang-toggle {
                width: 100%;
            }

            .login-screen {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            .login-screen h1 {
                font-size: 1.8rem;
            }
            
            .order-info-banner {
                flex-direction: column;
                text-align: center;
            }
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid var(--accent-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <div class="logo-area">
                <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox Studio">
                <span class="logo-text">WHITE FOX STUDIO</span>
            </div>
            
            <div class="right-actions">
                <div class="search-container">
                    <div class="search-box">
                        <input type="text" id="orderNumber" placeholder="Order number (1111 for demo)">
                        <button id="checkOrderBtn">OK</button>
                    </div>
                </div>
                
                <button class="lang-toggle" id="langToggle">
                    <span id="lang-icon">🇬🇧</span>
                    <span id="lang-text">EN</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Order Info Banner (shown after entering valid order) -->
    <div id="orderInfoBanner" class="order-info-banner">
        <span>📦 Order: <strong id="activeOrderCode"></strong></span>
        <span>🎯 Select photos for your products below</span>
        <button id="openPhotoSelectionBtn" class="select-photos-btn">📸 Select Photos</button>
    </div>

    <main class="main-content">
        <div class="login-screen" id="loginScreen">
            <h1 id="title">Enter Order Number</h1>
            <p class="subtitle" id="subtitle">Please enter your order number to select photos</p>
            
            <input type="text" id="orderNumberInput" class="order-input" placeholder="Enter order number (1111)">
            <button class="btn-primary" id="loginBtn">Continue</button>
        </div>
    </main>

    <!-- Photo Selection Modal -->
    <div id="photoModal" class="photo-modal">
        <div class="photo-modal-content">
            <div class="photo-modal-header">
                <h2>📸 Select Photos for Order <span id="modalOrderNumber"></span></h2>
                <button class="close-modal" id="closeModalBtn">✕</button>
            </div>
            <div id="modalProductsList">
                <div class="loading">Loading products...</div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary-modal" id="confirmSelectionBtn">✅ Confirm Selection</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===================== SUPABASE CONFIG =====================
        const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
        
        let supabaseClient = null;
        let allProducts = [];
        let currentOrder = null;
        let photoAssignments = {};
        
        // Mock order items for demo code 1111
        const mockOrderSkus = ['CAL-2025', 'PB-ALBUM', 'MAG-01'];
        
        // Translations
        const translations = {
            en: {
                title: 'Enter Order Number',
                subtitle: 'Please enter your order number to select photos',
                loginBtn: 'Continue',
                toastError: 'Please enter order number',
                placeholder: 'Enter order number (1111)',
                toastOrderLoaded: 'Order loaded! Click "Select Photos" to assign your photos.',
                toastInvalidCode: 'Demo: Only order code 1111 is available for testing',
                toastPhotoUsed: 'Photo #${num} is already used in this order',
                toastAllFilled: 'All slots are filled',
                toastConfirm: 'Photo selection saved!',
                coverLabel: 'Cover Photo',
                backLabel: 'Back Cover',
                interiorLabel: 'Interior Photos'
            },
            th: {
                title: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                subtitle: 'กรุณากรอกหมายเลขคำสั่งซื้อเพื่อเลือกรูปภาพ',
                loginBtn: 'ดำเนินการต่อ',
                toastError: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                placeholder: 'กรอกหมายเลขคำสั่งซื้อ (1111)',
                toastOrderLoaded: 'โหลดออเดอร์เรียบร้อย! คลิก "เลือกรูป" เพื่อกำหนดรูป',
                toastInvalidCode: 'ทดสอบ: ใช้รหัส 1111 เท่านั้น',
                toastPhotoUsed: 'รูป #${num} ถูกใช้ไปแล้ว',
                toastAllFilled: 'ครบทุกตำแหน่งแล้ว',
                toastConfirm: 'บันทึกการเลือกรูปแล้ว!',
                coverLabel: 'รูปปก',
                backLabel: 'รูปปกหลัง',
                interiorLabel: 'รูปภายใน'
            }
        };
        
        let currentLang = 'en';
        
        function updateLanguage() {
            document.getElementById('title').textContent = translations[currentLang].title;
            document.getElementById('subtitle').textContent = translations[currentLang].subtitle;
            document.getElementById('loginBtn').textContent = translations[currentLang].loginBtn;
            document.getElementById('orderNumberInput').placeholder = translations[currentLang].placeholder;
            
            const icon = document.getElementById('lang-icon');
            const text = document.getElementById('lang-text');
            
            if (currentLang === 'en') {
                icon.textContent = '🇬🇧';
                text.textContent = 'EN';
            } else {
                icon.textContent = '🇹🇭';
                text.textContent = 'TH';
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // Initialize Supabase
        async function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: { persistSession: false }
            });
            await loadProductsFromSupabase();
        }
        
        // Load all products from Supabase
        async function loadProductsFromSupabase() {
            try {
                console.log('Loading products from Supabase...');
                
                // Load product cards
                const { data: productCards, error: productsError } = await supabaseClient
                    .from('product_cards')
                    .select('*');
                
                if (productsError) throw productsError;
                
                // Load packages
                const { data: packages, error: packagesError } = await supabaseClient
                    .from('packages_with_price')
                    .select('*');
                
                if (packagesError) console.warn('Packages error:', packagesError);
                
                // Process all products with pose field
                allProducts = [];
                
                if (productCards) {
                    productCards.forEach(card => {
                        let poseCount = 0;
                        
                        // Try to get pose from variants
                        let variants = [];
                        try {
                            if (card.variants) {
                                variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                                if (variants.length > 0 && variants[0].pose) {
                                    poseCount = parseInt(variants[0].pose);
                                }
                            }
                        } catch(e) {}
                        
                        // If no pose in variants, try card field
                        if (!poseCount && card.pose) poseCount = parseInt(card.pose);
                        if (!poseCount && card.total_photos) poseCount = parseInt(card.total_photos);
                        
                        allProducts.push({
                            id: card.card_id || card.id,
                            sku: card.sku,
                            name_en: card.name_en,
                            name_th: card.name_th,
                            pose: poseCount || 0,
                            image_url: card.cover_image,
                            price: card.price
                        });
                    });
                }
                
                // Add packages
                if (packages) {
                    packages.forEach(pkg => {
                        let totalPhotos = pkg.total_photos || 0;
                        if (!totalPhotos && pkg.contents) {
                            try {
                                const contents = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                                totalPhotos = contents.reduce((sum, item) => sum + (item.qty || 1), 0);
                            } catch(e) {}
                        }
                        
                        allProducts.push({
                            id: pkg.id || `pkg_${pkg.sku}`,
                            sku: pkg.sku,
                            name_en: pkg.name_en,
                            name_th: pkg.name_th,
                            pose: totalPhotos || 0,
                            image_url: pkg.image_url,
                            isPackage: true,
                            price: pkg.price
                        });
                    });
                }
                
                console.log(`Loaded ${allProducts.length} products from Supabase`);
                console.log('Products with pose:', allProducts.filter(p => p.pose > 0).map(p => ({ sku: p.sku, pose: p.pose })));
                
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Error loading products from database');
            }
        }
        
        // Check order
        async function checkOrder() {
            const orderCode = document.getElementById('orderNumberInput').value.trim() || 
                              document.getElementById('orderNumber').value.trim();
            
            if (!orderCode) {
                showToast(translations[currentLang].toastError);
                return;
            }
            
            if (orderCode === '1111') {
                await loadOrderProducts(orderCode);
                // Hide login screen and show order info
                document.getElementById('loginScreen').style.display = 'none';
                const banner = document.getElementById('orderInfoBanner');
                const activeOrderSpan = document.getElementById('activeOrderCode');
                if (banner && activeOrderSpan) {
                    activeOrderSpan.textContent = orderCode;
                    banner.style.display = 'flex';
                }
                showToast(translations[currentLang].toastOrderLoaded);
            } else {
                showToast(translations[currentLang].toastInvalidCode);
            }
        }
        
        async function loadOrderProducts(orderCode) {
            // Find products from Supabase data that match the mock order
            const orderItems = [];
            
            for (const sku of mockOrderSkus) {
                const matchedProduct = allProducts.find(p => p.sku === sku);
                if (matchedProduct) {
                    orderItems.push({
                        sku: matchedProduct.sku,
                        productId: matchedProduct.id,
                        productName: matchedProduct.name_en || matchedProduct.name_th || matchedProduct.sku,
                        pose: matchedProduct.pose || 10,
                        quantity: 1
                    });
                } else {
                    // Fallback if product not found in database
                    orderItems.push({
                        sku: sku,
                        productId: null,
                        productName: sku,
                        pose: 10,
                        quantity: 1
                    });
                }
            }
            
            currentOrder = { orderNumber: orderCode, items: orderItems };
        }
        
        function openPhotoModal() {
            if (!currentOrder) {
                showToast('Please enter order code first');
                return;
            }
            
            const modal = document.getElementById('photoModal');
            const modalOrderSpan = document.getElementById('modalOrderNumber');
            
            modalOrderSpan.textContent = currentOrder.orderNumber;
            
            // Initialize assignments based on product pose
            photoAssignments = {};
            currentOrder.items.forEach(item => {
                const totalSlots = item.pose || 10;
                photoAssignments[item.sku] = {
                    cover: null,
                    back: null,
                    interior: [],
                    totalSlots: totalSlots,
                    productName: item.productName,
                    pose: totalSlots
                };
            });
            
            renderModalProducts();
            modal.classList.add('active');
        }
        
        function renderModalProducts() {
            const productsListDiv = document.getElementById('modalProductsList');
            if (!productsListDiv) return;
            
            productsListDiv.innerHTML = '';
            
            currentOrder.items.forEach(item => {
                const assignment = photoAssignments[item.sku];
                const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
                const remaining = assignment.totalSlots - currentCount;
                const safeSku = item.sku.replace(/[-\s]/g, '_');
                
                const productDiv = document.createElement('div');
                productDiv.className = 'order-product-item';
                productDiv.innerHTML = `
                    <div class="product-header">
                        <div>
                            <span class="product-name">${escapeHtml(item.productName)}</span>
                            <span class="product-sku-badge" style="margin-left: 0.5rem;">${item.sku}</span>
                        </div>
                        <div>
                            <span class="photo-count-badge">📷 Total: ${assignment.totalSlots} photos</span>
                            <span class="photo-count-badge" style="background: #64748b; margin-left: 0.5rem;">✓ ${currentCount}/${assignment.totalSlots}</span>
                        </div>
                    </div>
                    <div class="photo-assignment-area">
                        <div class="slot-row">
                            <span class="slot-label">📘 ${translations[currentLang].coverLabel}:</span>
                            ${assignment.cover ? 
                                `<div class="assigned-photo">Photo #${assignment.cover} <button onclick="removePhotoFromSlot('${item.sku}', 'cover')" style="background:none; border:none; cursor:pointer; font-size:1rem;">✕</button></div>` :
                                `<div class="photo-input-group">
                                    <input type="number" id="cover-input-${safeSku}" placeholder="Photo #" min="1" max="999">
                                    <button class="btn-small" onclick="assignPhotoToSlot('${item.sku}', 'cover')">Set</button>
                                </div>`
                            }
                        </div>
                        <div class="slot-row">
                            <span class="slot-label">📖 ${translations[currentLang].backLabel}:</span>
                            ${assignment.back ? 
                                `<div class="assigned-photo">Photo #${assignment.back} <button onclick="removePhotoFromSlot('${item.sku}', 'back')" style="background:none; border:none; cursor:pointer;">✕</button></div>` :
                                `<div class="photo-input-group">
                                    <input type="number" id="back-input-${safeSku}" placeholder="Photo #" min="1" max="999">
                                    <button class="btn-small" onclick="assignPhotoToSlot('${item.sku}', 'back')">Set</button>
                                </div>`
                            }
                        </div>
                        <div class="slot-row">
                            <span class="slot-label">🖼️ ${translations[currentLang].interiorLabel} (${assignment.interior.length}/${assignment.totalSlots - (assignment.cover ? 1 : 0) - (assignment.back ? 1 : 0)}):</span>
                            <div style="flex:1">
                                <div class="photo-input-group" style="margin-bottom: 0.5rem;">
                                    <input type="number" id="interior-input-${safeSku}" placeholder="Photo #" min="1" max="999">
                                    <button class="btn-small" onclick="addInteriorPhoto('${item.sku}')">Add</button>
                                    <button class="btn-small-outline" onclick="randomFillRemaining('${item.sku}')">🎲 Random Fill</button>
                                </div>
                                <div class="interior-list" id="interior-list-${safeSku}">
                                    ${assignment.interior.map((num, idx) => `
                                        <div class="photo-chip">
                                            #${num}
                                            <button onclick="removeInteriorPhoto('${item.sku}', ${idx})">✕</button>
                                        </div>
                                    `).join('')}
                                </div>
                                ${remaining > 0 ? `<div style="margin-top: 0.5rem; font-size: 0.75rem; color: #f59e0b;">⚠️ ${remaining} more photo(s) needed</div>` : '<div style="margin-top: 0.5rem; color: #10b981;">✓ All slots filled!</div>'}
                            </div>
                        </div>
                    </div>
                `;
                productsListDiv.appendChild(productDiv);
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Global functions for modal
        window.assignPhotoToSlot = function(sku, position) {
            const safeSku = sku.replace(/[-\s]/g, '_');
            const input = document.getElementById(`${position}-input-${safeSku}`);
            if (!input) return;
            
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1) {
                showToast('Please enter a valid photo number');
                return;
            }
            
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            // Check if photo already used in this order
            let isUsed = false;
            Object.values(photoAssignments).forEach(assign => {
                if (assign.cover === photoNum) isUsed = true;
                if (assign.back === photoNum) isUsed = true;
                if (assign.interior.includes(photoNum)) isUsed = true;
            });
            
            if (isUsed) {
                showToast(translations[currentLang].toastPhotoUsed.replace('${num}', photoNum));
                return;
            }
            
            if (position === 'cover') {
                assignment.cover = photoNum;
            } else if (position === 'back') {
                assignment.back = photoNum;
            }
            
            input.value = '';
            renderModalProducts();
        };
        
        window.addInteriorPhoto = function(sku) {
            const safeSku = sku.replace(/[-\s]/g, '_');
            const input = document.getElementById(`interior-input-${safeSku}`);
            if (!input) return;
            
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1) {
                showToast('Please enter a valid photo number');
                return;
            }
            
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            // Check if photo already used
            let isUsed = false;
            Object.values(photoAssignments).forEach(assign => {
                if (assign.cover === photoNum) isUsed = true;
                if (assign.back === photoNum) isUsed = true;
                if (assign.interior.includes(photoNum)) isUsed = true;
            });
            
            if (isUsed) {
                showToast(translations[currentLang].toastPhotoUsed.replace('${num}', photoNum));
                return;
            }
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            if (currentCount >= assignment.totalSlots) {
                showToast(translations[currentLang].toastAllFilled);
                return;
            }
            
            assignment.interior.push(photoNum);
            input.value = '';
            renderModalProducts();
        };
        
        window.removePhotoFromSlot = function(sku, position) {
            const assignment = photoAssignments[sku];
            if (assignment) {
                if (position === 'cover') assignment.cover = null;
                if (position === 'back') assignment.back = null;
            }
            renderModalProducts();
        };
        
        window.removeInteriorPhoto = function(sku, index) {
            const assignment = photoAssignments[sku];
            if (assignment && assignment.interior[index]) {
                assignment.interior.splice(index, 1);
                renderModalProducts();
            }
        };
        
        window.randomFillRemaining = function(sku) {
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            const needed = assignment.totalSlots - currentCount;
            
            if (needed <= 0) {
                showToast(translations[currentLang].toastAllFilled);
                return;
            }
            
            // Get all used numbers
            const usedNumbers = new Set();
            Object.values(photoAssignments).forEach(assign => {
                if (assign.cover) usedNumbers.add(assign.cover);
                if (assign.back) usedNumbers.add(assign.back);
                assign.interior.forEach(n => usedNumbers.add(n));
            });
            
            // Generate random numbers not used
            const available = [];
            for (let i = 1; i <= 999; i++) {
                if (!usedNumbers.has(i)) available.push(i);
                if (available.length >= needed) break;
            }
            
            // Shuffle
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            
            const toAdd = available.slice(0, needed);
            toAdd.forEach(num => assignment.interior.push(num));
            
            renderModalProducts();
            showToast(`Added ${toAdd.length} random photos`);
        };
        
        function confirmPhotoSelection() {
            let summary = '📸 PHOTO SELECTION CONFIRMED\n\n';
            for (const [sku, assign] of Object.entries(photoAssignments)) {
                summary += `━━━ ${sku} (${assign.totalSlots} photos) ━━━\n`;
                summary += `📘 Cover: ${assign.cover || '❌ NOT SET'}\n`;
                summary += `📖 Back: ${assign.back || '❌ NOT SET'}\n`;
                summary += `🖼️ Interior: ${assign.interior.length}/${assign.totalSlots - (assign.cover ? 1 : 0) - (assign.back ? 1 : 0)}\n`;
                if (assign.interior.length > 0) {
                    summary += `   Photos: ${assign.interior.join(', ')}\n`;
                }
                summary += '\n';
            }
            alert(summary);
            showToast(translations[currentLang].toastConfirm);
            closePhotoModal();
        }
        
        function closePhotoModal() {
            document.getElementById('photoModal').classList.remove('active');
        }
        
        // Event listeners
        document.getElementById('langToggle').addEventListener('click', function() {
            currentLang = currentLang === 'en' ? 'th' : 'en';
            updateLanguage();
            if (currentOrder) renderModalProducts();
        });
        
        document.getElementById('loginBtn').addEventListener('click', checkOrder);
        document.getElementById('checkOrderBtn').addEventListener('click', checkOrder);
        document.getElementById('orderNumberInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkOrder();
        });
        document.getElementById('orderNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkOrder();
        });
        document.getElementById('openPhotoSelectionBtn').addEventListener('click', openPhotoModal);
        document.getElementById('closeModalBtn').addEventListener('click', closePhotoModal);
        document.getElementById('confirmSelectionBtn').addEventListener('click', confirmPhotoSelection);
        
        updateLanguage();
        initSupabase();
    </script>
</body>
</html>
