        .main-content {

        .category-filter {

            font-weight: 600;
            font-size: 0.85rem;
            outline: none;

            height: 42px;
            padding: 0 0.8rem;
            min-width: 70px;
        }

            font-size: 0.5rem;
            font-weight: 500;
            background: #f3f4f6;

            font-size: 0.55rem;

            color: #dc2626;
            background: var(--red-light);
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
            max-width: 120px;
            text-align: center;
        }

        .global-actions {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--teal);
            font-size: 1.1rem;
        }

        @media (max-width: 700px) {
            .slots-row { gap: 0.6rem; }
            .oval { height: 38px; font-size: 0.75rem; min-width: 60px; padding: 0 0.5rem; }
            .product-image { width: 55px; height: 55px; }
            .product-title { font-size: 0.9rem; }
            .slot-note { font-size: 0.5rem; max-width: 100px; }
        }
    </style>
</head>

    function t(key) { return trans[currentLang][key] || trans.en[key]; }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO && Number.isInteger(n); }

    function isUsedInProduct(prodKey, idx, num) {
        const a = assignments[prodKey];
        if (!a) return false;
        for (let i = 0; i < a.values.length; i++) {
            if (i !== idx && a.values[i] === num) return true;
        }
        return false;
    }

    function setValue(prodKey, idx, val) {
        const a = assignments[prodKey];
        if (!a) return false;
        if (a.disabledSlots && a.disabledSlots[idx]) {
            toast(t('notSelectable'));
            return false;
        }
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, idx, val)) { toast(t('dup')); return false; }
        a.values[idx] = val;
        render();
        return true;
    }

    function getOvalWidth(poseCount) {
        if (poseCount <= 2) return 95;
        if (poseCount <= 3) return 88;
        if (poseCount <= 4) return 82;
        if (poseCount <= 6) return 76;
        if (poseCount <= 10) return 70;
        if (poseCount <= 16) return 64;
        return 58;
    }

    function getDirectImageUrl(imgUrl) {
        if (!imgUrl) return null;
        if (imgUrl.includes('i.postimg.cc')) return imgUrl;
        if (imgUrl.includes('disk.yandex.ru')) {
            if (imgUrl.includes('/i/')) return imgUrl;
            if (imgUrl.includes('/d/')) return imgUrl.replace('/d/', '/i/');
        }
        return imgUrl;
    }

    function showImageModal(imgUrl, productName) {
        const directUrl = getDirectImageUrl(imgUrl);
        if (!directUrl) { toast('No image available'); return; }
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        const img = document.createElement('img');
        img.src = directUrl;
        img.alt = productName;
        img.onerror = () => { modal.innerHTML = '<div style="color:white; text-align:center; padding:2rem;">❌ Image not available</div>'; };
        modal.appendChild(img);
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }

    // Parse architecture sequence and create slot configurations
    function parseArchitectureSequence(sequence, notes, totalPhotos) {
        if (!sequence || sequence === 'Not specified') {
            // Default: create generic slots
            return Array(totalPhotos).fill(null).map((_, i) => ({
                type: 'photo',
                label: `Photo ${i + 1}`,
                note: null,
                disabled: false
            }));
        }

        const slots = [];
        const parts = sequence.split(',').map(p => p.trim());
        
        for (let i = 0; i < parts.length && i < totalPhotos; i++) {
            let type = 'photo';
            let label = '';
            let note = null;
            let disabled = false;
            
            const part = parts[i].toLowerCase();
            
            if (part.includes('cover') || part.includes('обложк')) {
                if (part.includes('back') || part.includes('задн')) {
                    type = 'backCover';
                    label = t('backCover');
                } else if (part.includes('front') || part.includes('передн')) {
                    type = 'frontCover';
                    label = t('frontCover');
                } else {
                    type = 'cover';
                    label = t('cover');
                }
            } else if (part.includes('internal') || part.includes('внутр')) {
                type = 'internal';
                label = t('internal');
            } else if (part.includes('design')) {
                type = 'design';
                label = t('design');
            } else if (part.includes('portr') || part.includes('портрет')) {
                type = 'portrait';
                label = t('portrait');
            } else if (part.includes('group')) {
                type = 'group';
                label = t('group');
                // Check if group photo should NOT be selected
                if (notes && (notes.toLowerCase().includes('group photo is not selected') || 
                              notes.toLowerCase().includes('групповое фото не выбирается'))) {
                    disabled = true;
                    note = t('notSelectable');
                }
            } else if (part.includes('logo') || part.includes('бренд')) {
                type = 'logo';
                label = t('logo');
            } else if (part.includes('brand')) {
                type = 'brand';
                label = t('brand');
            } else {
                type = 'photo';
                label = `Photo ${i + 1}`;
            }
            
            slots.push({
                type: type,
                label: label,
                note: note,
                disabled: disabled,
                originalSequence: parts[i]
            });
        }
        
        // Fill remaining slots if totalPhotos > parts length
        while (slots.length < totalPhotos) {
            slots.push({
                type: 'photo',
                label: `Photo ${slots.length + 1}`,
                note: null,
                disabled: false
            });
        }
        
        return slots;
    }

    async function loadProductsFromSupabase() {
        console.log('🚀 Initializing Supabase client...');
        
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client initialized');
            
            isLoading = true;
            render();
            
            // Fetch products from product_cards table
            console.log('📥 Fetching products from product_cards...');
            const { data: productCardsData, error: productCardsError } = await supabaseClient
                .from('product_cards')
                .select('*');
            
            if (productCardsError) throw productCardsError;
            console.log(`✅ Fetched ${productCardsData?.length || 0} products`);
            
            let processedProducts = [];
            
            if (productCardsData) {
                productCardsData.forEach(card => {
                    // Parse variants to get pose count
                    let pose = 1;
                    let variants = [];
                    try {
                        if (card.variants) {
                            variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                            if (variants.length > 0 && variants[0].pose) {
                                pose = Math.min(parseInt(variants[0].pose), 50);
                            }
                        }
                    } catch(e) { console.warn(e); }
                    
                    if (card.total_photos) pose = Math.min(parseInt(card.total_photos), 50);
                    if (card.pose) pose = Math.min(parseInt(card.pose), 50);
                    
                    // Determine category from SKU prefix
                    let category = 'other';
                    const sku = (card.sku || '').toUpperCase();
                    if (sku.startsWith('A')) category = 'acrylic';
                    else if (sku.startsWith('W')) category = 'frame';
                    else if (sku.startsWith('C')) category = 'canvas';
                    else if (sku.startsWith('F')) category = 'photoBox';
                    else if (sku.startsWith('B')) category = 'book';
                    else if (sku.startsWith('K')) category = 'calendar';
                    else if (sku.startsWith('D')) category = 'mug';
                    else if (sku.startsWith('S')) category = 'standalone';
                    else if (sku.startsWith('E')) category = 'accessory';
                    else if (sku.startsWith('X')) category = 'poster';
                    else if (sku.startsWith('P')) category = 'print';
                    else if (sku.startsWith('J')) category = 'digital';
                    else if (sku.startsWith('ID')) category = 'id';
                    
                    // Parse architecture sequence
                    let architectureSequence = card.architecture_sequence || card.sequence || '';
                    let selectionNotes = card.selection_notes || card.mess || card.notes || '';
                    
                    const slotConfig = parseArchitectureSequence(architectureSequence, selectionNotes, pose);
                    
                    processedProducts.push({
                        id: card.card_id || `card_${card.sku}`,
                        sku: card.sku,
                        name_en: card.name_en || `Product ${card.sku}`,
                        name_th: card.name_th || `สินค้า ${card.sku}`,
                        name_ru: card.name_ru || card.name_en || `Товар ${card.sku}`,
                        category: category,
                        categoryName: getCategoryName(category),
                        size: card.size || '',
                        pose: pose,
                        image_url: card.cover_image || card.image || null,
                        architectureSequence: architectureSequence,
                        selectionNotes: selectionNotes,
                        slotConfig: slotConfig,
                        sort_order: card.sort_product || card.sort_order || 999
                    });
                });
            }
            
            productsDB = processedProducts.sort((a,b) => a.sort_order - b.sort_order);
            
            if (productsDB.length === 0) {
                productsDB = getDemoProductsWithArchitecture();
            }
            
            isLoading = false;
            toast(`✅ ${productsDB.length} products loaded`);
            
        } catch (error) {
            console.error('❌ Supabase error:', error);
            productsDB = getDemoProductsWithArchitecture();
            isLoading = false;
            toast(`⚠️ Using demo data (${productsDB.length} products)`);
        }
    }

    function getCategoryName(category) {
        const names = {
            acrylic: 'Acrylic Photo',
            frame: 'Float Frame',
            canvas: 'Canvas',
            photoBox: 'Photo Box & Frames',
            book: 'Books',
            calendar: 'Calendars',
            mug: 'Mugs & Bottles',
            standalone: 'Standalone & Stickers',
            accessory: 'Accessories',
            poster: 'Posters & Bags',
            print: 'Photo Prints',
            digital: 'Digital Photos',
            id: 'ID Photos',
            other: 'Other Products'
        };
        return names[category] || category;
    }

    function getDemoProductsWithArchitecture() {
        return [
            { sku: "A11", name_en: "Acrylic Photo 11x11", name_th: "ภาพอะคริลิค 11x11", name_ru: "Акриловое фото 11x11", category: "acrylic", categoryName: "Acrylic Photo", size: "11x11 inch", pose: 1, architectureSequence: "1. group", selectionNotes: "Group photo is selected.", slotConfig: [{type:"group", label:"Group", note:null, disabled:false}] },
            { sku: "A12", name_en: "Acrylic Photo 12x12", name_th: "ภาพอะคริลิค 12x12", name_ru: "Акриловое фото 12x12", category: "acrylic", size: "12x12 inch", pose: 1, architectureSequence: "1. portr", selectionNotes: "", slotConfig: [{type:"portrait", label:"Portrait", note:null, disabled:false}] },
            { sku: "A14", name_en: "Acrylic Photo 14x14", name_th: "ภาพอะคริลิค 14x14", name_ru: "Акриловое фото 14x14", category: "acrylic", size: "14x14 inch", pose: 2, architectureSequence: "1. group+portr, 2. brand", selectionNotes: "Group photo is not selected. One image contains group and portrait with logo.", slotConfig: [{type:"group", label:"Group+Portrait", note:"Contains group+portrait+logo", disabled:false}, {type:"brand", label:"Brand", note:null, disabled:false}] },
            { sku: "B11", name_en: "Photo Book 16 Pages", name_th: "อัลบั้มรูป 16 หน้า", name_ru: "Фотоальбом 16 страниц", category: "book", size: "8x8 inch", pose: 16, architectureSequence: "Back Cover, Front Cover", selectionNotes: "Two main photos for front/back cover of 16-page book", slotConfig: [{type:"backCover", label:"Back Cover", note:null, disabled:false}, {type:"frontCover", label:"Front Cover", note:null, disabled:false}, ...Array(14).fill({type:"internal", label:"Internal", note:null, disabled:false})] },
            { sku: "B12", name_en: "Photo Book 14 Pages", name_th: "อัลบั้มรูป 14 หน้า", name_ru: "Фотоальбом 14 страниц", category: "book", size: "8x8 inch", pose: 14, architectureSequence: "Back Cover, Front Cover, 12 internal photos", selectionNotes: "Two cover photos + 12 internal pages", slotConfig: [{type:"backCover", label:"Back Cover", note:null, disabled:false}, {type:"frontCover", label:"Front Cover", note:null, disabled:false}, ...Array(12).fill({type:"internal", label:"Internal", note:null, disabled:false})] },
            { sku: "K15", name_en: "Calendar with Group Photo", name_th: "ปฏิทินพร้อมรูปกลุ่ม", name_ru: "Календарь с групповым фото", category: "calendar", size: "A4", pose: 12, architectureSequence: "Group photo selection required", selectionNotes: "Choose a group photo", slotConfig: Array(12).fill(null).map((_,i) => ({type: i===0 ? "group" : "photo", label: i===0 ? "Group Photo" : `Photo ${i+1}`, note: i===0 ? "Group photo required" : null, disabled: false})) }
        ];
    }

    function loadRandomOrder() {
        if (productsDB.length === 0) return;
        
        let filtered = currentCategory === 'all' ? productsDB : productsDB.filter(p => p.category === currentCategory);
        if (filtered.length === 0) filtered = productsDB;
        
        const shuffled = [...filtered];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        const selected = shuffled.slice(0, Math.min(10, shuffled.length));
        
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `${prod.sku}_${Date.now()}_${Math.random()}`;
            const poseCount = prod.pose;
            const slotConfig = prod.slotConfig || Array(poseCount).fill(null).map((_,i) => ({type:'photo', label:`Photo ${i+1}`, note:null, disabled:false}));
            
            const disabledSlots = slotConfig.map(slot => slot.disabled === true);
            const slotNotes = slotConfig.map(slot => slot.note);
            const slotTypes = slotConfig.map(slot => slot.type);
            const slotLabels = slotConfig.map(slot => slot.label);
            
            assignments[key] = {
                key: key,
                sku: prod.sku,
                nameEn: prod.name_en,
                nameTh: prod.name_th,
                nameRu: prod.name_ru,
                category: prod.category,
                categoryName: prod.categoryName,
                size: prod.size,
                pose: poseCount,
                image: prod.image_url,
                values: new Array(poseCount).fill(null),
                disabledSlots: disabledSlots,
                slotNotes: slotNotes,
                slotTypes: slotTypes,
                slotLabels: slotLabels
            };
        }
        render();
        toast(t('ok'));
    }

    function handleOvalClick(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a) return;
        if (a.disabledSlots && a.disabledSlots[idx]) {
            toast(t('notSelectable'));
            return;
        }
        
        const ovalDiv = document.getElementById(`oval_${prodKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${idx}`) return;
        
        const width = ovalDiv.offsetWidth;
        const height = ovalDiv.offsetHeight;
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${width}px`;
        input.style.height = `${height}px`;
        input.placeholder = t('selectPhoto');
        
        ovalDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setValue(prodKey, idx, newVal);
            } else if (isNaN(newVal) && currentVal !== null) {
                setValue(prodKey, idx, null);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') save();
        });
        
        editingSlot = `${prodKey}_${idx}`;
    }

    function getOvalClass(type, isFilled, isDisabled) {
        if (isDisabled) return 'oval disabled';
        let baseClass = 'oval';
        if (isFilled) baseClass += ' filled';
        if (type === 'cover' || type === 'frontCover' || type === 'backCover') baseClass += ' cover';
        if (type === 'internal') baseClass += ' internal';
        if (type === 'design') baseClass += ' design';
        return baseClass;
    }

    function render() {
        const container = document.getElementById('app');
        
        if (isLoading) {
            container.innerHTML = `<div class="login-card"><div class="loading">⏳ ${t('loading')}</div></div>`;
            return;
        }
        
        if (!currentOrder) {
            // Render category filter on login screen too
            const categories = ['all', 'acrylic', 'frame', 'canvas', 'photoBox', 'book', 'calendar', 'mug', 'standalone', 'accessory', 'poster', 'print'];
            
            let catsHtml = `<div class="category-filter">
                <span style="font-weight:600; margin-right:0.5rem;">${t('categories')}:</span>`;
            categories.forEach(cat => {
                const displayName = cat === 'all' ? t('all') : getCategoryName(cat);
                catsHtml += `<button class="category-btn ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${displayName}</button>`;
            });
            catsHtml += `</div>`;
            
            container.innerHTML = catsHtml + `<div class="login-card">
                <h3>${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.cat;
                    render();
                });
            });
            
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadRandomOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            totalSlots += a.values.length;
            totalFilled += a.values.filter(v => v !== null).length;
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ${currentOrder.number}</div>
            <div class="order-badge">${totalFilled}/${totalSlots}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : (currentLang === 'ru' ? asgn.nameRu : asgn.nameTh);
            const poseCount = asgn.pose;
            const ovalWidth = getOvalWidth(poseCount);
            const imageUrl = getDirectImageUrl(asgn.image);
            
            html += `<div class="product-card">
                <div class="product-content">
                    <div class="product-header">
                        <div class="product-info">
                            <div>
                                <span class="product-category">${asgn.categoryName}</span>
                                <span class="product-sku">${asgn.sku}</span>
                            </div>
                            <div class="product-title">${name}</div>
                            <div class="product-details">
                                ${asgn.size ? `<span class="product-size">📏 ${t('size')}: ${asgn.size}</span>` : ''}
                                <span class="product-pose">📷 ${t('pose')}: ${poseCount}</span>
                            </div>
                        </div>
                        ${imageUrl ? `<img class="product-image" src="${imageUrl}" alt="${name}" onerror="this.src='https://placehold.co/70x70?text=No+Image'" onclick="showImageModal('${imageUrl}', '${name.replace(/'/g, "\\'")}')" title="${t('viewPhoto')}">` : '<div style="width:70px; height:70px; background:#f0f0f0; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#999;">No img</div>'}
                    </div>
                    <div class="slots-container">`;
            
            // Group slots by sections if needed (covers first, then internal)
            html += `<div class="slots-row">`;
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isFilled = val !== null;
                const isDisabled = asgn.disabledSlots && asgn.disabledSlots[i];
                const slotType = asgn.slotTypes ? asgn.slotTypes[i] : 'photo';
                const slotLabel = asgn.slotLabels ? asgn.slotLabels[i] : `Slot ${i+1}`;
                const slotNote = asgn.slotNotes ? asgn.slotNotes[i] : null;
                const ovalClass = getOvalClass(slotType, isFilled, isDisabled);
                
                html += `<div class="slot-wrapper">
                    <div id="oval_${key}_${i}" class="${ovalClass}" 
                         style="width:${ovalWidth}px; height:42px;"
                         onclick="handleOvalClick('${key}', ${i}, ${val !== null ? val : 'null'})">${isFilled ? val : ''}</div>
                    <span class="slot-number">${slotLabel}</span>
                    ${slotNote ? `<span class="slot-note">📌 ${slotNote}</span>` : ''}
                </div>`;
            }
            html += `</div></div></div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════════\n   WHITE FOX STUDIO\n   PHOTO SELECTION\n═══════════════════════════\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : (currentLang === 'ru' ? a.nameRu : a.nameTh);
                summary += `\n📦 ${a.sku} — ${name}\n📏 ${t('size')}: ${a.size || '—'}  |  📷 ${t('pose')}: ${a.pose}\n`;
                for (let i = 0; i < a.values.length; i++) {
                    const slotLabel = a.slotLabels ? a.slotLabels[i] : `Slot ${i+1}`;
                    const isDisabled = a.disabledSlots && a.disabledSlots[i];
                    const disabledTag = isDisabled ? ` [${t('notSelectable')}]` : '';
                    summary += `   ${slotLabel.padEnd(15)}: ${a.values[i] || '❌'}${disabledTag}\n`;
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleOvalClick = handleOvalClick;
    window.showImageModal = showImageModal;

    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) {
            if (currentLang === 'en') iconSpan.innerText = '🇬🇧';
            else if (currentLang === 'ru') iconSpan.innerText = '🇷🇺';
            else iconSpan.innerText = '🇹🇭';
        }
        if (textSpan) {
            if (currentLang === 'en') textSpan.innerText = 'EN';
            else if (currentLang === 'ru') textSpan.innerText = 'RU';
            else textSpan.innerText = 'TH';
        }
        if (currentOrder) render();
        else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => {
        const langs = ['en', 'ru', 'th'];
        const currentIndex = langs.indexOf(currentLang);
        currentLang = langs[(currentIndex + 1) % langs.length];
        updateLang();
    });
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadRandomOrder();
        else toast(t('invalid'));
    });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });

    (async () => {
        await loadProductsFromSupabase();
        render();
        updateLang();
    })();
</script>
</body>
</html>
