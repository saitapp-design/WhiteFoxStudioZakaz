        }

            --wf-text: #1e2f3a;
            --wf-text-light: #4b5e6c;
            --wf-success: #2b8c5e;
            --wf-warning: #e6a017;
            --wf-disabled: #b9c7ce;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 6px 18px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--wf-teal);
        }

        .top-bar {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 44px;
            height: 44px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: var(--wf-teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            border: 2px solid var(--wf-teal);
            height: 48px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 220px;
            font-size: 1rem;
            outline: none;
            background: transparent;
        }

        .search-box button {
            background: var(--wf-teal);
            border: none;
            color: white;
            padding: 0 1.4rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--wf-teal);
            border-radius: 60px;
            padding: 0 1.3rem;
            height: 48px;
            font-weight: 600;
            color: var(--wf-teal);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: 75vh;
        }

        .login-card {
            background: white;
            max-width: 480px;
            margin: 2rem auto;
            padding: 2.5rem 2rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            border: 1px solid var(--wf-border);
        }

            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            border: 2px solid var(--wf-border);
            border-radius: 60px;
            margin: 1rem 0;
            text-align: center;
            outline: none;
        }

        .btn-primary {
            background: var(--wf-teal);
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        .order-header {
            background: white;
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid var(--wf-teal);
        }

        .order-badge {
            background: var(--wf-teal-light);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: var(--wf-teal);
        }

        .product-card {
            background: white;
            border-radius: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid var(--wf-border);
            overflow: hidden;
        }

        .product-header {
            background: white;
            padding: 1.2rem 1.8rem;
            border-bottom: 2px solid var(--wf-teal-light);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

            background: var(--wf-teal-light);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--wf-teal);
        }

        .product-name {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--wf-teal);
        }

            color: #6c757d;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;

            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
        }

            flex: 1;
            min-width: 200px;
            background: #fefefe;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid var(--wf-border);

            text-align: center;

            padding: 0.6rem 0.8rem;
            border: 2px solid var(--wf-border);
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;

            background: var(--wf-teal);
            color: white;
            border: none;
            padding: 0 1rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-clear {
            background: transparent;
            border: 1px solid #dc2626;
            color: #dc2626;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .disabled-slot {
            background: #f8f9fa;
            opacity: 0.7;
        }

        .disabled-slot .slot-input {
            background: #e9ecef;
            border-color: #dee2e6;
        }

        .info-note {
            font-size: 0.7rem;
            color: var(--wf-text-light);
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;

            padding: 1rem 1.8rem 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            border-top: 1px solid var(--wf-border);
        }

        .global-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .action-outline {
            background: transparent;
            border: 1.5px solid var(--wf-teal);
            color: var(--wf-teal);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--wf-teal);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 2000;
            display: none;

</head>

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2600);
    }
    
    function isValidPhoto(num) {
        return !isNaN(num) && num >= MIN_PHOTO && num <= MAX_PHOTO;
    }
    
    function isPhotoUsedInProduct(productKey, photoNum) {
        const assign = productAssignments[productKey];
        if (!assign) return false;
        return assign.slotValues.includes(photoNum);
    }
    
    function setPhotoSlot(productKey, slotIndex, photoNum) {
        const assign = productAssignments[productKey];
        if (!assign || !assign.userSelectable) return false;
        if (!isValidPhoto(photoNum)) {
            showToast(t('invalidRange'));
            return false;
        }
        // check duplicate within same product
        if (isPhotoUsedInProduct(productKey, photoNum) && assign.slotValues[slotIndex] !== photoNum) {
            showToast(t('duplicateWarning'));
            return false;
        }
        assign.slotValues[slotIndex] = photoNum;
        renderOrderInterface();
        return true;
    }
    
    function clearSlot(productKey, slotIndex) {
        const assign = productAssignments[productKey];
        if (assign && assign.userSelectable) {
            assign.slotValues[slotIndex] = null;
            renderOrderInterface();
        }
    }
    
    function loadDemoOrder() {
        // pick 4-7 random products that exist, but ensure we show W16 etc.
        let filtered = productCatalog.filter(p => p.userSelectable !== undefined);
        // shuffle and pick
        const shuffled = [...filtered];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const selectedCount = Math.min(5 + Math.floor(Math.random() * 4), shuffled.length);
        const selectedProducts = shuffled.slice(0, selectedCount);
        // ensure W16 is included for demo (float frame design with 3 poses)
        if (!selectedProducts.some(p => p.article === "W16")) {
            const w16 = productCatalog.find(p => p.article === "W16");
            if (w16 && selectedProducts.length > 0) selectedProducts[0] = w16;
            else selectedProducts.push(w16);
        }
        currentOrder = { orderNumber: "1111", products: selectedProducts };
        productAssignments = {};
        for (let prod of selectedProducts) {
            const key = `prod_${prod.article}_${Date.now()}_${Math.random()}`;
            const slotCount = prod.pose > 0 ? prod.pose : 1;
            productAssignments[key] = {
                id: key,
                article: prod.article,
                nameEn: prod.name_en,
                nameTh: prod.name_th,
                size: prod.size,
                pose: prod.pose,
                userSelectable: prod.userSelectable,
                slotValues: new Array(slotCount).fill(null),
                productRef: prod
            };
        }
        renderOrderInterface();
        showToast(t('loadOk'));
    }
    
    function renderOrderInterface() {
        const container = document.getElementById('appContainer');
        if (!currentOrder) return;
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(productAssignments)) {
            totalSlots += a.slotValues.length;
            totalFilled += a.slotValues.filter(v => v !== null).length;
        }
        let html = `<div class="order-header">
            <div class="order-badge">📦 Order: ${currentOrder.orderNumber}</div>
            <div class="order-badge">🎯 ${totalFilled}/${totalSlots} ${t('totalFilled')}</div>
            <button class="action-outline" id="backToLoginBtn">${t('back')}</button>
        </div>`;
        
        for (let [key, assign] of Object.entries(productAssignments)) {
            const prodName = currentLang === 'en' ? assign.nameEn : assign.nameTh;
            const selectable = assign.userSelectable;
            const slotCount = assign.slotValues.length;
            
            html += `<div class="product-card">
                <div class="product-header">
                    <div>
                        <span class="product-sku">${assign.article}</span>
                        <span class="product-name">${prodName || assign.article}</span>
                        <span class="badge-disabled" style="margin-left: 8px;">📐 ${assign.size}</span>
                        ${!selectable ? `<span class="badge-disabled" style="background:#f1f3f4;">🔒 ${t('notSelectable')}</span>` : `<span class="badge-disabled" style="background:var(--wf-teal-light);">📷 ${slotCount} ${slotCount > 1 ? 'poses' : 'pose'}</span>`}
                    </div>
                    <div class="order-badge">${assign.slotValues.filter(v=>v!==null).length}/${slotCount}</div>
                </div>
                <div class="photo-slots-grid">`;
            
            // generate slot columns
            for (let i = 0; i < slotCount; i++) {
                const currentVal = assign.slotValues[i];
                const slotDisplay = currentVal ? currentVal : '—';
                const isDisabled = !selectable;
                html += `<div class="slot-item ${isDisabled ? 'disabled-slot' : ''}">
                    <div class="slot-label">
                        <span>${t('slotLabel')} ${i+1}</span>
                        <span class="slot-number">${assign.pose > 0 ? `${i+1}/${slotCount}` : ''}</span>
                    </div>`;
                if (!selectable) {
                    html += `<div class="photo-value">📸 ${t('groupAuto')}</div>
                            <div class="info-note">✨ ${currentLang === 'en' ? 'Pre-selected by studio' : 'เลือกโดยสตูดิโอ'}</div>`;
                } else {
                    if (currentVal) {
                        html += `<div class="photo-value">#${currentVal}</div>
                                <button class="btn-clear" onclick="window.clearSlotHandler('${key}', ${i})">${t('clear')}</button>`;
                    } else {
                        html += `<div class="input-group">
                                    <input type="number" id="input_${key}_${i}" class="slot-input" placeholder="${MIN_PHOTO}-${MAX_PHOTO}" min="${MIN_PHOTO}" max="${MAX_PHOTO}">
                                    <button class="btn-set" onclick="window.setSlotHandler('${key}', ${i})">${t('set')}</button>
                                </div>`;
                    }
                    html += `<div class="info-note">💡 ${currentLang === 'en' ? `Enter photo number (${MIN_PHOTO}–${MAX_PHOTO})` : `กรอกหมายเลขรูป (${MIN_PHOTO}–${MAX_PHOTO})`}</div>`;
                }
                html += `</div>`;
            }
            html += `</div><div class="product-footer"></div></div>`;
        }
        html += `<div class="global-actions"><button class="btn-primary" id="globalConfirmBtn" style="width:auto; padding:0.8rem 2rem;">${t('confirmAll')}</button></div>`;
        container.innerHTML = html;
        document.getElementById('backToLoginBtn')?.addEventListener('click', () => { currentOrder = null; showLoginScreen(); });
        document.getElementById('globalConfirmBtn')?.addEventListener('click', () => confirmAllSelections());
    }
    
    function confirmAllSelections() {
        let summary = "📸 WHITE FOX SELECTION\n━━━━━━━━━━━━━━━━━━━━\n";
        for (let [key, assign] of Object.entries(productAssignments)) {
            const name = currentLang === 'en' ? assign.nameEn : assign.nameTh;
            summary += `\n📌 ${assign.article} — ${name}\n   📐 ${assign.size}\n   🖼️ Slots: ${assign.slotValues.length}\n`;
            for (let i = 0; i < assign.slotValues.length; i++) {
                const val = assign.slotValues[i];
                summary += `      Photo ${i+1}: ${val ? val : '❌ NOT SET'}\n`;
            }
        }
        alert(summary);
        showToast(t('saved'));
    }
    
    function showLoginScreen() {
        const container = document.getElementById('appContainer');
        container.innerHTML = `<div class="login-card">
            <h2>${t('enterTitle')}</h2>
            <p>${t('enterSub')}</p>
            <input type="text" id="orderCodeInput" class="order-input" placeholder="1111" value="1111">
            <button class="btn-primary" id="loginExecuteBtn">${t('loginBtn')}</button>
        </div>`;
        document.getElementById('loginExecuteBtn')?.addEventListener('click', () => {
            const code = document.getElementById('orderCodeInput').value.trim();
            if (code === '1111') {
                loadDemoOrder();
            } else {
                showToast(t('invalidCode'));
            }
        });
        document.getElementById('orderCodeInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginExecuteBtn')?.click(); });
    }
    
    window.setSlotHandler = (productKey, slotIdx) => {
        const input = document.getElementById(`input_${productKey}_${slotIdx}`);
        if (input) {
            const rawValue = parseInt(input.value);
            if (!isNaN(rawValue)) {
                setPhotoSlot(productKey, slotIdx, rawValue);
                input.value = '';
            } else {
                showToast(t('invalidRange'));
            }
        }
    };
    
    window.clearSlotHandler = (productKey, slotIdx) => {
        clearSlot(productKey, slotIdx);
    };
    
    function updateLanguageUI() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.textContent = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.textContent = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) renderOrderInterface();
        else showLoginScreen();
    }
    
    document.getElementById('langToggleBtn')?.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        updateLanguageUI();
    });
    document.getElementById('checkOrderBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderNumberMain').value.trim();
        if (code === '1111') {
            loadDemoOrder();
        } else {
            showToast(t('invalidCode'));
        }
    });
    document.getElementById('orderNumberMain')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkOrderBtn')?.click();
    });
    
    showLoginScreen();
    updateLanguageUI();
</script>
</body>
</html>
