<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Fox Studio - Photo Selection</title>
    <style>
        /* ===== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ===== */
        :root {
            --accent-primary: #007883;
            --accent-hover: #0a6570;
            --accent-light: rgba(0, 120, 131, 0.1);
            --bg-secondary: #ffffff;
            --bg-form: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0, 120, 131, 0.2);
            --success: #2e7d5e;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8f8f8;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-secondary);
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 3px solid var(--accent-primary);
        }

        .top-bar {
            padding: 0.8rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: var(--bg-secondary);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-primary);
            letter-spacing: 0.5px;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-container {
            flex: 1;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 0.1rem 0.1rem 0.1rem 1.5rem;
            border: 2px solid var(--accent-primary);
            height: 48px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(0,120,131,0.1);
        }

        .search-box:focus-within {
            box-shadow: 0 4px 20px var(--accent-light);
            border-color: var(--accent-hover);
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            width: 100%;
            outline: none;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-box button {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            height: 40px;
        }

        .search-box button:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--accent-primary);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 1rem;
            cursor: pointer;
            color: var(--accent-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            height: 48px;
            min-width: 90px;
            transition: all 0.2s;
        }

        .lang-toggle:hover {
            background: var(--accent-primary);
            color: white;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 120px);
        }

        /* Login Screen */
        .login-screen {
            max-width: 500px;
            margin: 3rem auto;
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .login-screen h1 {
            font-size: 2.2rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .order-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            margin-bottom: 1rem;
        }

        .order-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        /* Order Header */
        .order-header {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 2px solid var(--accent-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .order-info {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .order-badge {
            background: var(--accent-light);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .back-btn {
            background: transparent;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--accent-light);
        }

        /* Product Cards */
        .product-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 2px solid var(--border-color);
            transition: all 0.2s;
        }

        .product-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        .product-title-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--accent-light);
        }

        .product-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .product-sku {
            background: var(--accent-light);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .photo-stats {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .total-photos-badge {
            background: var(--accent-primary);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .progress-badge {
            background: #e2e8f0;
            color: var(--text-secondary);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Assignment Sections */
        .assignment-section {
            margin-top: 1.2rem;
        }

        .slot-group {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .slot-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .slot-header span:first-child {
            font-size: 1.2rem;
        }

        .required-badge {
            background: var(--accent-primary);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .optional-badge {
            background: #94a3b8;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .assigned-display {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            background: white;
            padding: 0.8rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .photo-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
            background: var(--accent-light);
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group input {
            width: 100px;
            padding: 0.6rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            font-size: 1rem;
        }

        .btn-small {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-small-outline {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-small-outline:hover {
            background: var(--accent-light);
        }

        .btn-remove {
            background: #fee2e2;
            color: #c44536;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .interior-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.8rem;
        }

        .photo-chip {
            background: var(--accent-light);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .photo-chip button {
            background: none;
            border: none;
            cursor: pointer;
            color: #c44536;
            font-weight: bold;
            font-size: 1rem;
        }

        .remaining-warning {
            margin-top: 0.8rem;
            padding: 0.5rem;
            background: #fff8e7;
            border-radius: 12px;
            color: var(--warning);
            font-size: 0.8rem;
            display: inline-block;
        }

        .complete-success {
            margin-top: 0.8rem;
            padding: 0.5rem;
            background: #e3f7e3;
            border-radius: 12px;
            color: var(--success);
            font-size: 0.8rem;
            display: inline-block;
        }

        /* Action Buttons */
        .product-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            justify-content: flex-end;
        }

        .global-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border-color);
        }

        .btn-large {
            padding: 0.8rem 2rem;
            font-size: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 20px var(--shadow-color);
            border: 2px solid white;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid var(--accent-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 0.8rem 1rem;
            }
            .right-actions {
                flex-direction: column;
            }
            .lang-toggle {
                width: 100%;
            }
            .main-content {
                padding: 1rem;
            }
            .order-header {
                flex-direction: column;
                text-align: center;
            }
            .product-title-section {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
        }
    </style>
</head>

        <div class="top-bar">

                <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox Studio">

            </div>
            
            <div class="right-actions">
                <div class="search-container">

                        <input type="text" id="orderNumber" placeholder="Order number (1111 for demo)">

                <button class="lang-toggle" id="langToggle">

        </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===================== SUPABASE CONFIG =====================
        const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
        
        let supabaseClient = null;
        let allProducts = [];
        let currentOrder = null;
        let photoAssignments = {};
        
        // Mock order items for demo code 1111 (will match with Supabase products)
        const mockOrderSkus = ['CAL-2025', 'PB-ALBUM', 'MAG-01'];
        
        // Translations
        const translations = {
            en: {
                title: 'Enter Order Number',
                subtitle: 'Please enter your order number to select photos',
                loginBtn: 'Continue',
                toastError: 'Please enter order number',
                placeholder: 'Enter order number (1111)',
                toastOrderLoaded: 'Order loaded! Select photos for each product below.',
                toastInvalidCode: 'Demo: Only order code 1111 is available',
                toastPhotoUsed: 'Photo #{num} is already used in this order',
                toastAllFilled: 'All slots are filled',
                toastConfirm: 'Photo selection saved!',
                cover: 'Cover Photo',
                back: 'Back Cover',
                interior: 'Interior Photos',
                required: 'required',
                optional: 'optional',
                setPhoto: 'Set',
                remove: 'Remove',
                randomFill: '🎲 Random Fill',
                resetProduct: 'Reset',
                confirmAll: '✅ Confirm All Selections',
                backToLogin: '← Back to Login',
                totalPhotos: 'Total Photos',
                filled: 'filled',
                moreNeeded: 'more photo(s) needed',
                complete: '✓ Complete!'
            },
            th: {
                title: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                subtitle: 'กรุณากรอกหมายเลขคำสั่งซื้อเพื่อเลือกรูปภาพ',
                loginBtn: 'ดำเนินการต่อ',
                toastError: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                placeholder: 'กรอกหมายเลขคำสั่งซื้อ (1111)',
                toastOrderLoaded: 'โหลดออเดอร์เรียบร้อย! เลือกรูปสำหรับสินค้าแต่ละรายการด้านล่าง',
                toastInvalidCode: 'ทดสอบ: ใช้รหัส 1111 เท่านั้น',
                toastPhotoUsed: 'รูป #{num} ถูกใช้ไปแล้ว',
                toastAllFilled: 'ครบทุกตำแหน่งแล้ว',
                toastConfirm: 'บันทึกการเลือกรูปแล้ว!',
                cover: 'รูปปก',
                back: 'รูปปกหลัง',
                interior: 'รูปภายใน',
                required: 'จำเป็น',
                optional: 'ไม่จำเป็น',
                setPhoto: 'ตั้งค่า',
                remove: 'ลบ',
                randomFill: '🎲 สุ่มอัตโนมัติ',
                resetProduct: 'รีเซ็ต',
                confirmAll: '✅ ยืนยันการเลือกทั้งหมด',
                backToLogin: '← กลับ',
                totalPhotos: 'รูปทั้งหมด',
                filled: 'เลือกแล้ว',
                moreNeeded: 'ต้องเลือกเพิ่ม',
                complete: '✓ ครบถ้วน!'
            }
        };
        
        let currentLang = 'en';
        
        function updateLanguage() {
            if (document.getElementById('title')) {
                document.getElementById('title').textContent = translations[currentLang].title;
                document.getElementById('subtitle').textContent = translations[currentLang].subtitle;
                document.getElementById('loginBtn').textContent = translations[currentLang].loginBtn;
                document.getElementById('orderNumberInput').placeholder = translations[currentLang].placeholder;
            }
            
            const icon = document.getElementById('lang-icon');
            const text = document.getElementById('lang-text');
            if (currentLang === 'en') {
                icon.textContent = '🇬🇧';
                text.textContent = 'EN';
            } else {
                icon.textContent = '🇹🇭';
                text.textContent = 'TH';
            }
            
            if (currentOrder) {
                renderOrderInterface();
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // Initialize Supabase
        async function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: { persistSession: false }
            });
            await loadProductsFromSupabase();
        }
        
        // Load all products from Supabase
        async function loadProductsFromSupabase() {
            try {
                console.log('Loading products from Supabase...');
                
                // Load product cards
                const { data: productCards, error: productsError } = await supabaseClient
                    .from('product_cards')
                    .select('*');
                
                if (productsError) throw productsError;
                
                // Load packages
                const { data: packages, error: packagesError } = await supabaseClient
                    .from('packages_with_price')
                    .select('*');
                
                if (packagesError) console.warn('Packages error:', packagesError);
                
                allProducts = [];
                
                // Process product cards
                if (productCards) {
                    productCards.forEach(card => {
                        let poseCount = 0;
                        
                        // Try to get pose from variants
                        try {
                            if (card.variants) {
                                const variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                                if (variants.length > 0 && variants[0].pose) {
                                    poseCount = parseInt(variants[0].pose);
                                }
                            }
                        } catch(e) {}
                        
                        if (!poseCount && card.pose) poseCount = parseInt(card.pose);
                        if (!poseCount && card.total_photos) poseCount = parseInt(card.total_photos);
                        
                        allProducts.push({
                            id: card.card_id || card.id,
                            sku: card.sku,
                            name_en: card.name_en,
                            name_th: card.name_th,
                            pose: poseCount || 0,
                            image_url: card.cover_image
                        });
                    });
                }
                
                // Add packages
                if (packages) {
                    packages.forEach(pkg => {
                        let totalPhotos = pkg.total_photos || 0;
                        if (!totalPhotos && pkg.contents) {
                            try {
                                const contents = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                                totalPhotos = contents.reduce((sum, item) => sum + (item.qty || 1), 0);
                            } catch(e) {}
                        }
                        
                        allProducts.push({
                            id: pkg.id || `pkg_${pkg.sku}`,
                            sku: pkg.sku,
                            name_en: pkg.name_en,
                            name_th: pkg.name_th,
                            pose: totalPhotos || 0,
                            image_url: pkg.image_url,
                            isPackage: true
                        });
                    });
                }
                
                console.log(`Loaded ${allProducts.length} products from Supabase`);
                console.log('Products with pose:', allProducts.filter(p => p.pose > 0).map(p => ({ sku: p.sku, pose: p.pose, name: p.name_en })));
                
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Error loading products from database');
            }
        }
        
        // Check order
        async function checkOrder() {
            const orderCode = document.getElementById('orderNumberInput')?.value.trim() || 
                              document.getElementById('orderNumber')?.value.trim();
            
            if (!orderCode) {
                showToast(translations[currentLang].toastError);
                return;
            }
            
            if (orderCode === '1111') {
                await loadOrderProducts(orderCode);
                renderOrderInterface();
                showToast(translations[currentLang].toastOrderLoaded);
            } else {
                showToast(translations[currentLang].toastInvalidCode);
            }
        }
        
        async function loadOrderProducts(orderCode) {
            const orderItems = [];
            
            for (const sku of mockOrderSkus) {
                const matchedProduct = allProducts.find(p => p.sku === sku);
                if (matchedProduct) {
                    orderItems.push({
                        sku: matchedProduct.sku,
                        productId: matchedProduct.id,
                        productName: matchedProduct.name_en || matchedProduct.name_th || matchedProduct.sku,
                        pose: matchedProduct.pose || 10,
                        quantity: 1
                    });
                } else {
                    // Fallback with default values
                    orderItems.push({
                        sku: sku,
                        productId: null,
                        productName: sku,
                        pose: 10,
                        quantity: 1
                    });
                }
            }
            
            currentOrder = { orderNumber: orderCode, items: orderItems };
            
            // Initialize assignments
            photoAssignments = {};
            currentOrder.items.forEach(item => {
                photoAssignments[item.sku] = {
                    cover: null,
                    back: null,
                    interior: [],
                    totalSlots: item.pose,
                    productName: item.productName
                };
            });
        }
        
        function getUsedNumbers() {
            const used = new Set();
            Object.values(photoAssignments).forEach(assign => {
                if (assign.cover) used.add(assign.cover);
                if (assign.back) used.add(assign.back);
                assign.interior.forEach(n => used.add(n));
            });
            return used;
        }
        
        function assignPhoto(sku, position, photoNum) {
            const assignment = photoAssignments[sku];
            if (!assignment) return false;
            
            const usedNumbers = getUsedNumbers();
            if (usedNumbers.has(photoNum)) {
                showToast(translations[currentLang].toastPhotoUsed.replace('{num}', photoNum));
                return false;
            }
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            if (currentCount >= assignment.totalSlots && position !== 'cover' && position !== 'back') {
                showToast(translations[currentLang].toastAllFilled);
                return false;
            }
            
            if (position === 'cover') assignment.cover = photoNum;
            else if (position === 'back') assignment.back = photoNum;
            
            renderOrderInterface();
            return true;
        }
        
        function addInteriorPhoto(sku, photoNum) {
            const assignment = photoAssignments[sku];
            if (!assignment) return false;
            
            const usedNumbers = getUsedNumbers();
            if (usedNumbers.has(photoNum)) {
                showToast(translations[currentLang].toastPhotoUsed.replace('{num}', photoNum));
                return false;
            }
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            if (currentCount >= assignment.totalSlots) {
                showToast(translations[currentLang].toastAllFilled);
                return false;
            }
            
            assignment.interior.push(photoNum);
            renderOrderInterface();
            return true;
        }
        
        function removePhoto(sku, position, index = null) {
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            if (position === 'cover') assignment.cover = null;
            else if (position === 'back') assignment.back = null;
            else if (position === 'interior' && index !== null) {
                assignment.interior.splice(index, 1);
            }
            renderOrderInterface();
        }
        
        function randomFillRemaining(sku) {
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            const needed = assignment.totalSlots - currentCount;
            
            if (needed <= 0) {
                showToast(translations[currentLang].toastAllFilled);
                return;
            }
            
            const usedNumbers = getUsedNumbers();
            const available = [];
            for (let i = 1; i <= 999; i++) {
                if (!usedNumbers.has(i)) available.push(i);
                if (available.length >= needed) break;
            }
            
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            
            const toAdd = available.slice(0, needed);
            toAdd.forEach(num => assignment.interior.push(num));
            renderOrderInterface();
            showToast(`Added ${toAdd.length} random photos`);
        }
        
        function resetProduct(sku) {
            const assignment = photoAssignments[sku];
            if (assignment) {
                assignment.cover = null;
                assignment.back = null;
                assignment.interior = [];
            }
            renderOrderInterface();
        }
        
        function confirmAllSelections() {
            let summary = '📸 PHOTO SELECTION CONFIRMED\n\n';
            for (const [sku, assign] of Object.entries(photoAssignments)) {
                summary += `━━━ ${sku} (${assign.totalSlots} photos) ━━━\n`;
                summary += `📘 Cover: ${assign.cover || '❌ NOT SET'}\n`;
                summary += `📖 Back: ${assign.back || '❌ NOT SET'}\n`;
                summary += `🖼️ Interior: ${assign.interior.length}/${assign.totalSlots - (assign.cover ? 1 : 0) - (assign.back ? 1 : 0)}\n`;
                if (assign.interior.length > 0) {
                    summary += `   Photos: ${assign.interior.join(', ')}\n`;
                }
                summary += '\n';
            }
            alert(summary);
            showToast(translations[currentLang].toastConfirm);
        }
        
        function backToLogin() {
            currentOrder = null;
            photoAssignments = {};
            document.getElementById('mainContent').innerHTML = `
                <div class="login-screen" id="loginScreen">
                    <h1 id="title">${translations[currentLang].title}</h1>
                    <p class="subtitle" id="subtitle">${translations[currentLang].subtitle}</p>
                    <input type="text" id="orderNumberInput" class="order-input" placeholder="${translations[currentLang].placeholder}">
                    <button class="btn-primary" id="loginBtn">${translations[currentLang].loginBtn}</button>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', checkOrder);
            document.getElementById('orderNumberInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkOrder();
            });
        }
        
        function renderOrderInterface() {
            const mainContent = document.getElementById('mainContent');
            const t = translations[currentLang];
            
            let productsHtml = '';
            let totalProducts = 0;
            let totalFilled = 0;
            
            currentOrder.items.forEach(item => {
                const assignment = photoAssignments[item.sku];
                const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
                const remaining = assignment.totalSlots - currentCount;
                totalProducts += assignment.totalSlots;
                totalFilled += currentCount;
                
                const safeSku = item.sku.replace(/[-\s]/g, '_');
                
                productsHtml += `
                    <div class="product-card">
                        <div class="product-title-section">
                            <div>
                                <span class="product-title">${escapeHtml(item.productName)}</span>
                                <span class="product-sku" style="margin-left: 0.8rem;">${item.sku}</span>
                            </div>
                            <div class="photo-stats">
                                <span class="total-photos-badge">📷 ${t.totalPhotos}: ${assignment.totalSlots}</span>
                                <span class="progress-badge">✓ ${currentCount}/${assignment.totalSlots} ${t.filled}</span>
                            </div>
                        </div>
                        
                        <div class="assignment-section">
                            <!-- Cover -->
                            <div class="slot-group">
                                <div class="slot-header">
                                    <span>📘</span> ${t.cover}
                                    <span class="required-badge">${t.required}</span>
                                </div>
                                ${assignment.cover ? `
                                    <div class="assigned-display">
                                        <span class="photo-number">Photo #${assignment.cover}</span>
                                        <button class="btn-remove" onclick="removePhoto('${item.sku}', 'cover')">✕ ${t.remove}</button>
                                    </div>
                                ` : `
                                    <div class="input-group">
                                        <input type="number" id="cover-input-${safeSku}" placeholder="Photo #" min="1" max="999">
                                        <button class="btn-small" onclick="assignFromInput('${item.sku}', 'cover')">${t.setPhoto}</button>
                                    </div>
                                `}
                            </div>
                            
                            <!-- Back Cover -->
                            <div class="slot-group">
                                <div class="slot-header">
                                    <span>📖</span> ${t.back}
                                    <span class="optional-badge">${t.optional}</span>
                                </div>
                                ${assignment.back ? `
                                    <div class="assigned-display">
                                        <span class="photo-number">Photo #${assignment.back}</span>
                                        <button class="btn-remove" onclick="removePhoto('${item.sku}', 'back')">✕ ${t.remove}</button>
                                    </div>
                                ` : `
                                    <div class="input-group">
                                        <input type="number" id="back-input-${safeSku}" placeholder="Photo #" min="1" max="999">
                                        <button class="btn-small" onclick="assignFromInput('${item.sku}', 'back')">${t.setPhoto}</button>
                                    </div>
                                `}
                            </div>
                            
                            <!-- Interior -->
                            <div class="slot-group">
                                <div class="slot-header">
                                    <span>🖼️</span> ${t.interior} (${assignment.interior.length}/${assignment.totalSlots - (assignment.cover ? 1 : 0) - (assignment.back ? 1 : 0)})
                                </div>
                                <div class="input-group" style="margin-bottom: 0.8rem;">
                                    <input type="number" id="interior-input-${safeSku}" placeholder="Photo #" min="1" max="999">
                                    <button class="btn-small" onclick="addInteriorFromInput('${item.sku}')">${t.setPhoto}</button>
                                    <button class="btn-small-outline" onclick="randomFillRemaining('${item.sku}')">${t.randomFill}</button>
                                </div>
                                <div class="interior-list">
                                    ${assignment.interior.map((num, idx) => `
                                        <div class="photo-chip">
                                            #${num}
                                            <button onclick="removePhoto('${item.sku}', 'interior', ${idx})">✕</button>
                                        </div>
                                    `).join('')}
                                </div>
                                ${remaining > 0 ? 
                                    `<div class="remaining-warning">⚠️ ${remaining} ${t.moreNeeded}</div>` : 
                                    `<div class="complete-success">${t.complete}</div>`
                                }
                            </div>
                        </div>
                        
                        <div class="product-actions">
                            <button class="btn-small-outline" onclick="resetProduct('${item.sku}')">🔄 ${t.resetProduct}</button>
                        </div>
                    </div>
                `;
            });
            
            const overallPercent = totalProducts > 0 ? Math.round((totalFilled / totalProducts) * 100) : 0;
            
            mainContent.innerHTML = `
                <div class="order-header">
                    <div class="order-info">
                        <span class="order-badge">📦 Order: <strong>${currentOrder.orderNumber}</strong></span>
                        <span class="order-badge">📸 Total: ${totalFilled}/${totalProducts} photos selected (${overallPercent}%)</span>
                    </div>
                    <button class="back-btn" id="backToLoginBtn">${t.backToLogin}</button>
                </div>
                
                ${productsHtml}
                
                <div class="global-actions">
                    <button class="btn-primary btn-large" id="confirmAllBtn">${t.confirmAll}</button>
                </div>
            `;
            
            document.getElementById('backToLoginBtn').addEventListener('click', backToLogin);
            document.getElementById('confirmAllBtn').addEventListener('click', confirmAllSelections);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.assignFromInput = function(sku, position) {
            const safeSku = sku.replace(/[-\s]/g, '_');
            const input = document.getElementById(`${position}-input-${safeSku}`);
            if (!input) return;
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1) {
                showToast('Please enter a valid photo number');
                return;
            }
            if (assignPhoto(sku, position, photoNum)) {
                input.value = '';
            }
        };
        
        window.addInteriorFromInput = function(sku) {
            const safeSku = sku.replace(/[-\s]/g, '_');
            const input = document.getElementById(`interior-input-${safeSku}`);
            if (!input) return;
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1) {
                showToast('Please enter a valid photo number');
                return;
            }
            if (addInteriorPhoto(sku, photoNum)) {
                input.value = '';
            }
        };
        
        window.removePhoto = removePhoto;
        window.randomFillRemaining = randomFillRemaining;
        window.resetProduct = resetProduct;
        
        // Event listeners
        document.getElementById('langToggle').addEventListener('click', function() {
            currentLang = currentLang === 'en' ? 'th' : 'en';
            updateLanguage();
        });
        
        document.getElementById('checkOrderBtn').addEventListener('click', checkOrder);
        document.getElementById('orderNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkOrder();
        });
        
        updateLanguage();
        initSupabase();
    </script>
</body>
</html>
