<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio — แคตตาล็อกสินค้า</title>
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://bgawfptgxcwhggbdrxhv.supabase.co">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #546e7a;
            --border-color: #e9eef2;
            --accent-primary: #007883;
            --accent-hover: #0a6570;
            --accent-light: #d9f0f2;
            --shadow-color: rgba(0, 120, 131, 0.2);
            --price-color: #007883;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Modal for photo selection */
        .photo-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }
        
        .photo-modal.active {
            display: flex;
        }
        
        .photo-modal-content {
            background: white;
            border-radius: 32px;
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid var(--accent-primary);
        }
        
        .photo-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent-primary);
            margin-bottom: 1.5rem;
        }
        
        .photo-modal-header h2 {
            color: var(--accent-primary);
            font-size: 1.5rem;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        
        .order-product-item {
            background: #f8fafc;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border-color);
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--accent-light);
        }
        
        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .photo-count-badge {
            background: var(--accent-light);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .photo-assignment-area {
            margin-top: 1rem;
        }
        
        .slot-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
            padding: 0.5rem;
            background: white;
            border-radius: 16px;
        }
        
        .slot-label {
            min-width: 100px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .assigned-photo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent-light);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
        }
        
        .photo-input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .photo-input-group input {
            width: 80px;
            padding: 0.4rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
        }
        
        .btn-small {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .btn-small-outline {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .interior-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .photo-chip {
            background: var(--accent-light);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .photo-chip button {
            background: none;
            border: none;
            cursor: pointer;
            color: #c44536;
            font-weight: bold;
        }
        
        .modal-footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }
        
        .btn-primary-modal {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 4000;
            display: none;
        }
        
        .toast-message.show {
            display: block;
        }
        
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-secondary);
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 3px solid var(--accent-primary);
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        
        .logo-text {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--accent-primary);
        }
        
        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .search-container {
            width: 300px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 50px;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            border: 2px solid var(--accent-primary);
        }
        
        .search-box input {
            background: transparent;
            border: none;
            padding: 0.7rem 0;
            width: 100%;
            outline: none;
        }
        
        .search-box button {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .lang-toggle {
            background: white;
            border: 2px solid var(--accent-primary);
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            color: var(--accent-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Original styles continue */
        .pc-category-nav, .mobile-category-nav, .main-layout, .cart-panel, .mobile-cart-button,
        .desktop-form, .mobile-form, .product-grid, .product-card {
            /* Keep original styles */
        }
        
        @media (max-width: 900px) {
            .top-bar {
                flex-direction: column;
            }
            .right-actions {
                width: 100%;
            }
            .search-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="toastMessage" class="toast-message"></div>

    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="logo">

        <div class="right-actions">
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="orderCodeInput" placeholder="Enter order code (e.g., 1111)">
                    <button id="checkOrderBtn">Check Order</button>
                </div>
            </div>
            <button class="lang-toggle" id="langToggle">
                <span id="lang-icon">🇹🇭</span>
                <span id="lang-text">TH</span>
            </button>
        </div>

    <!-- Photo Selection Modal -->
    <div id="photoModal" class="photo-modal">
        <div class="photo-modal-content">
            <div class="photo-modal-header">
                <h2>📸 Select Photos for Order <span id="modalOrderNumber"></span></h2>
                <button class="close-modal" onclick="closePhotoModal()">✕</button>
            </div>
            <div id="modalProductsList"></div>
            <div class="modal-footer">
                <button class="btn-primary-modal" onclick="confirmPhotoSelection()">✅ Confirm Selection</button>
            </div>
        </div>
    </div>

    <!-- Rest of original content will be loaded dynamically -->
    <div id="mainContent"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
        
        let supabaseClient = null;
        let allProducts = [];
        let currentOrder = null;
        let photoAssignments = {}; // Store assignments per product
        
        // Mock order data for demo code 1111
        // In real scenario, this would come from database
        const mockOrders = {
            '1111': {
                orderNumber: '1111',
                customerName: 'John Doe',
                items: [
                    { sku: 'CAL-2025', quantity: 1, productId: null },
                    { sku: 'PB-ALBUM', quantity: 1, productId: null },
                    { sku: 'MAG-01', quantity: 1, productId: null }
                ]
            }
        };
        
        // Function to show toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Initialize Supabase and load products
        async function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: { persistSession: false }
            });
            
            await loadProductsFromSupabase();
        }
        
        // Load products from Supabase
        async function loadProductsFromSupabase() {
            try {
                console.log('Loading products from Supabase...');
                
                // Load product cards
                const { data: productCards, error: productsError } = await supabaseClient
                    .from('product_cards')
                    .select('*');
                
                if (productsError) throw productsError;
                
                // Load packages
                const { data: packages, error: packagesError } = await supabaseClient
                    .from('packages_with_price')
                    .select('*');
                
                if (packagesError) console.warn('Packages error:', packagesError);
                
                // Process products
                allProducts = [];
                
                if (productCards) {
                    productCards.forEach(card => {
                        // Parse variants to get pose count if available
                        let variants = [];
                        let poseCount = 0;
                        try {
                            if (card.variants) {
                                variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                                // Try to get pose from variants
                                if (variants.length > 0 && variants[0].pose) {
                                    poseCount = parseInt(variants[0].pose) || 0;
                                }
                            }
                        } catch(e) {}
                        
                        // If no pose in variants, use card field or default
                        if (!poseCount && card.pose) poseCount = parseInt(card.pose);
                        if (!poseCount && card.total_photos) poseCount = parseInt(card.total_photos);
                        
                        allProducts.push({
                            id: card.card_id || card.id,
                            sku: card.sku,
                            name_en: card.name_en,
                            name_th: card.name_th,
                            pose: poseCount || 10, // Default 10 photos if not specified
                            image_url: card.cover_image,
                            variants: variants
                        });
                    });
                }
                
                // Add packages to products list
                if (packages) {
                    packages.forEach(pkg => {
                        let totalPhotos = pkg.total_photos || 0;
                        if (!totalPhotos && pkg.contents) {
                            try {
                                const contents = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                                totalPhotos = contents.reduce((sum, item) => sum + (item.qty || 1), 0);
                            } catch(e) {}
                        }
                        
                        allProducts.push({
                            id: pkg.id || `pkg_${pkg.sku}`,
                            sku: pkg.sku,
                            name_en: pkg.name_en,
                            name_th: pkg.name_th,
                            pose: totalPhotos || 0,
                            image_url: pkg.image_url,
                            isPackage: true
                        });
                    });
                }
                
                console.log(`Loaded ${allProducts.length} products from Supabase`);
                
                // Now render the main catalog
                renderMainCatalog();
                
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Error loading products from database', 'error');
                renderMainCatalogFallback();
            }
        }
        
        // Render main catalog (simplified version of original)
        function renderMainCatalog() {
            const mainDiv = document.getElementById('mainContent');
            if (!mainDiv) return;
            
            mainDiv.innerHTML = `
                <div class="main-layout" style="max-width: 1400px; margin: 2rem auto; padding: 0 2rem;">
                    <div class="catalog">
                        <div class="desktop-form" style="background: white; border-radius: 30px; padding: 1.8rem; margin-bottom: 1.5rem;">
                            <h3>Parent Information</h3>
                            <div class="form-row" style="display: flex; gap: 1rem; flex-wrap: wrap;">
                                <input type="text" placeholder="Full Name" style="flex:1; padding: 0.8rem; border-radius: 16px; border: 2px solid var(--border-color);">
                                <input type="tel" placeholder="Phone Number" style="flex:1; padding: 0.8rem; border-radius: 16px; border: 2px solid var(--border-color);">
                                <input type="text" placeholder="Line ID" style="flex:1; padding: 0.8rem; border-radius: 16px; border: 2px solid var(--border-color);">
                            </div>
                            <h3 style="margin-top: 1rem;">Student Information</h3>
                            <div class="form-row" style="display: flex; gap: 1rem; flex-wrap: wrap;">
                                <input type="text" placeholder="Student First Name" style="flex:1; padding: 0.8rem; border-radius: 16px; border: 2px solid var(--border-color);">
                                <input type="text" placeholder="Student Family Name" style="flex:1; padding: 0.8rem; border-radius: 16px; border: 2px solid var(--border-color);">
                                <input type="text" placeholder="Birthdate (DD/MM/YYYY)" style="flex:1; padding: 0.8rem; border-radius: 16px; border: 2px solid var(--border-color);">
                                <input type="text" placeholder="Class/Grade" style="flex:1; padding: 0.8rem; border-radius: 16px; border: 2px solid var(--border-color);">
                            </div>
                        </div>
                        
                        <div id="categories-container">
                            <div class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                                ${allProducts.slice(0, 12).map(prod => `
                                    <div class="product-card" style="background: white; border-radius: 24px; padding: 1rem; border: 2px solid var(--border-color);">
                                        <div class="product-image" style="aspect-ratio: 1; background: #f0f0f0; border-radius: 16px; overflow: hidden; margin-bottom: 0.8rem;">
                                            <img src="${prod.image_url || 'https://placehold.co/300x300?text=' + (prod.sku || 'Product')}" style="width:100%; height:100%; object-fit:cover;">
                                        </div>
                                        <div class="product-sku" style="color: var(--accent-primary); font-weight: 600;">${prod.sku || 'N/A'}</div>
                                        <div class="product-title" style="font-weight: 700;">${prod.name_en || prod.name_th || 'Product'}</div>
                                        <div class="photos-count" style="margin: 0.5rem 0; color: var(--text-muted);">📷 ${prod.pose} photos</div>
                                        <div class="price-area" style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                                            <span class="price" style="color: var(--price-color); font-weight: 800;">฿${Math.floor(Math.random() * 1000 + 500)}</span>
                                            <button class="add-to-cart-btn" style="background: var(--accent-primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">+</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="bottom-ok" style="text-align: center; margin: 3rem 0;">
                            <button class="send-crm-btn" style="background: var(--accent-primary); color: white; border: none; padding: 1rem 3rem; border-radius: 60px; font-weight: 700; font-size: 1.2rem;">OK</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderMainCatalogFallback() {
            const mainDiv = document.getElementById('mainContent');
            if (mainDiv) {
                mainDiv.innerHTML = '<div style="text-align: center; padding: 3rem;">Loading catalog... Please check database connection.</div>';
            }
        }
        
        // Check order and open photo selection modal
        async function checkOrder() {
            const orderCode = document.getElementById('orderCodeInput').value.trim();
            
            if (!orderCode) {
                showToast('Please enter order code', 'error');
                return;
            }
            
            // For demo, check if code is 1111
            if (orderCode === '1111') {
                await loadOrderFromMock(orderCode);
            } else {
                // Try to fetch from database (mock for now)
                showToast('Demo only: Use code 1111', 'error');
                // You can implement real order fetching here
            }
        }
        
        async function loadOrderFromMock(orderCode) {
            const order = mockOrders[orderCode];
            if (!order) {
                showToast('Order not found', 'error');
                return;
            }
            
            currentOrder = order;
            
            // Match products with Supabase data
            const orderItems = [];
            for (const item of order.items) {
                const matchedProduct = allProducts.find(p => p.sku === item.sku);
                if (matchedProduct) {
                    orderItems.push({
                        ...item,
                        productId: matchedProduct.id,
                        productName: matchedProduct.name_en || matchedProduct.name_th,
                        pose: matchedProduct.pose,
                        sku: matchedProduct.sku
                    });
                } else {
                    // Fallback if product not found
                    orderItems.push({
                        ...item,
                        pose: 10,
                        productName: item.sku
                    });
                }
            }
            
            currentOrder.items = orderItems;
            openPhotoModal(orderCode);
        }
        
        function openPhotoModal(orderCode) {
            const modal = document.getElementById('photoModal');
            const modalOrderSpan = document.getElementById('modalOrderNumber');
            const productsListDiv = document.getElementById('modalProductsList');
            
            modalOrderSpan.textContent = orderCode;
            
            // Initialize assignments
            photoAssignments = {};
            currentOrder.items.forEach(item => {
                const totalSlots = item.pose || 10;
                photoAssignments[item.sku] = {
                    cover: null,
                    back: null,
                    interior: [],
                    totalSlots: totalSlots,
                    requiresCover: true,
                    requiresBack: true
                };
            });
            
            renderModalProducts();
            modal.classList.add('active');
        }
        
        function renderModalProducts() {
            const productsListDiv = document.getElementById('modalProductsList');
            if (!productsListDiv) return;
            
            productsListDiv.innerHTML = '';
            
            currentOrder.items.forEach(item => {
                const assignment = photoAssignments[item.sku];
                const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
                const remaining = assignment.totalSlots - currentCount;
                
                const productDiv = document.createElement('div');
                productDiv.className = 'order-product-item';
                productDiv.innerHTML = `
                    <div class="product-header">
                        <span class="product-name">${item.productName || item.sku}</span>
                        <span class="photo-count-badge">📷 ${currentCount}/${assignment.totalSlots} photos</span>
                    </div>
                    <div class="photo-assignment-area">
                        <div class="slot-row">
                            <span class="slot-label">📘 Cover:</span>
                            ${assignment.cover ? 
                                `<div class="assigned-photo">Photo #${assignment.cover} <button onclick="removePhotoFromSlot('${item.sku}', 'cover')" style="background:none; border:none; cursor:pointer;">✕</button></div>` :
                                `<div class="photo-input-group">
                                    <input type="number" id="cover-input-${item.sku.replace(/-/g, '_')}" placeholder="Photo #" min="1" max="999">
                                    <button class="btn-small" onclick="assignPhotoToSlot('${item.sku}', 'cover')">Set</button>
                                </div>`
                            }
                        </div>
                        <div class="slot-row">
                            <span class="slot-label">📖 Back Cover:</span>
                            ${assignment.back ? 
                                `<div class="assigned-photo">Photo #${assignment.back} <button onclick="removePhotoFromSlot('${item.sku}', 'back')" style="background:none; border:none; cursor:pointer;">✕</button></div>` :
                                `<div class="photo-input-group">
                                    <input type="number" id="back-input-${item.sku.replace(/-/g, '_')}" placeholder="Photo #" min="1" max="999">
                                    <button class="btn-small" onclick="assignPhotoToSlot('${item.sku}', 'back')">Set</button>
                                </div>`
                            }
                        </div>
                        <div class="slot-row">
                            <span class="slot-label">🖼️ Interior (${assignment.interior.length}):</span>
                            <div style="flex:1">
                                <div class="photo-input-group" style="margin-bottom: 0.5rem;">
                                    <input type="number" id="interior-input-${item.sku.replace(/-/g, '_')}" placeholder="Photo #" min="1" max="999">
                                    <button class="btn-small" onclick="addInteriorPhoto('${item.sku}')">Add</button>
                                    <button class="btn-small-outline" onclick="randomFillRemaining('${item.sku}')">🎲 Random Fill</button>
                                </div>
                                <div class="interior-list" id="interior-list-${item.sku.replace(/-/g, '_')}">
                                    ${assignment.interior.map((num, idx) => `
                                        <div class="photo-chip">
                                            #${num}
                                            <button onclick="removeInteriorPhoto('${item.sku}', ${idx})">✕</button>
                                        </div>
                                    `).join('')}
                                </div>
                                ${remaining > 0 ? `<div style="margin-top: 0.5rem; font-size: 0.75rem; color: #64748b;">⚠️ ${remaining} more photo(s) needed</div>` : '<div style="margin-top: 0.5rem; color: #2e7d5e;">✓ Complete</div>'}
                            </div>
                        </div>
                    </div>
                `;
                productsListDiv.appendChild(productDiv);
            });
        }
        
        // Global functions for modal
        window.assignPhotoToSlot = function(sku, position) {
            const inputId = `${position}-input-${sku.replace(/-/g, '_')}`;
            const input = document.getElementById(inputId);
            if (!input) return;
            
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1) {
                showToast('Please enter a valid photo number', 'error');
                return;
            }
            
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            // Check if photo already used in this order
            let isUsed = false;
            Object.values(photoAssignments).forEach(assign => {
                if (assign.cover === photoNum) isUsed = true;
                if (assign.back === photoNum) isUsed = true;
                if (assign.interior.includes(photoNum)) isUsed = true;
            });
            
            if (isUsed) {
                showToast(`Photo #${photoNum} is already used in this order`, 'error');
                return;
            }
            
            if (position === 'cover') {
                assignment.cover = photoNum;
            } else if (position === 'back') {
                assignment.back = photoNum;
            }
            
            input.value = '';
            renderModalProducts();
        };
        
        window.addInteriorPhoto = function(sku) {
            const inputId = `interior-input-${sku.replace(/-/g, '_')}`;
            const input = document.getElementById(inputId);
            if (!input) return;
            
            const photoNum = parseInt(input.value);
            if (isNaN(photoNum) || photoNum < 1) {
                showToast('Please enter a valid photo number', 'error');
                return;
            }
            
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            // Check if photo already used
            let isUsed = false;
            Object.values(photoAssignments).forEach(assign => {
                if (assign.cover === photoNum) isUsed = true;
                if (assign.back === photoNum) isUsed = true;
                if (assign.interior.includes(photoNum)) isUsed = true;
            });
            
            if (isUsed) {
                showToast(`Photo #${photoNum} is already used`, 'error');
                return;
            }
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            if (currentCount >= assignment.totalSlots) {
                showToast(`All ${assignment.totalSlots} slots are filled`, 'error');
                return;
            }
            
            assignment.interior.push(photoNum);
            input.value = '';
            renderModalProducts();
        };
        
        window.removePhotoFromSlot = function(sku, position) {
            const assignment = photoAssignments[sku];
            if (assignment) {
                if (position === 'cover') assignment.cover = null;
                if (position === 'back') assignment.back = null;
            }
            renderModalProducts();
        };
        
        window.removeInteriorPhoto = function(sku, index) {
            const assignment = photoAssignments[sku];
            if (assignment && assignment.interior[index]) {
                assignment.interior.splice(index, 1);
                renderModalProducts();
            }
        };
        
        window.randomFillRemaining = function(sku) {
            const assignment = photoAssignments[sku];
            if (!assignment) return;
            
            const currentCount = (assignment.cover ? 1 : 0) + (assignment.back ? 1 : 0) + assignment.interior.length;
            const needed = assignment.totalSlots - currentCount;
            
            if (needed <= 0) {
                showToast('All slots already filled', 'error');
                return;
            }
            
            // Get all used numbers
            const usedNumbers = new Set();
            Object.values(photoAssignments).forEach(assign => {
                if (assign.cover) usedNumbers.add(assign.cover);
                if (assign.back) usedNumbers.add(assign.back);
                assign.interior.forEach(n => usedNumbers.add(n));
            });
            
            // Generate random numbers not used
            const available = [];
            for (let i = 1; i <= 999; i++) {
                if (!usedNumbers.has(i)) available.push(i);
                if (available.length >= needed * 2) break;
            }
            
            // Shuffle and take needed
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            
            const toAdd = available.slice(0, needed);
            toAdd.forEach(num => assignment.interior.push(num));
            
            renderModalProducts();
            showToast(`Added ${toAdd.length} random photos`);
        };
        
        window.confirmPhotoSelection = function() {
            console.log('Final selections:', photoAssignments);
            showToast('Photo selection saved!');
            closePhotoModal();
        };
        
        window.closePhotoModal = function() {
            document.getElementById('photoModal').classList.remove('active');
        };
        
        // Language toggle
        let currentLang = 'th';
        document.getElementById('langToggle')?.addEventListener('click', () => {
            currentLang = currentLang === 'th' ? 'en' : 'th';
            const icon = document.getElementById('lang-icon');
            const text = document.getElementById('lang-text');
            if (currentLang === 'th') {
                icon.textContent = '🇹🇭';
                text.textContent = 'TH';
            } else {
                icon.textContent = '🇬🇧';
                text.textContent = 'EN';
            }
        });
        
        // Event listeners
        document.getElementById('checkOrderBtn')?.addEventListener('click', checkOrder);
        document.getElementById('orderCodeInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkOrder();
        });
        
        // Initialize
        initSupabase();
    </script>
</body>
</html>
