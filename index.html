<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection Catalog</title>
    
    <link rel="preconnect" href="https://afgzicjirrdzrotgooea.supabase.co">
    <link rel="dns-prefetch" href="https://afgzicjirrdzrotgooea.supabase.co">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --teal: #007883;
            --teal-dark: #0a6570;
            --teal-light: #d4e9ec;
            --border: #e2e8f0;
            --red: #dc2626;
            --red-light: #fee2e2;
            --bg-primary: #f5f7fa;
            --text-primary: #1e293b;
            --text-secondary: #334155;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 10px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--teal);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 42px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 200px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.2rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 42px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* Main content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Product grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 4px 12px rgba(0,120,131,0.1);
            transform: translateY(-2px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            background: #f5f5f5;
        }

        .product-info {
            padding: 1rem;
        }

        .product-header {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .product-sku {
            background: var(--teal-light);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--teal);
            font-family: monospace;
        }

        .product-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--teal);
        }

        /* Variant selector - compact */
        .variant-selector {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 0.85rem;
            margin: 0.5rem 0;
            background: white;
            cursor: pointer;
        }

        .variant-selector:focus {
            outline: none;
            border-color: var(--teal);
        }

        /* Photo slots - compact design */
        .photo-slots-section {
            margin: 0.75rem 0;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .slot-group-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--teal);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .slot-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        .oval {
            border-radius: 40px;
            background: white;
            border: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            height: 36px;
            padding: 0 0.5rem;
            min-width: 60px;
            transition: all 0.1s;
        }

        .oval.filled {
            background: var(--teal-light);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .oval.disabled {
            background: var(--red-light);
            border-color: var(--red);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .oval-input {
            border-radius: 40px;
            border: 2px solid var(--teal);
            text-align: center;
            font-weight: 600;
            font-size: 0.75rem;
            outline: none;
            height: 36px;
            padding: 0 0.5rem;
            min-width: 60px;
        }

        .slot-number {
            font-size: 0.5rem;
            font-weight: 500;
            color: #8b9aab;
        }

        .auto-note {
            font-size: 0.5rem;
            color: var(--red);
            background: var(--red-light);
            padding: 0.1rem 0.3rem;
            border-radius: 12px;
        }

        .price-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .price {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--teal);
        }

        .add-to-cart-btn {
            background: var(--teal);
            color: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-to-cart-btn:hover {
            background: var(--teal-dark);
            transform: scale(1.05);
        }

        /* Cart panel */
        .cart-panel {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 320px;
            background: white;
            border-radius: 1rem;
            border: 2px solid var(--teal);
            padding: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            z-index: 50;
        }

        .cart-header {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--teal);
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--teal);
            display: flex;
            justify-content: space-between;
        }

        .cart-items {
            max-height: 300px;
            overflow-y: auto;
            margin: 0.5rem 0;
        }

        .cart-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .cart-item-sku {
            font-weight: 600;
            color: var(--teal);
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }

        .cart-item-controls button {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--teal);
            background: white;
            cursor: pointer;
        }

        .cart-total {
            font-weight: 800;
            font-size: 1.1rem;
            padding-top: 0.5rem;
            border-top: 2px solid var(--teal);
            display: flex;
            justify-content: space-between;
        }

        .checkout-btn {
            width: 100%;
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 700;
            margin-top: 0.75rem;
            cursor: pointer;
        }

        .mobile-cart-button {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.2rem;
            font-weight: 700;
            z-index: 100;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--teal);
        }

        @media (max-width: 900px) {
            .cart-panel {
                display: none;
            }
            .mobile-cart-button {
                display: flex;
            }
            .main-content {
                padding: 1rem;
                margin-bottom: 80px;
            }
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox">
            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by SKU or name">
            <button id="searchBtn">🔍</button>
        </div>
        <button class="lang-toggle" id="langBtn">🌐 EN/TH</button>
    </div>
</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>
<button class="mobile-cart-button" id="mobileCartBtn">🛒 <span id="mobileCartCount">0</span></button>
<div id="cartPanel" class="cart-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase config
    const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';

    let supabase;
    let products = [];
    let cart = JSON.parse(localStorage.getItem('wf_cart')) || [];
    let currentLang = 'en';
    let editingSlot = null;

    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;

    const trans = {
        en: {
            loading: "Loading products...",
            error: "Error loading data",
            add: "Add",
            inCart: "In cart",
            total: "Total",
            checkout: "Checkout",
            empty: "Cart is empty",
            photoNum: "Photo #",
            selectable: "Selectable",
            notSelectable: "Fixed",
            dup: "Photo number already used",
            range: `Use ${MIN_PHOTO}–${MAX_PHOTO}`,
            saved: "Photo saved",
            viewPhoto: "View image"
        },
        th: {
            loading: "กำลังโหลดสินค้า...",
            error: "เกิดข้อผิดพลาด",
            add: "เพิ่ม",
            inCart: "ในตะกร้า",
            total: "รวม",
            checkout: "ยืนยัน",
            empty: "ตะกร้าว่าง",
            photoNum: "รูปที่ #",
            selectable: "เลือกได้",
            notSelectable: "กำหนดแล้ว",
            dup: "หมายเลขรูปซ้ำ",
            range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`,
            saved: "บันทึกรูปแล้ว",
            viewPhoto: "ดูรูป"
        }
    };

    function t(key) { return trans[currentLang][key] || trans.en[key]; }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO; }

    // Load products from Supabase
    async function loadProducts() {
        const container = document.getElementById('app');
        container.innerHTML = `<div class="loading">⏳ ${t('loading')}</div>`;
        
        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Load product_cards with all fields
            const { data: cards, error: cardsError } = await supabase
                .from('product_cards')
                .select('*')
                .order('sort_product', { ascending: true, nullsFirst: false });
            
            if (cardsError) throw cardsError;
            
            console.log('Loaded products:', cards?.length);
            
            // Process each product with variants
            products = [];
            for (const card of cards || []) {
                let variants = [];
                try {
                    if (card.variants) {
                        variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                    }
                } catch(e) { console.warn('Parse variants error:', e); }
                
                // Create photo slots for each product based on pose count
                const poseCount = card.pose || 1;
                const isSelectable = !(card.name_en?.toLowerCase().includes('group') || 
                                        card.name_th?.toLowerCase().includes('กลุ่ม') ||
                                        card.mess?.toLowerCase().includes('group'));
                
                // Generate slots array
                const slots = [];
                for (let i = 0; i < poseCount; i++) {
                    slots.push({
                        id: i,
                        value: null,
                        selectable: isSelectable
                    });
                }
                
                products.push({
                    id: card.card_id || card.sku || `prod_${Date.now()}_${Math.random()}`,
                    sku: card.sku || card.article,
                    name_en: card.name_en || '',
                    name_th: card.name_th || '',
                    description_en: card.descriptions || '',
                    description_th: card.descriptions_th || '',
                    size: card.size || '',
                    pose: poseCount,
                    selectable: isSelectable,
                    image_url: card.cover_image || null,
                    variants: variants,
                    base_price: variants.length > 0 ? Math.min(...variants.map(v => v.price || 0)) : (card.price || 0),
                    slots: slots.map(s => ({ ...s })) // Copy slots
                });
            }
            
            // Load packages as well if needed
            const { data: packages, error: pkgError } = await supabase
                .from('packages_with_price')
                .select('*');
            
            if (!pkgError && packages) {
                for (const pkg of packages) {
                    let contents = [];
                    try {
                        if (pkg.contents) {
                            contents = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                        }
                    } catch(e) {}
                    
                    // Build slots from package contents
                    const slots = [];
                    for (const item of contents) {
                        for (let i = 0; i < (item.qty || 1); i++) {
                            slots.push({
                                id: `${item.sku}_${i}`,
                                name_en: item.name_en,
                                name_th: item.name_th,
                                size: item.size,
                                value: null,
                                selectable: item.selectable !== false
                            });
                        }
                    }
                    
                    products.push({
                        id: `pkg_${pkg.sku}`,
                        sku: pkg.sku,
                        name_en: pkg.name_en,
                        name_th: pkg.name_th,
                        description_en: pkg.description_en || '',
                        description_th: pkg.description_th || '',
                        size: '',
                        pose: slots.length,
                        selectable: false,
                        image_url: pkg.image_url || null,
                        variants: [{ price: pkg.price, sku: pkg.sku }],
                        base_price: pkg.price || 0,
                        isPackage: true,
                        slots: slots
                    });
                }
            }
            
            console.log('Total products loaded:', products.length);
            renderProducts();
            
        } catch (error) {
            console.error('Load error:', error);
            container.innerHTML = `<div class="loading">❌ ${t('error')}: ${error.message}</div>`;
        }
    }

    // Check if photo is used in same product
    function isPhotoUsed(product, slotIdx, photoNum) {
        if (!product.slots) return false;
        for (let i = 0; i < product.slots.length; i++) {
            if (i !== slotIdx && product.slots[i].value === photoNum) return true;
        }
        return false;
    }

    function setPhotoValue(productId, slotIdx, value) {
        const product = products.find(p => p.id === productId);
        if (!product || !product.slots[slotIdx]?.selectable) return false;
        if (!isValid(value)) { toast(t('range')); return false; }
        if (isPhotoUsed(product, slotIdx, value)) { toast(t('dup')); return false; }
        
        product.slots[slotIdx].value = value;
        renderProducts();
        return true;
    }

    function handleSlotClick(productId, slotIdx, currentVal) {
        const product = products.find(p => p.id === productId);
        if (!product?.slots[slotIdx]?.selectable) return;
        
        const slotDiv = document.getElementById(`slot_${productId}_${slotIdx}`);
        if (!slotDiv || editingSlot) return;
        
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal || '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${slotDiv.offsetWidth}px`;
        input.style.height = `${slotDiv.offsetHeight}px`;
        
        slotDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(slotDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setPhotoValue(productId, slotIdx, newVal);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });
        editingSlot = `${productId}_${slotIdx}`;
    }

    // Add to cart
    function addToCart(product, variantPrice, variantSku) {
        const existing = cart.find(item => item.id === product.id && item.variantSku === variantSku);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({
                id: product.id,
                sku: product.sku,
                variantSku: variantSku,
                name: currentLang === 'th' ? (product.name_th || product.name_en) : (product.name_en || product.sku),
                price: variantPrice,
                quantity: 1,
                image: product.image_url
            });
        }
        localStorage.setItem('wf_cart', JSON.stringify(cart));
        updateCartUI();
        toast(`✓ ${product.sku} ${t('add')}`);
    }

    function updateQuantity(itemId, variantSku, delta) {
        const index = cart.findIndex(i => i.id === itemId && i.variantSku === variantSku);
        if (index === -1) return;
        
        const newQty = cart[index].quantity + delta;
        if (newQty <= 0) {
            cart.splice(index, 1);
        } else {
            cart[index].quantity = newQty;
        }
        localStorage.setItem('wf_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
        const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        
        document.getElementById('mobileCartCount').innerText = totalItems;
        
        const cartPanel = document.getElementById('cartPanel');
        if (!cartPanel) return;
        
        if (cart.length === 0) {
            cartPanel.innerHTML = `
                <div class="cart-header"><span>🛒 ${t('total')}</span><span>0</span></div>
                <div class="cart-items"><div style="text-align:center;padding:1rem;">${t('empty')}</div></div>
                <div class="cart-total"><span>${t('total')}</span><span>0 THB</span></div>
            `;
            return;
        }
        
        let itemsHtml = '<div class="cart-items">';
        cart.forEach(item => {
            itemsHtml += `
                <div class="cart-item">
                    <div><span class="cart-item-sku">${item.sku}</span> ${item.name}</div>
                    <div>${item.price.toLocaleString()} THB × ${item.quantity}</div>
                    <div class="cart-item-controls">
                        <button onclick="updateQuantity('${item.id}', '${item.variantSku}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity('${item.id}', '${item.variantSku}', 1)">+</button>
                    </div>
                </div>
            `;
        });
        itemsHtml += '</div>';
        
        cartPanel.innerHTML = `
            <div class="cart-header"><span>🛒 Cart</span><span>${totalItems} items</span></div>
            ${itemsHtml}
            <div class="cart-total"><span>${t('total')}</span><span>${totalPrice.toLocaleString()} THB</span></div>
            <button class="checkout-btn" onclick="checkout()">${t('checkout')}</button>
        `;
    }

    function checkout() {
        const summary = cart.map(item => `${item.sku} x${item.quantity} = ${item.price * item.quantity} THB`).join('\n');
        const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        alert(`Order Summary:\n${summary}\n\nTotal: ${total} THB`);
        toast('Order placed! (Demo)');
    }

    function showImageModal(url, name) {
        if (!url) { toast('No image'); return; }
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        const img = document.createElement('img');
        img.src = url;
        img.alt = name;
        img.onerror = () => { modal.innerHTML = '<div style="color:white;padding:2rem;">❌ Image not available</div>'; };
        modal.appendChild(img);
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }

    function renderProducts() {
        const container = document.getElementById('app');
        let filtered = [...products];
        
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
        if (searchTerm) {
            filtered = filtered.filter(p => 
                p.sku?.toLowerCase().includes(searchTerm) || 
                p.name_en?.toLowerCase().includes(searchTerm) ||
                p.name_th?.toLowerCase().includes(searchTerm)
            );
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">No products found</div>';
            return;
        }
        
        let html = '<div class="product-grid">';
        
        filtered.forEach(product => {
            const displayName = currentLang === 'th' ? (product.name_th || product.name_en) : (product.name_en || product.sku);
            const displayDesc = currentLang === 'th' ? (product.description_th || product.description_en) : (product.description_en || '');
            const imageUrl = product.image_url || 'https://via.placeholder.com/300x200?text=No+Image';
            
            // Get variant options
            let variantSelectHtml = '';
            let currentPrice = product.base_price;
            let currentVariantSku = product.sku;
            
            if (product.variants && product.variants.length > 1) {
                variantSelectHtml = `
                    <select class="variant-selector" id="variant_${product.id}" onchange="updateVariantPrice('${product.id}')">
                        ${product.variants.map((v, idx) => {
                            let label = '';
                            if (v.size_label) label += v.size_label;
                            if (v.pose) label += (label ? ' / ' : '') + v.pose;
                            if (v.color) label += (label ? ' / ' : '') + v.color;
                            if (!label) label = v.sku;
                            return `<option value="${v.price}|${v.sku}" ${idx === 0 ? 'selected' : ''}>${label} - ${v.price} THB</option>`;
                        }).join('')}
                    </select>
                `;
                const firstVariant = product.variants[0];
                if (firstVariant) {
                    currentPrice = firstVariant.price;
                    currentVariantSku = firstVariant.sku;
                }
            } else if (product.variants && product.variants.length === 1) {
                currentPrice = product.variants[0].price;
                currentVariantSku = product.variants[0].sku;
            }
            
            // Photo slots section
            let slotsHtml = '';
            if (product.slots && product.slots.length > 0) {
                slotsHtml = `<div class="photo-slots-section">
                    <div class="slot-group-title">
                        <span>📸 ${t('photoNum')} (${product.pose || product.slots.length} ${t('photos')})</span>
                        <span class="slot-group-badge">${product.selectable ? '✅ ' + t('selectable') : '🔒 ' + t('notSelectable')}</span>
                    </div>
                    <div class="slot-items">`;
                
                product.slots.forEach((slot, idx) => {
                    const isSelectable = slot.selectable !== false;
                    const isFilled = slot.value !== null;
                    
                    if (isSelectable) {
                        slotsHtml += `<div class="slot-wrapper">
                            <div id="slot_${product.id}_${idx}" class="oval ${isFilled ? 'filled' : ''}" 
                                 onclick="handleSlotClick('${product.id}', ${idx}, ${slot.value !== null ? slot.value : 'null'})"
                                 style="min-width:55px;">${slot.value !== null ? slot.value : '📷'}</div>
                            <span class="slot-number">${idx+1}</span>
                        </div>`;
                    } else {
                        slotsHtml += `<div class="slot-wrapper">
                            <div class="oval disabled" style="min-width:55px;">🔒</div>
                            <span class="slot-number">${idx+1}</span>
                            <span class="auto-note">${t('notSelectable')}</span>
                        </div>`;
                    }
                });
                slotsHtml += `</div></div>`;
            }
            
            html += `
                <div class="product-card">
                    <img class="product-image" src="${imageUrl}" onclick="showImageModal('${imageUrl}', '${displayName.replace(/'/g, "\\'")}')" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    <div class="product-info">
                        <div class="product-header">
                            <span class="product-sku">${product.sku || 'N/A'}</span>
                            <span class="product-title">${displayName}</span>
                        </div>
                        ${product.size ? `<div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.3rem;">📏 ${product.size}</div>` : ''}
                        ${displayDesc ? `<div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.5rem;">${displayDesc.substring(0,80)}</div>` : ''}
                        ${variantSelectHtml}
                        ${slotsHtml}
                        <div class="price-area">
                            <span class="price" id="price_${product.id}">${currentPrice.toLocaleString()} THB</span>
                            <button class="add-to-cart-btn" onclick="addToCartWithVariant('${product.id}', '${currentVariantSku}')">+</button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        container.innerHTML = html;
    }

    window.updateVariantPrice = function(productId) {
        const select = document.getElementById(`variant_${productId}`);
        if (!select) return;
        const [price, sku] = select.value.split('|');
        const priceEl = document.getElementById(`price_${productId}`);
        if (priceEl) priceEl.textContent = `${parseInt(price).toLocaleString()} THB`;
        
        // Store current variant SKU for add to cart
        const product = products.find(p => p.id === productId);
        if (product) {
            product._currentVariantSku = sku;
            product._currentPrice = parseInt(price);
        }
    };

    window.addToCartWithVariant = function(productId, defaultSku) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        
        let price = product.base_price;
        let variantSku = product.sku;
        
        const select = document.getElementById(`variant_${product.id}`);
        if (select) {
            const [selPrice, selSku] = select.value.split('|');
            price = parseInt(selPrice);
            variantSku = selSku;
        } else if (product.variants && product.variants.length === 1) {
            price = product.variants[0].price;
            variantSku = product.variants[0].sku;
        }
        
        addToCart(product, price, variantSku);
    };

    function searchProducts() {
        renderProducts();
    }

    function updateLang() {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        document.getElementById('langBtn').innerHTML = currentLang === 'en' ? '🇬🇧 EN' : '🇹🇭 TH';
        renderProducts();
        updateCartUI();
    }

    // Mobile cart
    function openMobileCart() {
        const cartPanel = document.getElementById('cartPanel');
        if (cartPanel) cartPanel.style.display = 'block';
    }

    // Expose globals
    window.handleSlotClick = handleSlotClick;
    window.showImageModal = showImageModal;
    window.addToCartWithVariant = addToCartWithVariant;
    window.updateQuantity = updateQuantity;
    window.checkout = checkout;
    window.searchProducts = searchProducts;
    window.updateVariantPrice = updateVariantPrice;

    // Event listeners
    document.getElementById('langBtn')?.addEventListener('click', updateLang);
    document.getElementById('searchBtn')?.addEventListener('click', searchProducts);
    document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchProducts(); });
    document.getElementById('mobileCartBtn')?.addEventListener('click', openMobileCart);
    
    // Close cart on click outside (mobile)
    document.addEventListener('click', (e) => {
        const cartPanel = document.getElementById('cartPanel');
        const mobileBtn = document.getElementById('mobileCartBtn');
        if (window.innerWidth <= 900 && cartPanel && !cartPanel.contains(e.target) && e.target !== mobileBtn) {
            cartPanel.style.display = 'none';
        }
    });

    // Initialize
    loadProducts();
    updateCartUI();
</script>
</body>
</html>
