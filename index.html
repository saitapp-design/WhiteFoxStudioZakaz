<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Fox Studio - Photo Selection</title>
    <style>
        /* ===== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ===== */
        :root {
            --accent-primary: #007883;  /* ОСНОВНОЙ ЦВЕТ */
            --accent-hover: #0a6570;     /* Темнее для ховера */
            --accent-light: rgba(0, 120, 131, 0.1);
            --bg-secondary: #ffffff;
            --bg-form: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0, 120, 131, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8f8f8;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-secondary);
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 3px solid var(--accent-primary);
        }

        .top-bar {
            padding: 0.8rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: var(--bg-secondary);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-primary);
            letter-spacing: 0.5px;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-container {
            flex: 1;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 0.1rem 0.1rem 0.1rem 1.5rem;
            border: 2px solid var(--accent-primary);
            height: 48px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(0,120,131,0.1);
        }

        .search-box:focus-within {
            box-shadow: 0 4px 20px var(--accent-light);
            border-color: var(--accent-hover);
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            width: 100%;
            outline: none;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-box button {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            height: 40px;
        }

        .search-box button:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--accent-primary);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 1rem;
            cursor: pointer;
            color: var(--accent-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            height: 48px;
            min-width: 90px;
            transition: all 0.2s;
        }

        .lang-toggle:hover {
            background: var(--accent-primary);
            color: white;
        }

        #lang-icon {
            font-size: 1.2rem;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            min-height: calc(100vh - 120px);
        }

        .login-screen {
            max-width: 500px;
            margin: 3rem auto;
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .login-screen h1 {
            font-size: 2.2rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .order-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            margin-bottom: 1rem;
        }

        .order-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        .demo-orders {
            margin-top: 2.5rem;
            padding: 1.5rem;
            background: var(--bg-form);
            border-radius: 20px;
        }

        .demo-orders p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .demo-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .demo-btn {
            padding: 0.8rem 2rem;
            background: white;
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 1.1rem;
            min-width: 80px;
        }

        .demo-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 0.8rem 1rem;
            }

            .right-actions {
                flex-direction: column;
            }

            .lang-toggle {
                width: 100%;
            }

            .login-screen {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            .login-screen h1 {
                font-size: 1.8rem;
            }

            .demo-buttons {
                flex-direction: column;
            }

            .demo-btn {
                width: 100%;
            }
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid var(--accent-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 20px var(--shadow-color);
            border: 2px solid white;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <div class="logo-area">
                <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox Studio">
                <span class="logo-text">WHITE FOX STUDIO</span>
            </div>
            
            <div class="right-actions">
                <div class="search-container">
                    <div class="search-box">
                        <input type="text" id="orderNumber" placeholder="Order number / หมายเลขคำสั่งซื้อ">
                        <button onclick="window.location.href='gallery.html?order=' + document.getElementById('orderNumber').value">OK</button>
                    </div>
                </div>
                
                <button class="lang-toggle" id="langToggle">
                    <span id="lang-icon">🇹🇭</span>
                    <span id="lang-text">TH</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="login-screen" id="loginScreen">
            <h1 id="title">Enter Order Number</h1>
            <p class="subtitle" id="subtitle">Please enter your order number to select photos</p>
            
            <input type="text" id="orderNumberInput" class="order-input" placeholder="e.g., 333 / เช่น 333">
            <button class="btn-primary" id="loginBtn">Continue</button>

            <div class="demo-orders">
                <p id="demoText">Demo orders:</p>
                <div class="demo-buttons">
                    <button class="demo-btn" onclick="window.location.href='gallery.html?order=333'">333</button>
                    <button class="demo-btn" onclick="window.location.href='gallery.html?order=444'">444</button>
                    <button class="demo-btn" onclick="window.location.href='gallery.html?order=555'">555</button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const translations = {
            en: {
                title: 'Enter Order Number',
                subtitle: 'Please enter your order number to select photos',
                loginBtn: 'Continue',
                demoText: 'Demo orders:',
                toastError: 'Please enter order number',
                placeholder: 'e.g., 333 / เช่น 333'
            },
            th: {
                title: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                subtitle: 'กรุณากรอกหมายเลขคำสั่งซื้อเพื่อเลือกรูปภาพ',
                loginBtn: 'ดำเนินการต่อ',
                demoText: 'ตัวอย่างคำสั่งซื้อ:',
                toastError: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                placeholder: 'เช่น 333 / e.g., 333'
            }
        };

        let currentLang = 'en';

        document.getElementById('langToggle').addEventListener('click', function() {
            const icon = document.getElementById('lang-icon');
            const text = document.getElementById('lang-text');
            
            if (currentLang === 'en') {
                currentLang = 'th';
                icon.textContent = '🇬🇧';
                text.textContent = 'EN';
            } else {
                currentLang = 'en';
                icon.textContent = '🇹🇭';
                text.textContent = 'TH';
            }
            
            updateLanguage();
        });

        function updateLanguage() {
            document.getElementById('title').textContent = translations[currentLang].title;
            document.getElementById('subtitle').textContent = translations[currentLang].subtitle;
            document.getElementById('loginBtn').textContent = translations[currentLang].loginBtn;
            document.getElementById('demoText').textContent = translations[currentLang].demoText;
            document.getElementById('orderNumberInput').placeholder = translations[currentLang].placeholder;
        }

        document.getElementById('loginBtn').addEventListener('click', function() {
            const orderNumber = document.getElementById('orderNumberInput').value.trim();
            if (orderNumber) {
                window.location.href = `gallery.html?order=${orderNumber}`;
            } else {
                showToast(translations[currentLang].toastError);
            }
        });

        document.getElementById('orderNumberInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
