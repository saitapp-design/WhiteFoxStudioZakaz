<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        :root {
            --teal: #007883;
            --teal-dark: #0a6570;
            --teal-light: #d4e9ec;
            --border: #e2e8f0;
            --red: #dc2626;
            --red-light: #fee2e2;
            --slot-filled: #c8e6df;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 10px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 42px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 170px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.2rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 42px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 1rem 0;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .order-header {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 4px 12px rgba(0,120,131,0.1);
        }

        .product-content {
            padding: 1rem;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .product-info {
            flex: 1;
        }

        .product-sku {
            background: var(--teal-light);
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--teal);
            font-family: monospace;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .product-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--teal);
            margin-bottom: 0.3rem;
        }

        .product-details {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }

        .product-size {
            font-size: 0.7rem;
            color: #6c757d;
            background: #e9ecef;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .product-pose {
            font-size: 0.7rem;
            background: var(--teal-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--teal);
            font-weight: 600;
        }

        .badge-auto {
            background: var(--red-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--red);
            font-weight: 500;
            display: inline-block;
        }

        .badge-package {
            background: #ffd966;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #856404;
            font-weight: 600;
            display: inline-block;
        }

        .product-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
            background: #f5f5f5;
            flex-shrink: 0;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .slots-row {
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            justify-content: flex-start;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .oval {
            border-radius: 40px;
            background: white;
            border: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: all 0.15s;
            height: 42px;
            padding: 0 0.8rem;
            min-width: 70px;
        }

        .oval:hover:not(.disabled) {
            border-color: var(--teal-dark);
            background: #f0f9fa;
        }

        .oval.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .oval.disabled {
            background: var(--red-light);
            border-color: var(--red);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .oval-input {
            border-radius: 40px;
            border: 2px solid var(--teal);
            background: white;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            outline: none;
            font-family: monospace;
            height: 42px;
            padding: 0 0.8rem;
            min-width: 70px;
        }

        .slot-number {
            font-size: 0.55rem;
            font-weight: 500;
            color: #8b9aab;
        }

        .auto-note {
            font-size: 0.55rem;
            font-weight: 500;
            color: var(--red);
            background: var(--red-light);
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
        }

        .global-actions {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--teal);
            font-size: 1.1rem;
        }

        @media (max-width: 700px) {
            .slots-row { gap: 0.6rem; }
            .oval { height: 38px; font-size: 0.75rem; min-width: 60px; padding: 0 0.5rem; }
            .product-image { width: 55px; height: 55px; }
            .product-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox">
            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="right-actions">
            <div class="search-box">
                <input type="text" id="orderInput" placeholder="Order number" value="1111">
                <button id="checkBtn">OK</button>
            </div>
            <button class="lang-toggle" id="langBtn">
                <span id="langIcon">🇬🇧</span>
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;
    
    const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
    
    let supabaseClient = null;
    let productsDB = [];
    let currentLang = 'en';
    let currentOrder = null;
    let assignments = {};
    let editingSlot = null;
    let isLoading = true;

    const trans = {
        en: { 
            enter: "Enter Order Number", btn: "Continue", invalid: "Use code 1111", 
            ok: "✓ Order loaded", dup: "⚠️ Photo number already used", 
            range: `Use ${MIN_PHOTO}–${MAX_PHOTO}`, 
            saved: "✓ Selection saved", back: "← Back", notSelectable: "Auto-assigned",
            loading: "Loading products...", error: "Error", viewPhoto: "View photo", 
            size: "Size", pose: "Photos", noImage: "No image", package: "Package"
        },
        th: { 
            enter: "กรอกหมายเลขคำสั่งซื้อ", btn: "ดำเนินการ", invalid: "ใช้รหัส 1111", 
            ok: "✓ โหลดแล้ว", dup: "⚠️ หมายเลขรูปซ้ำ", range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, 
            saved: "✓ บันทึกแล้ว", back: "← กลับ", notSelectable: "กำหนดอัตโนมัติ",
            loading: "กำลังโหลดสินค้า...", error: "เกิดข้อผิดพลาด", viewPhoto: "ดูรูป",
            size: "ขนาด", pose: "จำนวนรูป", noImage: "ไม่มีรูป", package: "แพ็คเกจ"
        }
    };

    function t(key) { return trans[currentLang][key] || trans.en[key]; }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO && Number.isInteger(n); }

    function isUsedInProduct(prodKey, idx, num) {
        const a = assignments[prodKey];
        if (!a) return false;
        for (let i = 0; i < a.values.length; i++) {
            if (i !== idx && a.values[i] === num) return true;
        }
        return false;
    }

    function setValue(prodKey, idx, val) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return false;
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, idx, val)) { toast(t('dup')); return false; }
        a.values[idx] = val;
        render();
        return true;
    }

    function getOvalWidth(poseCount) {
        if (poseCount <= 2) return 95;
        if (poseCount <= 3) return 88;
        if (poseCount <= 4) return 82;
        if (poseCount <= 6) return 76;
        if (poseCount <= 10) return 70;
        if (poseCount <= 16) return 64;
        return 58;
    }

    function getDirectImageUrl(imgUrl) {
        if (!imgUrl) return null;
        if (imgUrl.includes('i.postimg.cc')) return imgUrl;
        if (imgUrl.includes('disk.yandex.ru')) {
            if (imgUrl.includes('/i/')) return imgUrl;
            if (imgUrl.includes('/d/')) return imgUrl.replace('/d/', '/i/');
        }
        return imgUrl;
    }

    function showImageModal(imgUrl, productName) {
        const directUrl = getDirectImageUrl(imgUrl);
        if (!directUrl) { toast('No image available'); return; }
        const modal = document.createElement('div');
        modal.className = 'image-modal';
        const img = document.createElement('img');
        img.src = directUrl;
        img.alt = productName;
        img.onerror = () => { modal.innerHTML = '<div style="color:white; text-align:center; padding:2rem;">❌ Image not available</div>'; };
        modal.appendChild(img);
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }

    async function loadProductsFromSupabase() {
        console.log('🚀 Initializing Supabase client...');
        
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client initialized successfully');
            
            isLoading = true;
            render();
            
            // Load product cards
            console.log('📥 Fetching product cards from Supabase...');
            const { data: productCards, error: cardsError } = await supabaseClient
                .from('product_cards')
                .select('*');
            
            if (cardsError) {
                console.error('❌ Error fetching product cards:', cardsError);
                throw cardsError;
            }
            
            console.log(`✅ Fetched ${productCards?.length || 0} product cards`);
            
            // Load packages
            console.log('📦 Fetching packages from Supabase...');
            const { data: packagesData, error: packagesError } = await supabaseClient
                .from('packages_with_price')
                .select('*');
            
            if (packagesError) {
                console.warn('⚠️ Error fetching packages:', packagesError.message);
            } else {
                console.log(`✅ Fetched ${packagesData?.length || 0} packages`);
            }
            
            productsDB = [];
            
            // Process product cards
            if (productCards && productCards.length > 0) {
                for (const card of productCards) {
                    let pose = 1;
                    let selectable = true;
                    let size = card.size || '';
                    let imageUrl = card.cover_image || null;
                    let skuValue = card.sku || card.article;
                    
                    if (!skuValue) {
                        skuValue = `PROD_${Date.now()}_${Math.random()}`;
                    }
                    
                    if (card.variants) {
                        try {
                            const variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                            if (variants && variants.length > 0) {
                                if (variants[0].pose) pose = Math.min(parseInt(variants[0].pose), 30);
                                if (variants[0].size_label) size = variants[0].size_label;
                                if (variants[0].image_url && !imageUrl) imageUrl = variants[0].image_url;
                                if (!skuValue && variants[0].sku) skuValue = variants[0].sku;
                            }
                        } catch(e) { console.warn('Parse variants error:', e); }
                    }
                    
                    if (card.pose) pose = Math.min(parseInt(card.pose), 30);
                    if (card.total_photos) pose = Math.min(parseInt(card.total_photos), 30);
                    if (pose < 1) pose = 1;
                    
                    const nameEn = card.name_en || 'Product';
                    const nameTh = card.name_th || 'สินค้า';
                    
                    if (nameEn.toLowerCase().includes('group') || 
                        nameEn.toLowerCase().includes('logo') || 
                        (card.mess && card.mess.toLowerCase().includes('group'))) {
                        selectable = false;
                    }
                    
                    productsDB.push({
                        id: `product_${skuValue}`,
                        type: 'product',
                        sku: skuValue,
                        name_en: nameEn,
                        name_th: nameTh,
                        size: size,
                        pose: pose,
                        selectable: selectable,
                        image: imageUrl
                    });
                    
                    console.log(`   → Product: ${skuValue} - ${nameEn}, Pose: ${pose}, Selectable: ${selectable}`);
                }
            }
            
            // Process packages
            if (packagesData && packagesData.length > 0) {
                for (const pkg of packagesData) {
                    let pose = 0;
                    let packageItems = [];
                    let skuValue = pkg.sku || pkg.slug;
                    
                    if (!skuValue) {
                        skuValue = `PKG_${Date.now()}_${Math.random()}`;
                    }
                    
                    try {
                        if (pkg.contents) {
                            packageItems = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                            pose = packageItems.reduce((total, item) => total + (item.qty || 1), 0);
                        }
                    } catch(e) { console.warn('Parse package contents error:', e); }
                    
                    if (pkg.total_photos) pose = Math.min(parseInt(pkg.total_photos), 100);
                    if (pose < 1) pose = 1;
                    
                    const nameEn = pkg.name_en || `Package ${skuValue}`;
                    const nameTh = pkg.name_th || `แพ็คเกจ ${skuValue}`;
                    
                    productsDB.push({
                        id: `package_${skuValue}`,
                        type: 'package',
                        sku: skuValue,
                        name_en: nameEn,
                        name_th: nameTh,
                        size: pkg.size || '',
                        pose: pose,
                        selectable: true,
                        image: pkg.image_url || null,
                        packageItems: packageItems,
                        isPackage: true
                    });
                    
                    console.log(`   → Package: ${skuValue} - ${nameEn}, Total photos: ${pose}`);
                }
            }
            
            if (productsDB.length === 0) {
                console.warn('⚠️ No products loaded, using demo data');
                productsDB = getDemoProducts();
            }
            
            console.log(`✅ Total products loaded: ${productsDB.length}`);
            console.log('📊 Product types:', productsDB.map(p => ({ sku: p.sku, type: p.type, pose: p.pose })));
            
            isLoading = false;
            toast(`✅ ${productsDB.length} products loaded`);
            
        } catch (error) {
            console.error('❌ Supabase initialization error:', error);
            productsDB = getDemoProducts();
            isLoading = false;
            toast(`⚠️ Using demo data (${productsDB.length} products)`);
        }
    }

    function getDemoProducts() {
        console.log('📦 Using demo product data');
        return [
            { id: "DEMO01", type: "product", sku: "DEMO01", name_en: "Acrylic Photo Frame", name_th: "กรอบอะคริลิค", size: "8x12 inch", pose: 2, selectable: true, image: null },
            { id: "PKG_DEMO", type: "package", sku: "PACKAGE-S", name_en: "Package S - Starter Set", name_th: "แพ็คเกจ S - ชุดเริ่มต้น", size: "Mixed", pose: 6, selectable: true, image: null, isPackage: true },
            { id: "DEMO02", type: "product", sku: "DEMO02", name_en: "Group Photo Canvas", name_th: "ภาพกลุ่มผ้าใบ", size: "12x12 inch", pose: 1, selectable: false, image: null }
        ];
    }

    function loadRandomOrder() {
        if (productsDB.length === 0) return;
        
        console.log('🔄 Loading random order with products...');
        
        const shuffled = [...productsDB];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        const selected = shuffled.slice(0, Math.min(8, shuffled.length));
        console.log(`📋 Selected ${selected.length} products for order:`, selected.map(p => p.sku));
        
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `${prod.type}_${prod.sku}_${Date.now()}_${Math.random()}`;
            assignments[key] = {
                key: key,
                id: prod.id,
                sku: prod.sku,
                nameEn: prod.name_en,
                nameTh: prod.name_th,
                size: prod.size,
                pose: prod.pose,
                selectable: prod.selectable,
                image: prod.image,
                type: prod.type,
                isPackage: prod.isPackage || false,
                values: new Array(prod.pose).fill(null)
            };
        }
        render();
        toast(t('ok'));
    }

    function handleOvalClick(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return;
        
        const ovalDiv = document.getElementById(`oval_${prodKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${idx}`) return;
        
        const width = ovalDiv.offsetWidth;
        const height = ovalDiv.offsetHeight;
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${width}px`;
        input.style.height = `${height}px`;
        
        ovalDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setValue(prodKey, idx, newVal);
            } else if (isNaN(newVal) && currentVal !== null) {
                setValue(prodKey, idx, null);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') save();
        });
        
        editingSlot = `${prodKey}_${idx}`;
    }

    function render() {
        const container = document.getElementById('app');
        
        if (isLoading) {
            container.innerHTML = `<div class="login-card"><div class="loading">⏳ ${t('loading')}</div></div>`;
            return;
        }
        
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card">
                <h3>${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadRandomOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            totalSlots += a.values.length;
            totalFilled += a.values.filter(v => v !== null).length;
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ${currentOrder.number}</div>
            <div class="order-badge">${totalFilled}/${totalSlots}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const poseCount = asgn.pose;
            const ovalWidth = getOvalWidth(poseCount);
            const ovalHeight = 42;
            const imageUrl = getDirectImageUrl(asgn.image);
            const isPackage = asgn.isPackage || asgn.type === 'package';
            
            html += `<div class="product-card">
                <div class="product-content">
                    <div class="product-header">
                        <div class="product-info">
                            <div>
                                <span class="product-sku">${asgn.sku || 'N/A'}</span>
                                ${isPackage ? `<span class="badge-package">📦 ${t('package')}</span>` : ''}
                            </div>
                            <div class="product-title">${name || asgn.sku}</div>
                            <div class="product-details">
                                ${asgn.size ? `<span class="product-size">📏 ${t('size')}: ${asgn.size}</span>` : ''}
                                <span class="product-pose">📷 ${t('pose')}: ${poseCount}</span>
                                ${!asgn.selectable ? `<span class="badge-auto">🔒 ${t('notSelectable')}</span>` : ''}
                            </div>
                        </div>
                        ${imageUrl ? `<img class="product-image" src="${imageUrl}" alt="${name}" onerror="this.src='https://placehold.co/70x70?text=No+Image'" onclick="showImageModal('${imageUrl}', '${name.replace(/'/g, "\\'")}')" title="${t('viewPhoto')}">` : '<div style="width:70px; height:70px; background:#f0f0f0; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#999;">No img</div>'}
                    </div>
                    <div class="slots-row">`;
            
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isFilled = val !== null;
                
                if (asgn.selectable) {
                    html += `<div class="slot-wrapper">
                        <div id="oval_${key}_${i}" class="oval ${isFilled ? 'filled' : ''}" 
                             style="width:${ovalWidth}px; height:${ovalHeight}px;"
                             onclick="handleOvalClick('${key}', ${i}, ${val !== null ? val : 'null'})">${isFilled ? val : ''}</div>
                        <span class="slot-number">${i+1}</span>
                    </div>`;
                } else {
                    html += `<div class="slot-wrapper">
                        <div class="oval disabled" style="width:${ovalWidth}px; height:${ovalHeight}px;"></div>
                        <span class="slot-number">${i+1}</span>
                        <span class="auto-note">${t('notSelectable')}</span>
                    </div>`;
                }
            }
            html += `</div></div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════════\n   WHITE FOX STUDIO\n   PHOTO SELECTION\n═══════════════════════════\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n📦 ${a.sku} — ${name}\n📏 ${t('size')}: ${a.size || '—'}  |  📷 ${t('pose')}: ${a.pose}\n`;
                for (let i = 0; i < a.values.length; i++) {
                    summary += `   ${String(i+1).padStart(2)}: ${a.values[i] || '❌'}\n`;
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleOvalClick = handleOvalClick;
    window.showImageModal = showImageModal;

    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render();
        else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        updateLang();
    });
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadRandomOrder();
        else toast(t('invalid'));
    });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });

    (async () => {
        await loadProductsFromSupabase();
        render();
        updateLang();
    })();
</script>
</body>
</html>
