            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        :root {
            --teal: #007883;
            --teal-dark: #0a6570;
            --teal-light: #d4e9ec;
            --border: #e2e8f0;
            --red: #dc2626;
            --red-light: #fee2e2;

            --cover: #fef3c7;

            --package: #ffd966;
        }

            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 10px rgba(0,120,131,0.08);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 42px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 170px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.2rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 42px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 1rem 0;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .category-filter {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        .category-btn {
            background: #f0f0f0;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .category-btn.active {
            background: var(--teal);
            color: white;
        }

        .order-header {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 4px 12px rgba(0,120,131,0.1);
        }

        .product-content {
            padding: 1rem;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .product-info {
            flex: 1;
        }

        .product-category {
            background: var(--teal-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--teal);
            display: inline-block;
            margin-right: 0.5rem;
        }

        .product-sku {
            background: #e9ecef;
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #495057;
            font-family: monospace;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .badge-package {
            background: var(--package);
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #856404;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .product-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--teal);
            margin-bottom: 0.3rem;

            border: 1px solid var(--border);
            cursor: pointer;

            gap: 0.8rem;

            justify-content: flex-start;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            min-width: 80px;
        }

        .oval {
            border-radius: 40px;
            background: white;
            border: 2px solid var(--teal);

            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: all 0.15s;
            height: 42px;
            padding: 0 0.8rem;
            min-width: 70px;
        }

            border-color: var(--teal-dark);
            background: #f0f9fa;
        }

        .oval.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
            color: var(--teal-dark);
        }

        .oval.disabled {
            background: #e5e7eb;
            border-color: #9ca3af;
            cursor: not-allowed;
            color: #6b7280;
            opacity: 0.9;
        }

        .oval.cover {
            background: var(--cover);
            border-color: #f59e0b;
        }

        .oval.internal {
            background: var(--internal);
            border-color: #6366f1;
        }

        .oval.design {
            background: var(--design);
            border-color: #a855f7;
        }

            border-radius: 40px;
            border: 2px solid var(--teal);
            background: white;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            outline: none;
            font-family: monospace;
            height: 42px;
            padding: 0 0.8rem;
            min-width: 70px;
        }

        .slot-number {
            font-size: 0.6rem;
            font-weight: 500;
            color: #6b7280;
            text-align: center;
            max-width: 100px;
        }

        .slot-note {
            font-size: 0.55rem;
            font-weight: 500;
            color: #dc2626;
            background: var(--red-light);

            border-radius: 20px;
            text-align: center;

            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--teal);
            font-size: 1.1rem;
        }

        .stats-bar {
            background: white;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        @media (max-width: 700px) {
            .slots-row { gap: 0.6rem; }
            .oval { height: 38px; font-size: 0.75rem; min-width: 60px; padding: 0 0.5rem; }
            .product-image { width: 55px; height: 55px; }
            .product-title { font-size: 0.9rem; }
            .slot-wrapper { min-width: 65px; }
            .slot-number { font-size: 0.55rem; }
        }
    </style>
</head>

    function buildProductsArray() {
        const db = getCompleteProductDatabase();
        const allProducts = [];
        
        // Add all regular products
        for (const category in db) {
            if (category !== 'packages' && Array.isArray(db[category])) {
                db[category].forEach(product => {
                    allProducts.push({
                        ...product,
                        category: category,
                        isPackage: false
                    });
                });
            }
        }
        
        // Add packages
        if (db.packages) {
            db.packages.forEach(pkg => {
                allProducts.push({
                    ...pkg,
                    category: 'packages',
                    isPackage: true
                });
            });
        }
        
        return allProducts;
    }

    function generateSlotConfig(product) {
        const slots = [];
        const photos = product.photos;
        
        if (product.isPackage) {
            // Package slots with auto-assigned
            for (let i = 0; i < photos; i++) {
                let type = 'photo';
                let label = `Photo ${i + 1}`;
                let disabled = false;
                let note = null;
                
                if (product.autoSlots && product.autoSlots.includes(i)) {
                    if (i === 0) {
                        label = "Class Serious + Logo";
                        note = "Auto-assigned";
                    } else if (i === 1) {
                        label = "Class Sabai";
                        note = "Auto-assigned";
                    }
                    disabled = true;
                }
                
                slots.push({ type, label, note, disabled });
            }
            return slots;
        }
        
        // Regular products based on sequence
        const sequence = product.sequence || '';
        
        if (product.type === 'book') {
            // Special handling for books
            if (photos === 16) {
                slots.push({ type: 'backCover', label: t('backCover'), note: null, disabled: false });
                slots.push({ type: 'frontCover', label: t('frontCover'), note: null, disabled: false });
                for (let i = 2; i < photos; i++) {
                    slots.push({ type: 'internal', label: `Page ${i - 1}`, note: null, disabled: false });
                }
            } else {
                slots.push({ type: 'backCover', label: t('backCover'), note: null, disabled: false });
                slots.push({ type: 'frontCover', label: t('frontCover'), note: "Preferably portrait", disabled: false });
                for (let i = 2; i < photos; i++) {
                    const isGroupPage = (product.note && product.note.includes('group') && i === 5);
                    slots.push({ 
                        type: isGroupPage ? 'group' : 'internal', 
                        label: `Page ${i - 1}`, 
                        note: isGroupPage ? "Group photo required" : null, 
                        disabled: false 
                    });
                }
            }
        } else if (product.type === 'group' || product.type === 'group+brand') {
            slots.push({ type: 'group', label: 'Group Photo', note: product.note, disabled: product.note?.includes('not selected') });
            if (product.photos > 1) {
                slots.push({ type: 'brand', label: 'Brand/Logo', note: null, disabled: false });
            }
        } else if (product.type === 'design' && product.photos > 1) {
            for (let i = 0; i < product.photos; i++) {
                slots.push({ type: 'design', label: `Design ${i + 1}`, note: null, disabled: false });
            }
        } else if (product.type === 'portrait+logo') {
            slots.push({ type: 'portrait', label: 'Portrait + Logo', note: product.note, disabled: false });
        } else if (product.type === 'group+logo') {
            slots.push({ type: 'group', label: 'Group + Logo', note: product.note, disabled: product.note?.includes('not selected') });
        } else {
            // Default: portrait or photo
            for (let i = 0; i < product.photos; i++) {
                slots.push({ 
                    type: product.type === 'portrait' ? 'portrait' : 'photo', 
                    label: product.type === 'portrait' ? 'Portrait' : `Photo ${i + 1}`, 
                    note: i === 0 && product.note ? product.note : null, 
                    disabled: false 
                });
            }
        }
        
        return slots;
    }

    async function loadProducts() {
        console.log('🚀 Loading products...');
        isLoading = true;
        render();
        
        try {
            // Try to load from Supabase first
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const { data: productData, error: productError } = await supabaseClient
                .from('product_cards')
                .select('*')
                .limit(10);
            
            if (productError || !productData || productData.length === 0) {
                console.log('No data from Supabase, using complete demo database');
                productsDB = buildProductsArray();
            } else {
                // Process Supabase data
                productsDB = productData.map(item => ({
                    sku: item.sku,
                    name_en: item.name_en,
                    name_ru: item.name_ru || item.name_en,
                    name_th: item.name_th || item.name_en,
                    size: item.size || '',
                    photos: item.total_photos || item.pose || 1,
                    category: 'other',
                    isPackage: false,
                    sequence: item.architecture_sequence || '',
                    note: item.selection_notes || item.mess || ''
                }));
                
                // Add packages if available
                const { data: packageData } = await supabaseClient.from('packages_with_price').select('*');
                if (packageData && packageData.length > 0) {
                    packageData.forEach(pkg => {
                        productsDB.push({
                            sku: pkg.sku,
                            name_en: pkg.name_en,
                            name_ru: pkg.name_ru || pkg.name_en,
                            name_th: pkg.name_th || pkg.name_en,
                            size: pkg.size || '',
                            photos: pkg.total_photos || 1,
                            category: 'packages',
                            isPackage: true,
                            autoSlots: pkg.sku.includes('S') ? [0] : (pkg.sku.includes('M') ? [0,1] : (pkg.sku.includes('L') ? [0,1] : []))
                        });
                    });
                }
            }
            
            if (productsDB.length === 0) {
                productsDB = buildProductsArray();
            }
            
            console.log(`✅ Loaded ${productsDB.length} products`);
            isLoading = false;
            render();
            
        } catch (error) {
            console.error('Error loading products:', error);
            productsDB = buildProductsArray();
            isLoading = false;
            render();
            toast(`Using demo database: ${productsDB.length} products`);
        }
    }

    function loadRandomOrder() {
        if (productsDB.length === 0) return;
        
        let filtered = currentCategory === 'all' ? productsDB : productsDB.filter(p => p.category === currentCategory);
        if (filtered.length === 0) filtered = productsDB;
        
        const shuffled = [...filtered];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        const selected = shuffled.slice(0, Math.min(12, shuffled.length));
        
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `${prod.sku}_${Date.now()}_${Math.random()}`;
            const slotConfig = generateSlotConfig(prod);
            
            assignments[key] = {
                key: key,
                sku: prod.sku,
                nameEn: prod.name_en,
                nameRu: prod.name_ru,
                nameTh: prod.name_th,
                category: prod.category,
                size: prod.size,
                pose: prod.photos,
                image: prod.image || null,
                isPackage: prod.isPackage || false,
                values: new Array(prod.photos).fill(null),
                disabledSlots: slotConfig.map(s => s.disabled),
                slotNotes: slotConfig.map(s => s.note),
                slotTypes: slotConfig.map(s => s.type),
                slotLabels: slotConfig.map(s => s.label)
            };
        }
        render();
        toast(t('ok'));
    }

    function handleOvalClick(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a) return;
        if (a.disabledSlots && a.disabledSlots[idx]) {
            toast(t('notSelectable'));
            return;
        }
        
        const ovalDiv = document.getElementById(`oval_${prodKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${idx}`) return;
        
        const width = ovalDiv.offsetWidth;
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${width}px`;
        input.style.height = '42px';
        input.placeholder = t('selectPhoto');
        
        ovalDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setValue(prodKey, idx, newVal);
            } else if (isNaN(newVal) && currentVal !== null) {
                setValue(prodKey, idx, null);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') save();
        });
        
        editingSlot = `${prodKey}_${idx}`;
    }

    function render() {
        const container = document.getElementById('app');
        
        if (isLoading) {
            container.innerHTML = `<div class="login-card"><div class="loading">⏳ ${t('loading')}</div></div>`;
            return;
        }
        
        if (!currentOrder) {
            const categories = [
                { id: 'all', name: t('all') },
                { id: 'acrylic', name: 'Acrylic' },
                { id: 'frame', name: 'Float Frame' },
                { id: 'canvas', name: 'Canvas' },
                { id: 'books', name: 'Books' },
                { id: 'calendars', name: 'Calendars' },
                { id: 'mugs', name: 'Mugs & Bottles' },
                { id: 'packages', name: t('packages') }
            ];
            
            let catsHtml = `<div class="category-filter">
                <span style="font-weight:600; margin-right:0.5rem;">📁 ${t('categories')}:</span>`;
            categories.forEach(cat => {
                catsHtml += `<button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">${cat.name}</button>`;
            });
            catsHtml += `</div>`;
            
            let statsHtml = `<div class="stats-bar">
                <span>📦 ${t('products')}: ${productsDB.filter(p => !p.isPackage).length}</span>
                <span>🎁 ${t('packages')}: ${productsDB.filter(p => p.isPackage).length}</span>
                <span>📷 ${t('total')}: ${productsDB.length}</span>
            </div>`;
            
            container.innerHTML = catsHtml + statsHtml + `<div class="login-card">
                <h3>🎬 ${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.cat;
                    render();
                });
            });
            
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadRandomOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            totalSlots += a.values.length;
            totalFilled += a.values.filter(v => v !== null).length;
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 Order: ${currentOrder.number}</div>
            <div class="order-badge">✅ ${totalFilled}/${totalSlots} ${t('photos')}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : (currentLang === 'ru' ? asgn.nameRu : asgn.nameTh);
            const poseCount = asgn.pose;
            const ovalWidth = getOvalWidth(poseCount);
            
            html += `<div class="product-card">
                <div class="product-content">
                    <div class="product-header">
                        <div class="product-info">
                            <div>
                                <span class="product-sku">${asgn.sku}</span>
                                ${asgn.isPackage ? '<span class="badge-package">📦 PACKAGE</span>' : ''}
                            </div>
                            <div class="product-title">${name}</div>
                            <div class="product-details">
                                ${asgn.size ? `<span class="product-size">📏 ${t('size')}: ${asgn.size}</span>` : ''}
                                <span class="product-pose">📷 ${t('photos')}: ${poseCount}</span>
                            </div>
                        </div>
                        <div style="width:70px; height:70px; background:#f0f0f0; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2rem;">📷</div>
                    </div>
                    <div class="slots-container">
                        <div class="slots-row">`;
            
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isFilled = val !== null;
                const isDisabled = asgn.disabledSlots && asgn.disabledSlots[i];
                const slotType = asgn.slotTypes ? asgn.slotTypes[i] : 'photo';
                const slotLabel = asgn.slotLabels ? asgn.slotLabels[i] : `${i+1}`;
                const slotNote = asgn.slotNotes ? asgn.slotNotes[i] : null;
                const ovalClass = getOvalClass(slotType, isFilled, isDisabled);
                
                html += `<div class="slot-wrapper">
                    <div id="oval_${key}_${i}" class="${ovalClass}" 
                         style="width:${ovalWidth}px; height:42px;"
                         onclick="handleOvalClick('${key}', ${i}, ${val !== null ? val : 'null'})">${isFilled ? val : ''}</div>
                    <span class="slot-number">${slotLabel}</span>
                    ${slotNote ? `<span class="slot-note">📌 ${slotNote}</span>` : ''}
                </div>`;
            }
            
            html += `</div></div></div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════════\n   WHITE FOX STUDIO\n   PHOTO SELECTION\n═══════════════════════════\n\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : (currentLang === 'ru' ? a.nameRu : a.nameTh);
                summary += `📦 ${a.sku} — ${name}\n`;
                summary += `📏 ${t('size')}: ${a.size || '—'}  |  📷 ${t('photos')}: ${a.pose}\n`;
                for (let i = 0; i < a.values.length; i++) {
                    const slotLabel = a.slotLabels ? a.slotLabels[i] : `${i+1}`;
                    const val = a.values[i] || '❌';
                    summary += `   ${slotLabel.padEnd(20)}: ${val}\n`;
                }
                summary += `\n${'─'.repeat(50)}\n`;
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleOvalClick = handleOvalClick;

    function updateLang() {
        const iconSpan = document.getElementById('langIcon');
        const textSpan = document.getElementById('langText');
        if (iconSpan) {
            if (currentLang === 'en') iconSpan.innerText = '🇬🇧';
            else if (currentLang === 'ru') iconSpan.innerText = '🇷🇺';
            else iconSpan.innerText = '🇹🇭';
        }
        if (textSpan) {
            if (currentLang === 'en') textSpan.innerText = 'EN';
            else if (currentLang === 'ru') textSpan.innerText = 'RU';
            else textSpan.innerText = 'TH';
        }
        if (currentOrder) render();
        else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => {
        const langs = ['en', 'ru', 'th'];
        const currentIndex = langs.indexOf(currentLang);
        currentLang = langs[(currentIndex + 1) % langs.length];
        updateLang();
    });
    
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadRandomOrder();
        else toast(t('invalid'));
    });
    
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });

    // Initialize
    loadProducts();
</script>
