    // ========== PACKAGE SLOT CONFIGURATION (Q1, Q2, Q3) ==========
    // Returns { slotLabels: string[], disabledIndices: number[] } for a given package SKU
    function getPackageSlotConfig(sku, totalSlots) {
        const upper = sku.toUpperCase();
        if (upper.includes('Q1') || upper === 'S' || (upper.includes('PACKAGE') && upper.includes('S'))) {

    // ========== Supabase & Data ==========
    async function loadProductsFromSupabase() {
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            isLoading = true;
            render();
            const { data: productCardsData, error: productCardsError } = await supabaseClient.from('product_cards').select('*');
            if (productCardsError) throw productCardsError;
            const { data: packagesData, error: packagesError } = await supabaseClient.from('packages_with_price').select('*');
            if (packagesError) console.warn(packagesError);
            let processed = [];
            if (productCardsData) {
                productCardsData.forEach(card => {
                    let pose = 1;
                    if (card.pose) pose = Math.min(parseInt(card.pose), 30);
                    if (card.total_photos) pose = Math.min(parseInt(card.total_photos), 30);
                    processed.push({
                        id: card.card_id || `card_${Date.now()}`,
                        sku: card.sku || `SKU_${card.card_id}`,
                        name_en: card.name_en || 'Product',
                        name_th: card.name_th || 'สินค้า',
                        size: card.size || '',
                        pose: pose,
                        selectable: true,
                        image_url: card.cover_image || null,
                        isPackage: false,
                        sort_product: card.sort_product || 999
                    });
                });
            }
            if (packagesData && packagesData.length) {
                packagesData.forEach(pkg => {
                    if (pkg.visible === false) return;
                    let totalPhotos = pkg.total_photos || 1;
                    if (pkg.contents) {
                        try {
                            let items = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                            totalPhotos = items.reduce((sum, item) => sum + (item.qty || 1), 0);
                        } catch(e) {}
                    }
                    processed.push({
                        id: `package_${pkg.sku}`,
                        sku: pkg.sku || `PACKAGE-${Date.now()}`,
                        name_en: pkg.name_en || pkg.sku,
                        name_th: pkg.name_th || pkg.name_en || pkg.sku,
                        size: pkg.size || '',
                        pose: totalPhotos,
                        selectable: true,
                        image_url: pkg.image_url || null,
                        isPackage: true,
                        sort_product: pkg.sort_order || 999
                    });
                });
            }
            productsDB = processed.sort((a,b) => (a.sort_product||999) - (b.sort_product||999));
            if (!productsDB.length) productsDB = getDemoProducts();
            await preloadImages(productsDB);
            isLoading = false;
            toast(`✅ ${productsDB.length} products loaded`);
        } catch (err) {
            console.error(err);
            productsDB = getDemoProducts();
            isLoading = false;
            toast(`⚠️ Using demo data`);
        }
    }

    async function preloadImages(products) {
        const urls = products.map(p => p.image_url).filter(url => url && url.startsWith('http'));
        await Promise.all(urls.map(url => new Promise(resolve => { let img = new Image(); img.onload = resolve; img.onerror = resolve; img.src = url; })));
    }

    function t(key) {
        const dict = { en: { enter:"Enter Order Number", btn:"Continue", invalid:"Use code 1111", ok:"✓ Order loaded", dup:"⚠️ Photo number already used", range:`Use ${MIN_PHOTO}–${MAX_PHOTO}`, saved:"✓ Selection saved", back:"← Back", notSelectable:"Auto-assigned", loading:"Loading products...", error:"Error", viewPhoto:"View photo", size:"Size", pose:"Photos", noImage:"No image", package:"Package" },
            th: { enter:"กรอกหมายเลขคำสั่งซื้อ", btn:"ดำเนินการ", invalid:"ใช้รหัส 1111", ok:"✓ โหลดแล้ว", dup:"⚠️ หมายเลขรูปซ้ำ", range:`ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, saved:"✓ บันทึกแล้ว", back:"← กลับ", notSelectable:"กำหนดอัตโนมัติ", loading:"กำลังโหลดสินค้า...", error:"เกิดข้อผิดพลาด", viewPhoto:"ดูรูป", size:"ขนาด", pose:"จำนวนรูป", noImage:"ไม่มีรูป", package:"แพ็คเกจ" } };
        return dict[currentLang][key] || dict.en[key];
    }
    function toast(msg) { let el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 2000); }
    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO && Number.isInteger(n); }
    function isUsedInProduct(prodKey, idx, num) {
        let a = assignments[prodKey];
        if (!a) return false;
        for (let i=0; i<a.values.length; i++) if (i!==idx && a.values[i]===num) return true;
        return false;
    }
    function setValue(prodKey, idx, val) {
        let a = assignments[prodKey];
        if (!a) return false;
        if (a.selectableMask && a.selectableMask[idx] === false) { toast(t('notSelectable')); return false; }
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, idx, val)) { toast(t('dup')); return false; }
        a.values[idx] = val;
        render();
        return true;
    }
    function getDirectImageUrl(imgUrl) { return imgUrl && (imgUrl.includes('i.postimg.cc') || imgUrl.includes('disk.yandex.ru')) ? imgUrl : null; }
    function showImageModal(imgUrl, productName) {
        let direct = getDirectImageUrl(imgUrl);
        if (!direct) { toast('No image'); return; }
        let modal = document.createElement('div'); modal.className = 'image-modal';
        let img = document.createElement('img'); img.src = direct; img.alt = productName;
        modal.appendChild(img); modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }
    function loadRandomOrder() {
        if (!productsDB.length) return;
        let shuffled = [...productsDB];
        for (let i=shuffled.length-1; i>0; i--) { let j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        let selected = shuffled.slice(0, Math.min(8, shuffled.length));
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        for (let prod of selected) {
            let key = `${prod.isPackage?'pkg':'prd'}_${prod.sku}_${Date.now()}_${Math.random()}`;
            let poseCount = prod.pose || 1;
            let slotLabels = [];
            let selectableMask = new Array(poseCount).fill(true);
            
            // Apply architecture rules if regular product
            if (!prod.isPackage) {
                let arch = getArchitectureForProduct(prod.sku);
                if (arch && arch.slotLabels && arch.slotLabels.length === poseCount) {
                    slotLabels = arch.slotLabels;
                    if (arch.disabledIndices) arch.disabledIndices.forEach(i => { if (i < poseCount) selectableMask[i] = false; });
                } else {
                    slotLabels = Array.from({length:poseCount}, (_,i) => `${t('pose')} ${i+1}`);
                }
            } 
            // For packages, use the new package slot config
            else {
                let pkgConfig = getPackageSlotConfig(prod.sku, poseCount);
                if (pkgConfig && pkgConfig.slotLabels.length === poseCount) {
                    slotLabels = pkgConfig.slotLabels;
                    if (pkgConfig.disabledIndices) pkgConfig.disabledIndices.forEach(i => { if (i < poseCount) selectableMask[i] = false; });
                } else {
                    // fallback generic labels
                    slotLabels = Array.from({length:poseCount}, (_,i) => `Photo ${i+1}`);
                }
            }
            
            assignments[key] = {
                key, id: prod.id, sku: prod.sku, nameEn: prod.name_en, nameTh: prod.name_th,
                size: prod.size, pose: poseCount, image: prod.image_url, isPackage: prod.isPackage,
                values: new Array(poseCount).fill(null),
                selectableMask, slotLabels,
                autoLabels: selectableMask.map((sel, idx) => sel ? null : (slotLabels[idx] || t('notSelectable'))) // store auto label for disabled slots
            };
        }
        render();
        toast(t('ok'));
    }
    function getArchitectureForProduct(sku) {
        if (!sku) return null;
        const upperSku = sku.toUpperCase();
        for (let [key, rules] of Object.entries(architectureMap)) {
            if (upperSku.includes(key)) return rules;
        }
        return null;
    }
    function handleOvalClick(prodKey, idx, currentVal) {
        let a = assignments[prodKey];
        if (!a || (a.selectableMask && a.selectableMask[idx]===false)) { toast(t('notSelectable')); return; }
        let ovalDiv = document.getElementById(`oval_${prodKey}_${idx}`);
        if (!ovalDiv) return;
        if (editingSlot === `${prodKey}_${idx}`) return;
        let width = ovalDiv.offsetWidth;
        let height = ovalDiv.offsetHeight;
        let input = document.createElement('input');
        input.type = 'number'; input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input'; input.min = MIN_PHOTO; input.max = MAX_PHOTO;
        input.style.width = `${width}px`; input.style.height = `${height}px`;
        ovalDiv.replaceWith(input); input.focus();
        let save = () => {
            let newVal = parseInt(input.value);
            input.replaceWith(ovalDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) setValue(prodKey, idx, newVal);
            else if (isNaN(newVal) && currentVal !== null) setValue(prodKey, idx, null);
        };
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });
        editingSlot = `${prodKey}_${idx}`;
    }
    function render() {
        let container = document.getElementById('app');
        if (isLoading) { container.innerHTML = `<div class="login-card"><div class="loading">⏳ ${t('loading')}</div></div>`; return; }
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card"><h3>${t('enter')}</h3><input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111"><button class="btn-primary" id="loginExec">${t('btn')}</button></div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => { let code = document.getElementById('loginCode').value.trim(); if (code === '1111') loadRandomOrder(); else toast(t('invalid')); });
            return;
        }
        let totalSlots=0, totalFilled=0;
        for (let a of Object.values(assignments)) { totalSlots += a.values.length; totalFilled += a.values.filter(v=>v!==null).length; }
        let html = `<div class="order-header"><div class="order-badge">📦 ${currentOrder.number}</div><div class="order-badge">${totalFilled}/${totalSlots}</div><button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button></div>`;
        for (let [key, asgn] of Object.entries(assignments)) {
            let name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            let poseCount = asgn.pose;
            let imageUrl = getDirectImageUrl(asgn.image);
            html += `<div class="product-card"><div class="product-content"><div class="product-header"><div class="product-info"><div><span class="product-sku">${asgn.sku || 'N/A'}</span>${asgn.isPackage ? `<span class="badge-package">📦 ${t('package')}</span>` : ''}</div><div class="product-title">${name || asgn.sku}</div><div class="product-details">${asgn.size ? `<span class="product-size">📏 ${t('size')}: ${asgn.size}</span>` : ''}<span class="product-pose">📷 ${t('pose')}: ${poseCount}</span></div></div>${imageUrl ? `<img class="product-image" src="${imageUrl}" alt="${name}" onclick="showImageModal('${imageUrl}', '${name.replace(/'/g,"\\'")}')" title="${t('viewPhoto')}">` : '<div style="width:70px;height:70px;background:#f0f0f0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#999;">No img</div>'}</div><div class="slots-row">`;
            for (let i=0; i<poseCount; i++) {
                let val = asgn.values[i];
                let isFilled = val !== null;
                let isAuto = asgn.selectableMask && asgn.selectableMask[i] === false;
                let label = (asgn.slotLabels && asgn.slotLabels[i]) ? asgn.slotLabels[i] : `Slot ${i+1}`;
                let autoNote = isAuto ? (asgn.autoLabels?.[i] || t('notSelectable')) : '';
                if (!isAuto && asgn.selectableMask[i] !== false) {
                    html += `<div class="slot-wrapper"><div id="oval_${key}_${i}" class="oval ${isFilled ? 'filled' : ''}" style="min-width:70px; height:42px;" onclick="handleOvalClick('${key}', ${i}, ${val !== null ? val : 'null'})">${isFilled ? val : ''}</div><div class="slot-label">${label}</div></div>`;
                } else {
                    html += `<div class="slot-wrapper"><div class="oval disabled" style="min-width:70px; height:42px;"></div><div class="slot-label">${label}</div><span class="auto-note">${autoNote}</span></div>`;
                }
            }
            html += `</div></div></div>`;
        }
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "═══════════════════════════\n   WHITE FOX STUDIO\n   PHOTO SELECTION\n═══════════════════════════\n";
            for (let [key, a] of Object.entries(assignments)) {
                let name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n📦 ${a.sku} — ${name}\n📏 ${t('size')}: ${a.size || '—'}  |  📷 ${t('pose')}: ${a.pose}\n`;
                for (let i=0; i<a.values.length; i++) {
                    let isAuto = a.selectableMask && a.selectableMask[i] === false;
                    let label = (a.slotLabels && a.slotLabels[i]) ? a.slotLabels[i] : `Slot ${i+1}`;
                    let autoTag = isAuto ? ` [${a.autoLabels?.[i] || 'Auto'}]` : '';
                    summary += `   ${label.padEnd(20)}: ${a.values[i] || '❌'}${autoTag}\n`;
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }
    window.handleOvalClick = handleOvalClick;
    window.showImageModal = showImageModal;
    function updateLang() {
        let iconSpan = document.getElementById('langIcon'), textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render(); else render();
    }
    document.getElementById('langBtn')?.addEventListener('click', () => { currentLang = currentLang === 'en' ? 'th' : 'en'; updateLang(); });
    document.getElementById('checkBtn')?.addEventListener('click', () => { let code = document.getElementById('orderInput').value.trim(); if (code === '1111') loadRandomOrder(); else toast(t('invalid')); });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('checkBtn')?.click(); });
    (async () => { await loadProductsFromSupabase(); render(); updateLang(); })();
</script>
