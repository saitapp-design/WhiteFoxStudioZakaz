<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio - Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        :root {
            --accent-primary: #007883;
            --accent-hover: #0a6570;
            --accent-light: rgba(0, 120, 131, 0.1);
            --accent-soft: #d9f0f2;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0, 120, 131, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-secondary);
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 3px solid var(--accent-primary);
        }

        .top-bar {
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-primary);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 0.1rem 0.1rem 0.1rem 1.5rem;
            border: 2px solid var(--accent-primary);
            height: 48px;
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            width: 250px;
            outline: none;
            font-size: 1rem;
        }

        .search-box button {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--accent-primary);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            color: var(--accent-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 48px;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 120px);
        }

        .login-screen {
            max-width: 500px;
            margin: 3rem auto;
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .login-screen h1 {
            font-size: 2rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }

        .order-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            outline: none;
            text-align: center;
            margin-bottom: 1rem;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .order-header {
            background: white;
            border-radius: 24px;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            border: 2px solid var(--accent-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .order-badge {
            background: var(--accent-soft);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .product-card {
            background: white;
            border-radius: 28px;
            margin-bottom: 1.8rem;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .product-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        .product-header {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            padding: 1.2rem 1.5rem;
            border-bottom: 2px solid var(--accent-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .product-info {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        .product-sku {
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent-primary);
            font-family: monospace;
            background: var(--accent-soft);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .product-size-badge {
            background: var(--purple);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .product-type-badge {
            background: var(--info);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
        }

        .product-stats {
            text-align: right;
        }

        .photos-counter {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .package-contents {
            background: #fefce8;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.8rem;
        }

        .assignment-grid {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.2rem;
        }

        .slot-card {
            background: #fafcff;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid var(--border-color);
        }

        .slot-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .slot-icon {
            font-size: 1.3rem;
        }

        .slot-name {
            font-weight: 700;
            color: var(--text-primary);
        }

        .size-badge {
            font-size: 0.7rem;
            background: var(--purple);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .slot-badge {
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            background: var(--accent-soft);
            color: var(--accent-primary);
        }

        .slot-badge.required {
            background: var(--accent-primary);
            color: white;
        }

        .assigned-photo-card {
            background: var(--accent-soft);
            border-radius: 16px;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .photo-number-large {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .remove-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--danger);
        }

        .photo-input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .photo-input {
            padding: 0.5rem 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 40px;
            text-align: center;
            width: 80px;
        }

        .action-btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .interior-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
            max-height: 180px;
            overflow-y: auto;
        }

        .photo-tag {
            background: var(--accent-soft);
            padding: 0.3rem 0.7rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .photo-tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--danger);
            font-weight: bold;
        }

        .status-message {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            display: inline-block;
        }

        .status-warning {
            background: #fef3c7;
            color: var(--warning);
        }

        .status-success {
            background: #d1fae5;
            color: var(--success);
        }

        .product-footer {
            padding: 1rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        .global-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border-color);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; padding: 0.8rem 1rem; }
            .right-actions { width: 100%; flex-direction: column; }
            .search-box { width: 100%; }
            .assignment-grid { grid-template-columns: 1fr; }
            .main-content { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <div class="logo-area">
                <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox Studio">
                <span class="logo-text">WHITE FOX STUDIO</span>
            </div>
            <div class="right-actions">
                <div class="search-box">
                    <input type="text" id="orderNumber" placeholder="Order number (1111)" value="1111">
                    <button id="checkOrderBtn">OK</button>
                </div>
                <button class="lang-toggle" id="langToggle">
                    <span id="lang-icon">🇬🇧</span>
                    <span id="lang-text">EN</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content" id="mainContent">
        <div class="login-screen" id="loginScreen">
            <h1 id="title">Enter Order Number</h1>
            <p class="subtitle" id="subtitle">Please enter your order number to select photos</p>
            <input type="text" id="orderNumberInput" class="order-input" placeholder="Enter order number (1111)" value="1111">
            <button class="btn-primary" id="loginBtn">Continue</button>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
        
        let supabaseClient = null;
        let allProducts = [];
        let currentOrder = null;
        let photoAssignments = {};
        let isLoading = true;
        
        const MAX_PHOTOS = 31;
        
        function validatePhotoNumber(num) {
            if (isNaN(num) || num < 1 || num > MAX_PHOTOS) {
                showToast(`Photo number must be between 1 and ${MAX_PHOTOS}`);
                return false;
            }
            return true;
        }
        
        function detectProductType(product) {
            const pose = Math.min(product.pose || 0, MAX_PHOTOS);
            
            if (product.isPackage) {
                return { type: 'package', hasCover: false, hasBack: false, hasInterior: false, label: '📦 Package' };
            }
            
            if (pose === 1) {
                return { type: 'single', hasCover: true, hasBack: false, hasInterior: false, label: '📷 Single Photo' };
            }
            
            if (pose === 2) {
                return { type: 'double', hasCover: true, hasBack: true, hasInterior: false, label: '🖼️ Double Photo' };
            }
            
            return { type: 'multi', hasCover: true, hasBack: true, hasInterior: true, label: '📚 Book / Calendar' };
        }
        
        function getInteriorCapacity(total, hasCover, hasBack) {
            let interiorCapacity = total;
            if (hasCover) interiorCapacity--;
            if (hasBack) interiorCapacity--;
            return Math.max(0, interiorCapacity);
        }
        
        function getProductSizes(variants) {
            if (!variants || variants.length === 0) return [];
            const sizes = new Set();
            variants.forEach(v => {
                if (v.size_label) sizes.add(v.size_label);
            });
            return Array.from(sizes);
        }
        
        const translations = {
            en: {
                title: 'Enter Order Number', subtitle: 'Please enter your order number to select photos',
                loginBtn: 'Continue', toastError: 'Please enter order number',
                placeholder: 'Enter order number (1111)', toastOrderLoaded: '✅ Random products loaded!',
                toastInvalidCode: 'Demo: Use code 1111', toastDuplicate: '⚠️ Photo #{num} already used',
                toastAllFilled: '✓ All slots filled!', toastConfirm: '✅ Selection saved!',
                toastInvalidNumber: `Photo number must be between 1 and ${MAX_PHOTOS}`,
                set: 'Set', randomFill: '🎲 Random', reset: 'Reset',
                confirmAll: '✅ Confirm All', backToLogin: '← Back', totalPhotos: 'Total',
                moreNeeded: 'more needed', filled: 'Complete!', packageContents: 'Package Contents:',
                cover: 'Front Cover', back: 'Back Cover', interior: 'Interior Pages',
                mainPhoto: 'Main Photo', size: 'Size'
            },
            th: {
                title: 'กรุณากรอกหมายเลขคำสั่งซื้อ', subtitle: 'กรุณากรอกหมายเลขคำสั่งซื้อเพื่อเลือกรูปภาพ',
                loginBtn: 'ดำเนินการต่อ', toastError: 'กรุณากรอกหมายเลขคำสั่งซื้อ',
                placeholder: 'กรอกหมายเลขคำสั่งซื้อ (1111)', toastOrderLoaded: '✅ โหลดสินค้าสุ่มเรียบร้อย!',
                toastInvalidCode: 'ทดสอบ: ใช้รหัส 1111', toastDuplicate: '⚠️ รูป #{num} ถูกใช้แล้ว',
                toastAllFilled: '✓ ครบทุกตำแหน่งแล้ว!', toastConfirm: '✅ บันทึกการเลือกแล้ว!',
                toastInvalidNumber: `หมายเลขรูปต้องอยู่ระหว่าง 1 ถึง ${MAX_PHOTOS}`,
                set: 'ตั้งค่า', randomFill: '🎲 สุ่ม', reset: 'รีเซ็ต',
                confirmAll: '✅ ยืนยันทั้งหมด', backToLogin: '← กลับ', totalPhotos: 'รูปทั้งหมด',
                moreNeeded: 'ต้องเลือกเพิ่ม', filled: 'ครบถ้วน!', packageContents: 'ส่วนประกอบแพ็คเกจ:',
                cover: 'ปกหน้า', back: 'ปกหลัง', interior: 'หน้าภายใน',
                mainPhoto: 'รูปหลัก', size: 'ขนาด'
            }
        };
        
        let currentLang = 'en';
        
        function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
        
        function updateLanguage() {
            if (document.getElementById('title')) {
                document.getElementById('title').textContent = translations[currentLang].title;
                document.getElementById('subtitle').textContent = translations[currentLang].subtitle;
                document.getElementById('loginBtn').textContent = translations[currentLang].loginBtn;
                document.getElementById('orderNumberInput').placeholder = translations[currentLang].placeholder;
            }
            const icon = document.getElementById('lang-icon'), text = document.getElementById('lang-text');
            icon.textContent = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
            text.textContent = currentLang === 'en' ? 'EN' : 'TH';
            if (currentOrder) renderOrderInterface();
        }
        
        async function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });
            await loadProductsFromSupabase();
            if (document.getElementById('orderNumberInput')?.value === '1111') {
                await checkOrder();
            }
        }
        
        async function loadProductsFromSupabase() {
            try {
                showToast('Loading products from database...');
                const { data: productCards } = await supabaseClient.from('product_cards').select('*');
                const { data: packages } = await supabaseClient.from('packages_with_price').select('*');
                
                allProducts = [];
                
                if (productCards) {
                    productCards.forEach(card => {
                        let pose = 0;
                        let variants = [];
                        
                        try {
                            if (card.variants) {
                                variants = typeof card.variants === 'string' ? JSON.parse(card.variants) : card.variants;
                                if (variants.length > 0 && variants[0].pose) {
                                    pose = Math.min(parseInt(variants[0].pose), MAX_PHOTOS);
                                }
                            }
                        } catch(e) {}
                        
                        if (!pose && card.pose) pose = Math.min(parseInt(card.pose), MAX_PHOTOS);
                        if (!pose && card.total_photos) pose = Math.min(parseInt(card.total_photos), MAX_PHOTOS);
                        
                        if (pose === 0) {
                            const name = (card.name_en || card.name_th || '').toLowerCase();
                            if (name.includes('calendar') && name.includes('13')) pose = 13;
                            else if (name.includes('calendar')) pose = Math.min(12, MAX_PHOTOS);
                            else if (name.includes('book') || name.includes('album') || name.includes('notebook')) pose = Math.min(10, MAX_PHOTOS);
                            else pose = 1;
                        }
                        
                        let cardSku = card.sku;
                        if (!cardSku && variants.length > 0) {
                            cardSku = variants[0].sku;
                        }
                        if (!cardSku) {
                            cardSku = card.card_id || `PROD_${Date.now()}`;
                        }
                        
                        allProducts.push({
                            id: card.card_id || `card_${cardSku}`,
                            sku: cardSku,
                            name_en: card.name_en,
                            name_th: card.name_th,
                            pose: pose,
                            isPackage: false,
                            variants: variants
                        });
                    });
                }
                
                if (packages) {
                    packages.forEach(pkg => {
                        let contents = [];
                        try {
                            if (pkg.contents) {
                                contents = typeof pkg.contents === 'string' ? JSON.parse(pkg.contents) : pkg.contents;
                            }
                        } catch(e) {}
                        
                        let totalPhotos = pkg.total_photos || 0;
                        if (!totalPhotos && contents.length) {
                            totalPhotos = contents.reduce((s, i) => s + (i.qty || 1), 0);
                        }
                        totalPhotos = Math.min(totalPhotos, MAX_PHOTOS);
                        if (totalPhotos === 0) totalPhotos = 1;
                        
                        allProducts.push({
                            id: pkg.id || `pkg_${pkg.sku}`,
                            sku: pkg.sku || pkg.slug || `PKG_${Date.now()}`,
                            name_en: pkg.name_en,
                            name_th: pkg.name_th,
                            pose: totalPhotos,
                            isPackage: true,
                            packageContents: contents,
                            variants: []
                        });
                    });
                }
                
                console.log(`✅ Loaded ${allProducts.length} products (max ${MAX_PHOTOS} photos)`);
                isLoading = false;
            } catch(e) { 
                console.error('Error loading products:', e);
                showToast('Error loading products');
                isLoading = false;
            }
        }
        
        async function checkOrder() {
            if (isLoading) {
                showToast('Loading products, please wait...');
                return;
            }
            
            const code = document.getElementById('orderNumberInput')?.value.trim() || document.getElementById('orderNumber')?.value.trim();
            if (!code) { showToast(translations[currentLang].toastError); return; }
            if (code === '1111') {
                await loadRandomOrder();
                renderOrderInterface();
                showToast(translations[currentLang].toastOrderLoaded);
            } else { showToast(translations[currentLang].toastInvalidCode); }
        }
        
        async function loadRandomOrder() {
            if (allProducts.length === 0) {
                showToast('No products found in database');
                return;
            }
            
            const numProducts = Math.min(Math.floor(Math.random() * 3) + 4, allProducts.length);
            const shuffled = [...allProducts];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            
            const selectedItems = shuffled.slice(0, numProducts);
            
            currentOrder = { number: '1111', items: selectedItems };
            photoAssignments = {};
            
            selectedItems.forEach((item, idx) => {
                const itemId = `item_${idx}_${(item.sku || Date.now()).replace(/[^a-zA-Z0-9]/g, '_')}`;
                const productType = detectProductType(item);
                const maxPose = Math.min(item.pose, MAX_PHOTOS);
                const sizes = getProductSizes(item.variants);
                const displaySize = sizes.length > 0 ? sizes[0] : null;
                
                if (item.isPackage && item.packageContents && item.packageContents.length > 0) {
                    const contentSlots = {};
                    item.packageContents.forEach(content => {
                        const qty = Math.min(content.qty || 1, maxPose);
                        const slotKey = `${content.sku || 'photo'}_${content.size || content.name_en || ''}`.replace(/[^a-zA-Z0-9]/g, '_');
                        contentSlots[slotKey] = {
                            label: `${content.name_en || content.sku || 'Photo'} ${content.size ? `(${content.size})` : ''}`,
                            required: qty,
                            assigned: []
                        };
                    });
                    
                    photoAssignments[itemId] = {
                        id: itemId,
                        sku: item.sku,
                        name: item.name_en || item.name_th || item.sku,
                        total: maxPose,
                        productType: productType,
                        isPackage: true,
                        packageContents: item.packageContents,
                        contentSlots: contentSlots,
                        variants: item.variants || [],
                        size: displaySize
                    };
                } else {
                    let displaySku = item.sku;
                    if (item.variants && item.variants.length > 0 && item.variants[0]?.sku) {
                        displaySku = item.variants[0].sku;
                    }
                    
                    photoAssignments[itemId] = {
                        id: itemId,
                        sku: displaySku,
                        originalSku: item.sku,
                        name: item.name_en || item.name_th || item.sku,
                        total: maxPose,
                        productType: productType,
                        isPackage: false,
                        variants: item.variants || [],
                        size: displaySize,
                        cover: null,
                        back: null,
                        interior: []
                    };
                }
            });
        }
        
        function isPhotoUsedInProduct(itemId, num) {
            const a = photoAssignments[itemId];
            if (!a) return false;
            if (a.cover === num) return true;
            if (a.back === num) return true;
            if (a.interior?.includes(num)) return true;
            if (a.contentSlots) {
                for (const slot of Object.values(a.contentSlots)) {
                    if (slot.assigned?.includes(num)) return true;
                }
            }
            return false;
        }
        
        function setCover(itemId, num) {
            if (!validatePhotoNumber(num)) return false;
            const a = photoAssignments[itemId];
            if (!a || a.isPackage) return false;
            if (isPhotoUsedInProduct(itemId, num)) {
                showToast(translations[currentLang].toastDuplicate.replace('{num}', num));
                return false;
            }
            a.cover = num;
            renderOrderInterface();
            return true;
        }
        
        function setBack(itemId, num) {
            if (!validatePhotoNumber(num)) return false;
            const a = photoAssignments[itemId];
            if (!a || a.isPackage) return false;
            if (a.total < 2) {
                showToast('This product does not have a back cover');
                return false;
            }
            if (isPhotoUsedInProduct(itemId, num)) {
                showToast(translations[currentLang].toastDuplicate.replace('{num}', num));
                return false;
            }
            a.back = num;
            renderOrderInterface();
            return true;
        }
        
        function addInterior(itemId, num) {
            if (!validatePhotoNumber(num)) return false;
            const a = photoAssignments[itemId];
            if (!a || a.isPackage) return false;
            if (a.total < 3) {
                showToast('This product does not have interior pages');
                return false;
            }
            if (isPhotoUsedInProduct(itemId, num)) {
                showToast(translations[currentLang].toastDuplicate.replace('{num}', num));
                return false;
            }
            const usedCount = (a.cover ? 1 : 0) + (a.back ? 1 : 0) + a.interior.length;
            if (usedCount >= a.total) { showToast(translations[currentLang].toastAllFilled); return false; }
            a.interior.push(num);
            renderOrderInterface();
            return true;
        }
        
        function addPackagePhoto(itemId, slotKey, num) {
            if (!validatePhotoNumber(num)) return false;
            const a = photoAssignments[itemId];
            if (!a || !a.contentSlots) return false;
            const slot = a.contentSlots[slotKey];
            if (!slot) return false;
            if (isPhotoUsedInProduct(itemId, num)) {
                showToast(translations[currentLang].toastDuplicate.replace('{num}', num));
                return false;
            }
            if (slot.assigned.length >= slot.required) {
                showToast(`All ${slot.required} photos for ${slot.label} are filled`);
                return false;
            }
            slot.assigned.push(num);
            renderOrderInterface();
            return true;
        }
        
        function removeCover(itemId) { const a = photoAssignments[itemId]; if (a) a.cover = null; renderOrderInterface(); }
        function removeBack(itemId) { const a = photoAssignments[itemId]; if (a) a.back = null; renderOrderInterface(); }
        function removeInterior(itemId, idx) { const a = photoAssignments[itemId]; if (a && a.interior) a.interior.splice(idx, 1); renderOrderInterface(); }
        function removePackagePhoto(itemId, slotKey, idx) { const a = photoAssignments[itemId]; if (a && a.contentSlots?.[slotKey]) a.contentSlots[slotKey].assigned.splice(idx, 1); renderOrderInterface(); }
        
        function randomFillInterior(itemId) {
            const a = photoAssignments[itemId];
            if (!a || a.isPackage) return;
            if (a.total < 3) {
                showToast('This product does not have interior pages');
                return;
            }
            
            const used = new Set();
            if (a.cover) used.add(a.cover);
            if (a.back) used.add(a.back);
            a.interior.forEach(n => used.add(n));
            
            // Interior capacity = total - (cover?1:0) - (back?1:0)
            const interiorCapacity = a.total - (a.cover ? 1 : 0) - (a.back ? 1 : 0);
            const currentInterior = a.interior.length;
            const need = interiorCapacity - currentInterior;
            
            if (need <= 0) { 
                showToast(translations[currentLang].toastAllFilled); 
                return; 
            }
            
            const available = [];
            for (let i = 1; i <= MAX_PHOTOS; i++) {
                if (!used.has(i)) available.push(i);
                if (available.length >= need) break;
            }
            
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            
            const added = available.slice(0, need);
            added.forEach(n => a.interior.push(n));
            renderOrderInterface();
            showToast(`Added ${added.length} random photos (${need} needed)`);
        }
        
        function randomFillPackage(itemId) {
            const a = photoAssignments[itemId];
            if (!a || !a.contentSlots) return;
            const used = new Set();
            for (const slot of Object.values(a.contentSlots)) slot.assigned.forEach(n => used.add(n));
            
            const available = [];
            for (let i = 1; i <= MAX_PHOTOS; i++) if (!used.has(i)) available.push(i);
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            
            let availIdx = 0;
            for (const [slotKey, slot] of Object.entries(a.contentSlots)) {
                const need = slot.required - slot.assigned.length;
                if (need > 0 && availIdx + need <= available.length) {
                    const toAdd = available.slice(availIdx, availIdx + need);
                    toAdd.forEach(n => slot.assigned.push(n));
                    availIdx += need;
                }
            }
            renderOrderInterface();
            showToast('Random photos assigned to package slots');
        }
        
        function resetProduct(itemId) {
            const a = photoAssignments[itemId];
            if (a) {
                a.cover = null;
                a.back = null;
                if (a.interior) a.interior = [];
                if (a.contentSlots) {
                    for (const slot of Object.values(a.contentSlots)) slot.assigned = [];
                }
            }
            renderOrderInterface();
        }
        
        function confirmAll() {
            const t = translations[currentLang];
            let summary = '📸 PHOTO SELECTION CONFIRMED\n\n';
            for (const [id, a] of Object.entries(photoAssignments)) {
                summary += `━━━ ${a.name} (SKU: ${a.sku}) ━━━\n`;
                if (a.size) summary += `📏 ${t.size}: ${a.size}\n`;
                summary += `📦 Type: ${a.productType.label}\n`;
                summary += `📷 Total photos: ${a.total}\n`;
                
                if (a.isPackage && a.contentSlots && Object.keys(a.contentSlots).length > 0) {
                    for (const [key, slot] of Object.entries(a.contentSlots)) {
                        summary += `📷 ${slot.label}: ${slot.assigned.length}/${slot.required} - [${slot.assigned.join(', ') || 'none'}]\n`;
                    }
                } else if (a.total === 1) {
                    summary += `📷 ${t.mainPhoto}: ${a.cover || '❌ NOT SET'}\n`;
                } else if (a.total === 2) {
                    summary += `📘 ${t.cover}: ${a.cover || '❌ NOT SET'}\n`;
                    summary += `📖 ${t.back}: ${a.back || '❌ NOT SET'}\n`;
                } else {
                    summary += `📘 ${t.cover}: ${a.cover || '❌ NOT SET'}\n`;
                    summary += `📖 ${t.back}: ${a.back || '❌ NOT SET'}\n`;
                    const interiorCount = a.total - (a.cover ? 1 : 0) - (a.back ? 1 : 0);
                    summary += `🖼️ ${t.interior}: ${a.interior.length}/${interiorCount} - [${a.interior.join(', ') || 'none'}]\n`;
                }
                summary += '\n';
            }
            alert(summary);
            showToast(translations[currentLang].toastConfirm);
        }
        
        function backToLogin() { 
            currentOrder = null; 
            document.getElementById('mainContent').innerHTML = `<div class="login-screen"><h1 id="title">${translations[currentLang].title}</h1><p class="subtitle">${translations[currentLang].subtitle}</p><input type="text" id="orderNumberInput" class="order-input" placeholder="${translations[currentLang].placeholder}" value="1111"><button class="btn-primary" id="loginBtn">${translations[currentLang].loginBtn}</button></div>`; 
            document.getElementById('loginBtn').addEventListener('click', checkOrder); 
            document.getElementById('orderNumberInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkOrder(); }); 
        }
        
        function renderOrderInterface() {
            const t = translations[currentLang];
            let totalSlots = 0, totalFilled = 0;
            let productsHtml = '';
            
            for (const [id, a] of Object.entries(photoAssignments)) {
                const safeId = id.replace(/[^a-zA-Z0-9]/g, '_');
                let used = 0;
                if (a.cover) used++;
                if (a.back) used++;
                if (a.interior) used += a.interior.length;
                if (a.contentSlots) for (const slot of Object.values(a.contentSlots)) used += slot.assigned.length;
                totalSlots += a.total;
                totalFilled += used;
                
                let packageContentsHtml = '';
                if (a.isPackage && a.contentSlots && Object.keys(a.contentSlots).length > 0) {
                    packageContentsHtml = `<div class="package-contents"><span style="font-weight:600;">${t.packageContents}</span> ${Object.values(a.contentSlots).map(s => `${s.label}: ${s.required} photo(s)`).join(' • ')}</div>`;
                }
                
                let variantSelectorHtml = '';
                if (!a.isPackage && a.variants && a.variants.length > 1) {
                    variantSelectorHtml = `
                        <div style="padding: 0 1.5rem 0 1.5rem;">
                            <select class="variant-selector" id="variant-select-${safeId}" 
                                style="width:100%; padding:0.5rem; border:2px solid var(--border-color); border-radius:12px; margin-bottom:0.5rem;">
                                ${a.variants.map((v, idx) => {
                                    let variantText = '';
                                    let variantParts = [];
                                    if (v.size_label) variantParts.push(v.size_label);
                                    if (v.pose) variantParts.push(v.pose);
                                    if (v.color) variantParts.push(v.color);
                                    variantText = variantParts.join(' / ');
                                    if (!variantText) variantText = v.sku;
                                    return `<option value="${v.sku}" data-sku="${v.sku}" data-size="${v.size_label || ''}" ${idx === 0 ? 'selected' : ''}>
                                        ${variantText}
                                    </option>`;
                                }).join('')}
                            </select>
                        </div>
                    `;
                }
                
                let slotsHtml = '';
                if (a.isPackage && a.contentSlots && Object.keys(a.contentSlots).length > 0) {
                    slotsHtml = `<div class="assignment-grid">`;
                    for (const [slotKey, slot] of Object.entries(a.contentSlots)) {
                        const slotSafe = slotKey.replace(/[^a-zA-Z0-9]/g, '_');
                        slotsHtml += `<div class="slot-card"><div class="slot-title"><span class="slot-icon">🖼️</span><span class="slot-name">${slot.label}</span><span class="size-badge">${slot.required} photo(s)</span></div>
                            <div class="multiple-inputs">
                                <div class="photo-input-wrapper"><input type="number" id="pkg-${safeId}-${slotSafe}" class="photo-input" placeholder="#" min="1" max="${MAX_PHOTOS}"><button class="action-btn" onclick="addPackageFromInput('${id}', '${slotKey}')">${t.set}</button><button class="action-btn-outline" style="margin-left:0.3rem;" onclick="randomFillPackage('${id}')">${t.randomFill}</button></div>
                                <div class="interior-list">${slot.assigned.map((num, idx) => `<div class="photo-tag">#${num}<button onclick="removePackagePhoto('${id}', '${slotKey}', ${idx})">✕</button></div>`).join('')}</div>
                                ${slot.assigned.length < slot.required ? `<div class="status-message status-warning">⚠️ ${slot.required - slot.assigned.length} ${t.moreNeeded}</div>` : `<div class="status-message status-success">✓ ${t.filled}</div>`}
                            </div></div>`;
                    }
                    slotsHtml += `</div>`;
                } else if (a.total === 1) {
                    slotsHtml = `<div class="assignment-grid"><div class="slot-card"><div class="slot-title"><span class="slot-icon">📷</span><span class="slot-name">${t.mainPhoto}</span><span class="slot-badge required">${t.required}</span></div>${a.cover ? `<div class="assigned-photo-card"><span class="photo-number-large">#${a.cover}</span><button class="remove-btn" onclick="removeCover('${id}')">✕</button></div>` : `<div class="photo-input-wrapper"><input type="number" id="cover-${safeId}" class="photo-input" placeholder="#" min="1" max="${MAX_PHOTOS}"><button class="action-btn" onclick="setCoverFromInput('${id}')">${t.set}</button></div>`}</div></div>`;
                } else if (a.total === 2) {
                    slotsHtml = `<div class="assignment-grid">
                        <div class="slot-card"><div class="slot-title"><span class="slot-icon">📘</span><span class="slot-name">${t.cover}</span><span class="slot-badge required">${t.required}</span></div>${a.cover ? `<div class="assigned-photo-card"><span class="photo-number-large">#${a.cover}</span><button class="remove-btn" onclick="removeCover('${id}')">✕</button></div>` : `<div class="photo-input-wrapper"><input type="number" id="cover-${safeId}" class="photo-input" placeholder="#" min="1" max="${MAX_PHOTOS}"><button class="action-btn" onclick="setCoverFromInput('${id}')">${t.set}</button></div>`}</div>
                        <div class="slot-card"><div class="slot-title"><span class="slot-icon">📖</span><span class="slot-name">${t.back}</span><span class="slot-badge required">${t.required}</span></div>${a.back ? `<div class="assigned-photo-card"><span class="photo-number-large">#${a.back}</span><button class="remove-btn" onclick="removeBack('${id}')">✕</button></div>` : `<div class="photo-input-wrapper"><input type="number" id="back-${safeId}" class="photo-input" placeholder="#" min="1" max="${MAX_PHOTOS}"><button class="action-btn" onclick="setBackFromInput('${id}')">${t.set}</button></div>`}</div>
                    </div>`;
                } else {
                    // For 3+ photos: total = cover + back + interior
                    const interiorCapacity = a.total - (a.cover ? 1 : 0) - (a.back ? 1 : 0);
                    slotsHtml = `<div class="assignment-grid">
                        <div class="slot-card"><div class="slot-title"><span class="slot-icon">📘</span><span class="slot-name">${t.cover}</span><span class="slot-badge required">${t.required}</span></div>${a.cover ? `<div class="assigned-photo-card"><span class="photo-number-large">#${a.cover}</span><button class="remove-btn" onclick="removeCover('${id}')">✕</button></div>` : `<div class="photo-input-wrapper"><input type="number" id="cover-${safeId}" class="photo-input" placeholder="#" min="1" max="${MAX_PHOTOS}"><button class="action-btn" onclick="setCoverFromInput('${id}')">${t.set}</button></div>`}</div>
                        <div class="slot-card"><div class="slot-title"><span class="slot-icon">📖</span><span class="slot-name">${t.back}</span><span class="slot-badge">${t.optional}</span></div>${a.back ? `<div class="assigned-photo-card"><span class="photo-number-large">#${a.back}</span><button class="remove-btn" onclick="removeBack('${id}')">✕</button></div>` : `<div class="photo-input-wrapper"><input type="number" id="back-${safeId}" class="photo-input" placeholder="#" min="1" max="${MAX_PHOTOS}"><button class="action-btn" onclick="setBackFromInput('${id}')">${t.set}</button></div>`}</div>
                        <div class="slot-card"><div class="slot-title"><span class="slot-icon">🖼️</span><span class="slot-name">${t.interior}</span><span class="slot-badge">${a.interior?.length || 0}/${interiorCapacity}</span></div>
                            <div class="photo-input-wrapper"><input type="number" id="int-${safeId}" class="photo-input" placeholder="#" min="1" max="${MAX_PHOTOS}"><button class="action-btn" onclick="addInteriorFromInput('${id}')">${t.set}</button><button class="action-btn-outline" onclick="randomFillInterior('${id}')">${t.randomFill}</button></div>
                            <div class="interior-list">${(a.interior || []).map((num, idx) => `<div class="photo-tag">#${num}<button onclick="removeInterior('${id}', ${idx})">✕</button></div>`).join('')}</div>
                            ${(a.interior?.length || 0) < interiorCapacity ? `<div class="status-message status-warning">⚠️ ${interiorCapacity - (a.interior?.length || 0)} ${t.moreNeeded}</div>` : `<div class="status-message status-success">✓ ${t.filled}</div>`}
                        </div>
                    </div>`;
                }
                
                let sizeHtml = '';
                if (a.size) {
                    sizeHtml = `<span class="product-size-badge">📏 ${t.size}: ${a.size}</span>`;
                }
                
                productsHtml += `<div class="product-card">
                    <div class="product-header">
                        <div class="product-info">
                            <span class="product-sku">${escapeHtml(a.sku)}</span>
                            <span class="product-name">${escapeHtml(a.name)}</span>
                            ${sizeHtml}
                            <span class="product-type-badge">${a.productType.label}</span>
                        </div>
                        <div class="product-stats">
                            <div class="photos-counter">${used}/${a.total}</div>
                            <div class="photos-label">${t.totalPhotos}</div>
                        </div>
                    </div>
                    ${packageContentsHtml}
                    ${variantSelectorHtml}
                    ${slotsHtml}
                    <div class="product-footer">
                        <button class="action-btn-outline" onclick="resetProduct('${id}')">🔄 ${t.reset}</button>
                    </div>
                </div>`;
            }
            
            const percent = totalSlots > 0 ? Math.round((totalFilled / totalSlots) * 100) : 0;
            document.getElementById('mainContent').innerHTML = `<div class="order-header"><div class="order-badge">📦 Order: <strong>${currentOrder.number}</strong></div><div class="order-badge">🎯 ${totalFilled}/${totalSlots} photos (${percent}%)</div><div class="order-badge">🔄 ${Object.keys(photoAssignments).length} products (max ${MAX_PHOTOS} photos)</div><button class="back-btn" id="backBtn">${t.backToLogin}</button></div>${productsHtml}<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width: auto; padding: 0.8rem 2rem;">${t.confirmAll}</button></div>`;
            document.getElementById('backBtn')?.addEventListener('click', backToLogin);
            document.getElementById('confirmBtn')?.addEventListener('click', confirmAll);
        }
        
        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        window.setCoverFromInput = function(id) { const input = document.getElementById(`cover-${id.replace(/[^a-zA-Z0-9]/g, '_')}`); if(input){ const num = parseInt(input.value); if(setCover(id, num)) input.value=''; } };
        window.setBackFromInput = function(id) { const input = document.getElementById(`back-${id.replace(/[^a-zA-Z0-9]/g, '_')}`); if(input){ const num = parseInt(input.value); if(setBack(id, num)) input.value=''; } };
        window.addInteriorFromInput = function(id) { const input = document.getElementById(`int-${id.replace(/[^a-zA-Z0-9]/g, '_')}`); if(input){ const num = parseInt(input.value); if(addInterior(id, num)) input.value=''; } };
        window.addPackageFromInput = function(id, slotKey) { const input = document.getElementById(`pkg-${id.replace(/[^a-zA-Z0-9]/g, '_')}-${slotKey.replace(/[^a-zA-Z0-9]/g, '_')}`); if(input){ const num = parseInt(input.value); if(addPackagePhoto(id, slotKey, num)) input.value=''; } };
        window.removeCover = removeCover; window.removeBack = removeBack; window.removeInterior = removeInterior; window.removePackagePhoto = removePackagePhoto;
        window.randomFillInterior = randomFillInterior; window.randomFillPackage = randomFillPackage; window.resetProduct = resetProduct;
        
        document.getElementById('langToggle').addEventListener('click', () => { currentLang = currentLang === 'en' ? 'th' : 'en'; updateLanguage(); });
        document.getElementById('checkOrderBtn').addEventListener('click', checkOrder);
        document.getElementById('orderNumber').addEventListener('keypress', e => { if (e.key === 'Enter') checkOrder(); });
        
        updateLanguage();
        initSupabase();
    </script>
</body>
</html>
