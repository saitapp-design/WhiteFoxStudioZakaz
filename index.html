<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fb;
        }

        :root {
            --teal: #007883;
            --teal-light: #e0f2f4;
            --border: #e2edf2;
            --slot-empty: #ffffff;
            --slot-filled: #d4f0e8;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            box-shadow: 0 2px 8px rgba(0,120,131,0.1);
            border-bottom: 2px solid var(--teal);
        }

        .top-bar {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-img {
            width: 38px;
            height: 38px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--teal);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            border: 2px solid var(--teal);
            height: 40px;
            overflow: hidden;
        }

        .search-box input {
            border: none;
            padding: 0 1rem;
            width: 160px;
            font-size: 0.85rem;
            outline: none;
        }

        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--teal);
            border-radius: 40px;
            padding: 0 1rem;
            height: 40px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            margin: 1rem 0;
            text-align: center;
            outline: none;
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .order-header {
            background: white;
            border-radius: 1rem;
            padding: 0.6rem 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--teal);
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--teal);
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .product-header {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .product-title {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--teal);
        }

        .product-sku {
            background: var(--teal-light);
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-size: 0.65rem;
            margin-left: 0.5rem;
        }

        .product-size {
            font-size: 0.65rem;
            color: #6c757d;
            margin-left: 0.3rem;
        }

        .badge-auto {
            background: #e9ecef;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-size: 0.6rem;
            color: #6c757d;
        }

        .slots-row {
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: flex-start;
        }

        .slot-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        .circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--slot-empty);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            color: #1e2f3a;
            cursor: pointer;
            transition: all 0.1s;
        }

        .circle.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
            color: var(--teal);
        }

        .circle.disabled {
            background: #f1f3f5;
            border-color: #dee2e6;
            cursor: default;
        }

        .circle.editable:hover {
            border-color: var(--teal);
            box-shadow: 0 0 0 2px var(--teal-light);
        }

        .circle-input {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--teal);
            background: white;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            font-family: monospace;
        }

        .circle-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 2px var(--teal-light);
        }

        .slot-number {
            font-size: 0.6rem;
            color: #8b9aab;
        }

        .auto-note {
            font-size: 0.55rem;
            color: #8b9aab;
        }

        .global-actions {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 2000;
            display: none;
        }

        @media (max-width: 600px) {
            .circle, .circle-input { width: 55px; height: 55px; font-size: 0.8rem; }
            .slots-row { gap: 0.7rem; justify-content: center; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="top-bar">
        <div class="logo-area">
            <img class="logo-img" src="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png" alt="White Fox">
            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="right-actions">
            <div class="search-box">
                <input type="text" id="orderInput" placeholder="Order number" value="1111">
                <button id="checkBtn">OK</button>
            </div>
            <button class="lang-toggle" id="langBtn">
                <span id="langIcon">🇬🇧</span>
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>

<script>
    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;

    const productsDB = [
        { article: "A11", name_en: "ACRYLIC PHOTO class logo", name_th: "โลโก้ชั้นเรียนภาพถ่ายอะคริลิค", size: "8x12", pose: 1, selectable: false },
        { article: "A12", name_en: "ACRYLIC PHOTO", name_th: "ภาพถ่ายอะคริลิค", size: "12x12", pose: 1, selectable: true },
        { article: "W11", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "10x10", pose: 1, selectable: true },
        { article: "W12", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "12x12", pose: 1, selectable: true },
        { article: "W13", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "16x16", pose: 1, selectable: true },
        { article: "W14", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "8x12", pose: 1, selectable: true },
        { article: "W15", name_en: "FLOAT FRAME individual logo", name_th: "ลอยกรอบโลโก้ส่วนบุคคล", size: "10x15", pose: 1, selectable: true },
        { article: "W16", name_en: "FLOAT FRAME design", name_th: "การออกแบบกรอบลอย", size: "12x18", pose: 3, selectable: true },
        { article: "W17", name_en: "FLOAT FRAME class logo", name_th: "เฟรมลอยโลโก้คลาส", size: "16x24", pose: 1, selectable: false },
        { article: "C11", name_en: "CANVAS", name_th: "ผ้าใบ", size: "12x18", pose: 1, selectable: true },
        { article: "C15", name_en: "CANVAS design", name_th: "การออกแบบผ้าใบ", size: "20x20", pose: 9, selectable: true },
        { article: "F12", name_en: "PHOTO COLLAGE", name_th: "ภาพตัดปะ", size: "8x12", pose: 2, selectable: true },
        { article: "B11", name_en: "INSTABOOK", name_th: "อินสตาบุ๊ค", size: "5.5x5.5", pose: 16, selectable: true },
        { article: "K11", name_en: "WALL CALENDAR", name_th: "ปฏิทินติดผนัง", size: "30x42cm", pose: 20, selectable: true },
        { article: "D12", name_en: "MUG INDIVIDUAL", name_th: "แก้วบุคคล", size: "350ml", pose: 4, selectable: true },
        { article: "Q1", name_en: "Package S", name_th: "แพ็คเกจ S", size: "6x9/4x6", pose: 6, selectable: false }
    ];

    let currentLang = 'en';
    let currentOrder = null;
    let assignments = {};
    let editingSlot = null;

    const trans = {
        en: { enter: "Enter Order Number", btn: "Continue", invalid: "Use code 1111", ok: "✓ Loaded", dup: "Photo already used", range: `Use ${MIN_PHOTO}–${MAX_PHOTO}`, saved: "✓ Confirmed", back: "← Back", filled: "filled", auto: "auto" },
        th: { enter: "กรอกหมายเลขคำสั่งซื้อ", btn: "ดำเนินการ", invalid: "ใช้รหัส 1111", ok: "✓ โหลดแล้ว", dup: "หมายเลขรูปซ้ำ", range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, saved: "✓ บันทึกแล้ว", back: "← กลับ", filled: "รูป", auto: "อัตโนมัติ" }
    };

    function t(key) { return trans[currentLang][key] || trans.en[key]; }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO; }

    function isUsedInProduct(prodKey, num, excludeIdx) {
        const a = assignments[prodKey];
        if (!a) return false;
        for (let i = 0; i < a.values.length; i++) {
            if (i !== excludeIdx && a.values[i] === num) return true;
        }
        return false;
    }

    function setValue(prodKey, idx, val) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return false;
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, val, idx)) { toast(t('dup')); return false; }
        a.values[idx] = val;
        render();
        return true;
    }

    function loadOrder() {
        const w16 = productsDB.find(p => p.article === "W16");
        const c15 = productsDB.find(p => p.article === "C15");
        const f12 = productsDB.find(p => p.article === "F12");
        const b11 = productsDB.find(p => p.article === "B11");
        const nonSel = productsDB.find(p => p.article === "A11");
        
        let selected = [w16, c15, f12, b11].filter(Boolean);
        if (nonSel && !selected.includes(nonSel)) selected.push(nonSel);
        
        const selectableOnly = productsDB.filter(p => p.selectable === true && !selected.includes(p));
        for (let i = selectableOnly.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [selectableOnly[i], selectableOnly[j]] = [selectableOnly[j], selectableOnly[i]];
        }
        selected = [...selected, ...selectableOnly.slice(0, 2)];
        
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        for (let prod of selected) {
            const key = `p_${prod.article}_${Date.now()}_${Math.random()}`;
            assignments[key] = {
                key: key,
                article: prod.article,
                nameEn: prod.name_en,
                nameTh: prod.name_th,
                size: prod.size,
                pose: prod.pose,
                selectable: prod.selectable,
                values: new Array(prod.pose).fill(null)
            };
        }
        render();
        toast(t('ok'));
    }

    function handleCircleClick(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || !a.selectable) return;
        
        const circleDiv = document.getElementById(`circle_${prodKey}_${idx}`);
        if (!circleDiv) return;
        
        if (editingSlot === `${prodKey}_${idx}`) return;
        
        const input = document.createElement('input');
        input.type = 'number';
        input.value = currentVal !== null ? currentVal : '';
        input.className = 'circle-input';
        input.min = MIN_PHOTO;
        input.max = MAX_PHOTO;
        input.style.width = `${circleDiv.offsetWidth}px`;
        input.style.height = `${circleDiv.offsetHeight}px`;
        
        circleDiv.replaceWith(input);
        input.focus();
        
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(circleDiv);
            editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) {
                setValue(prodKey, idx, newVal);
            } else if (isNaN(newVal) && currentVal !== null) {
                setValue(prodKey, idx, null);
            }
        };
        
        input.addEventListener('blur', save);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') save();
        });
        
        editingSlot = `${prodKey}_${idx}`;
    }

    function render() {
        const container = document.getElementById('app');
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card">
                <h3>${t('enter')}</h3>
                <input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111">
                <button class="btn-primary" id="loginExec">${t('btn')}</button>
            </div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => {
                const code = document.getElementById('loginCode').value.trim();
                if (code === '1111') loadOrder();
                else toast(t('invalid'));
            });
            return;
        }
        
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) {
            totalSlots += a.values.length;
            totalFilled += a.values.filter(v => v !== null).length;
        }
        
        let html = `<div class="order-header">
            <div class="order-badge">📦 ${currentOrder.number}</div>
            <div class="order-badge">${totalFilled}/${totalSlots}</div>
            <button class="order-badge" id="backBtn" style="background:white; cursor:pointer;">${t('back')}</button>
        </div>`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const poseCount = asgn.pose;
            
            html += `<div class="product-card">
                <div class="product-header">
                    <div>
                        <span class="product-title">${name || asgn.article}</span>
                        <span class="product-sku">${asgn.article}</span>
                        <span class="product-size">${asgn.size}</span>
                        ${!asgn.selectable ? `<span class="badge-auto">🔒 ${t('auto')}</span>` : ''}
                    </div>
                </div>
                <div class="slots-row">`;
            
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isFilled = val !== null;
                const circleClass = `circle ${isFilled ? 'filled' : ''} ${asgn.selectable ? 'editable' : 'disabled'}`;
                const displayText = isFilled ? val : '';
                
                if (asgn.selectable) {
                    html += `<div class="slot-circle">
                        <div id="circle_${key}_${i}" class="${circleClass}" onclick="handleCircleClick('${key}', ${i}, ${val !== null ? val : 'null'})">${displayText}</div>
                    </div>`;
                } else {
                    html += `<div class="slot-circle">
                        <div class="circle disabled"></div>
                        <div class="auto-note">${t('auto')}</div>
                    </div>`;
                }
            }
            html += `</div></div>`;
        }
        
        html += `<div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.5rem 1.5rem;">✓ ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "WHITE FOX STUDIO\n━━━━━━━━━━━━\n";
            for (let [key, a] of Object.entries(assignments)) {
                const name = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n${a.article} — ${name}\n`;
                for (let i = 0; i < a.values.length; i++) {
                    summary += `  ${i+1}: ${a.values[i] || '—'}\n`;
                }
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleCircleClick = handleCircleClick;

    function updateLang() {
        document.getElementById('langIcon').innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        document.getElementById('langText').innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render();
        else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        updateLang();
    });
    document.getElementById('checkBtn')?.addEventListener('click', () => {
        const code = document.getElementById('orderInput').value.trim();
        if (code === '1111') loadOrder();
        else toast(t('invalid'));
    });
    document.getElementById('orderInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('checkBtn')?.click();
    });

    render();
    updateLang();
</script>
</body>
</html>
