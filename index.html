<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>White Fox Studio · Photo Selection with Options</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Rh1kRjsQ/LOGOTIP-WF-new.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f0f4f9 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --teal: #007883;
            --teal-dark: #005f68;
            --teal-light: #e0f0f2;
            --teal-glow: rgba(0,120,131,0.12);
            --border: #eef2f6;
            --red: #dc2626;
            --red-light: #fee2e2;
            --slot-filled: #d1f0eb;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.08);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,120,131,0.2);
        }

        .top-bar {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0.7rem 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--teal) 0%, #00646e 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 48px;
            border: 1px solid var(--border);
            height: 44px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .search-box:focus-within {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }
        .search-box input {
            border: none;
            padding: 0 1.2rem;
            width: 180px;
            font-size: 0.9rem;
            outline: none;
            font-weight: 500;
        }
        .search-box button {
            background: var(--teal);
            border: none;
            color: white;
            padding: 0 1.4rem;
            height: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .lang-toggle {
            background: white;
            border: 1px solid var(--border);
            border-radius: 48px;
            padding: 0 1.2rem;
            height: 44px;
            font-weight: 600;
            color: var(--teal);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .main-content {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem 1.8rem;
        }

        .login-card {
            background: white;
            max-width: 420px;
            margin: 3rem auto;
            padding: 2.2rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .order-input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--border);
            border-radius: 60px;
            margin: 1.2rem 0;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }
        .order-input:focus {
            border-color: var(--teal);
        }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--teal-dark); }

        .order-header {
            background: white;
            border-radius: 1.25rem;
            padding: 0.9rem 1.5rem;
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .order-badge {
            background: var(--teal-light);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--teal);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
            align-items: start;
        }

        .product-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            height: auto;
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .product-content {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .product-header-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .sku-badge {
            background: var(--teal-light);
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--teal);
            font-family: monospace;
        }
        .product-title-compact {
            font-weight: 700;
            font-size: 1rem;
            color: var(--gray-700);
        }
        .badge-package {
            background: #ffecb3;
            padding: 0.2rem 0.65rem;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 700;
            color: #b76e0e;
            margin-left: 0.5rem;
        }

        .product-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.7rem;
            margin-top: 0.25rem;
            padding-bottom: 0.25rem;
            border-bottom: 1px dashed var(--border);
        }
        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            font-weight: 500;
            background: var(--gray-100);
            padding: 0.25rem 0.7rem;
            border-radius: 30px;
            color: var(--gray-700);
        }

        .product-image {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--gray-100);
            flex-shrink: 0;
        }
        .image-placeholder {
            width: 72px;
            height: 72px;
            background: var(--gray-100);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--gray-500);
        }

        .product-top {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }
        .product-info-main {
            flex: 1;
        }

        /* SLOTS SECTION */
        .slots-section {
            margin-top: 0.5rem;
        }
        .slot-group {
            margin-bottom: 1rem;
        }
        .slot-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gray-500);
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .slot-badge {
            background: var(--teal-light);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.6rem;
            color: var(--teal);
        }
        .slots-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
        }
        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }
        .oval {
            border-radius: 48px;
            background: white;
            border: 1.5px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            height: 42px;
            padding: 0 0.9rem;
            min-width: 68px;
        }
        .oval:hover:not(.disabled) {
            border-width: 2px;
            background: var(--teal-light);
        }
        .oval.filled {
            background: var(--slot-filled);
            border-color: var(--teal);
        }
        .oval.disabled {
            background: #f1f3f5;
            border-color: #d1d5db;
            cursor: not-allowed;
            color: #9ca3af;
        }
        .oval-input {
            border-radius: 48px;
            border: 2px solid var(--teal);
            text-align: center;
            font-weight: 600;
            height: 42px;
            padding: 0 0.7rem;
            min-width: 68px;
            outline: none;
        }
        .slot-number {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--gray-500);
        }
        .auto-note {
            font-size: 0.5rem;
            font-weight: 600;
            background: #fef3c7;
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
            color: #b76e0e;
        }

        /* OPTIONS ROW (foreground/background etc) */
        .options-row {
            margin-top: 0.8rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        .option-select {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--gray-50);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        .option-select label {
            font-weight: 600;
            color: var(--gray-700);
        }
        .option-select select {
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.25rem 0.6rem;
            font-size: 0.7rem;
            background: white;
            cursor: pointer;
            outline: none;
        }

        .global-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
        }
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a3a;
            color: white;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 2000;
            display: none;
        }
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 20px;
        }
        .loading { text-align: center; padding: 3rem; color: var(--teal); }

        @media (max-width: 680px) {
            .products-grid { grid-template-columns: 1fr; }
            .main-content { padding: 1rem; }
        }
    </style>
</head>

        <div class="logo-area">

            <span class="logo-text">WHITE FOX STUDIO</span>
        </div>
        <div class="right-actions">
            <div class="search-box">
                <input type="text" id="orderInput" placeholder="Order number" value="1111">
                <button id="checkBtn">OK</button>
            </div>
            <button class="lang-toggle" id="langBtn">
                <span id="langIcon">🇬🇧</span>
                <span id="langText">EN</span>
            </button>
        </div>

</header>
<main class="main-content" id="app"></main>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const MIN_PHOTO = 1000;
    const MAX_PHOTO = 9999;
    const SUPABASE_URL = 'https://afgzicjirrdzrotgooea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZ3ppY2ppcnJkenJvdGdvb2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjQxODYsImV4cCI6MjA4OTcwMDE4Nn0.yQMVkO6IUPsF2x2kOwzDELrlHNse-tQHYhl-rvRrc6o';
    
    let supabaseClient = null;
    let productsDB = [];
    let currentLang = 'en';
    let currentOrder = null;
    let assignments = {};

    let isLoading = true;

    // Extended product data from the table
    const EXTENDED_PRODUCTS = [
        { article: "A11", name_en: "ACRYLIC PHOTO class logo", name_th: "อะคริลิคคลาสโลโก้", size: "8x12", pose: 1, hasOptions: false, note: "group photo" },
        { article: "A12", name_en: "ACRYLIC PHOTO", name_th: "ภาพถ่ายอะคริลิค", size: "12x12", pose: 1, hasOptions: false },
        { article: "A13", name_en: "ACRYLIC PHOTO", name_th: "ภาพถ่ายอะคริลิค", size: "5x5", pose: 1, hasOptions: false },

        { article: "W11", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "10x10", pose: 1 },

        { article: "W13", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "16x16", pose: 1 },
        { article: "W14", name_en: "FLOAT FRAME", name_th: "เฟรมลอย", size: "8x12", pose: 1 },
        { article: "W15", name_en: "FLOAT FRAME individual logo", name_th: "กรอบลอยโลโก้", size: "10x15", pose: 1, hasOptions: true, optionType: "logo" },
        { article: "W16", name_en: "FLOAT FRAME design", name_th: "ออกแบบกรอบลอย", size: "12x18", pose: 3, hasOptions: true, optionType: "design" },
        { article: "C11", name_en: "CANVAS", name_th: "ผ้าใบ", size: "12x18", pose: 1 },
        { article: "C12", name_en: "CANVAS", name_th: "ผ้าใบ", size: "16x24", pose: 1 },
        { article: "C13", name_en: "CANVAS", name_th: "ผ้าใบ", size: "20x30", pose: 1 },
        { article: "C15", name_en: "CANVAS design", name_th: "ออกแบบผ้าใบ", size: "20x20", pose: 9, hasOptions: true, optionType: "design" },
        { article: "F12", name_en: "PHOTO COLLAGE", name_th: "ภาพตัดปะ", size: "8x12", pose: 2, hasOptions: true, optionType: "collage" },
        { article: "B11", name_en: "INSTABOOK", name_th: "อินสตาบุ๊ค", size: "5.5x5.5", pose: 16, hasOptions: true, optionType: "book" },
        { article: "B12", name_en: "MINI BOOK", name_th: "หนังสือขนาดเล็ก", size: "6x8", pose: 14, hasOptions: true, optionType: "book" },
        { article: "B13", name_en: "ELITE SCHOOL BOOK", name_th: "หนังสือเรียนชั้นสูง", size: "8x12", pose: 31, hasOptions: true, optionType: "book_premium" },
        { article: "K11", name_en: "WALL CALENDAR", name_th: "ปฏิทินติดผนัง", size: "30x42cm", pose: 20, hasOptions: true, optionType: "calendar" },
        { article: "S11", name_en: "SHAKING HEAD ACRYLIC STAND boy", name_th: "ขาตั้งอะคริลิค", size: "10x10cm", pose: 1, hasOptions: false },
        { article: "S12", name_en: "SHAKING HEAD ACRYLIC STAND girl", name_th: "ขาตั้งอะคริลิค", size: "10x10cm", pose: 1 },
        { article: "S13", name_en: "SHAKING HEAD teacher+student", name_th: "ขาตั้งครู+นักเรียน", size: "10x10cm", pose: 2, hasOptions: true, optionType: "portrait_pair" },
        { article: "E14", name_en: "KEYRING ALUM", name_th: "พวงกุญแจ", size: "5cm", pose: 2, hasOptions: true, optionType: "portrait_pair" },
        { article: "E15", name_en: "HAND MIRROR", name_th: "กระจกมือ", size: "7.5cm", pose: 1 },
        { article: "E16", name_en: "MINI PILLOW", name_th: "หมอนมินิ", size: "7.5x7.5cm", pose: 4, hasOptions: true, optionType: "multi_portrait" },
        // Packages
        { article: "PACKAGE-S", name_en: "Package S - Class Serious + Logo", name_th: "แพ็คเกจ S", size: "Mixed", pose: 3, isPackage: true, autoSlots: [0] },
        { article: "PACKAGE-M", name_en: "Package M - Class Serious + Sabai", name_th: "แพ็คเกจ M", size: "Mixed", pose: 4, isPackage: true, autoSlots: [0,1] },
        { article: "PACKAGE-L", name_en: "Package L - Deluxe", name_th: "แพ็คเกจ L", size: "Mixed", pose: 5, isPackage: true, autoSlots: [0,1] }
    ];

    function loadExtendedProducts() {
        return EXTENDED_PRODUCTS.map(p => ({
            id: p.article,
            sku: p.article,
            name_en: p.name_en,
            name_th: p.name_th,
            size: p.size,
            pose: p.pose,
            isPackage: p.isPackage || false,
            hasOptions: p.hasOptions || false,
            optionType: p.optionType || null,
            autoSlots: p.autoSlots || null,
            image_url: null,
            sort_product: 0
        }));
    }

    async function loadProductsFromSupabase() {
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            isLoading = true; render();
            const { data: productCardsData } = await supabaseClient.from('product_cards').select('*').maybeSingle();
            const { data: packagesData } = await supabaseClient.from('packages_with_price').select('*');
            
            let processed = [];
            if (productCardsData && productCardsData.length) {
                productCardsData.forEach(card => {
                    processed.push({
                        id: card.card_id, sku: card.sku || card.card_id,
                        name_en: card.name_en, name_th: card.name_th,
                        size: card.size, pose: card.pose || 1,
                        isPackage: false, hasOptions: false, image_url: card.cover_image
                    });
                });
            }
            if (!processed.length) processed = loadExtendedProducts();
            if (packagesData?.length) {
                packagesData.forEach(pkg => {
                    if (pkg.visible !== false) {
                        processed.push({
                            id: pkg.sku, sku: pkg.sku, name_en: pkg.name_en, name_th: pkg.name_th,
                            size: pkg.size, pose: pkg.total_photos || 3, isPackage: true,
                            autoSlots: pkg.sku?.includes('S') ? [0] : (pkg.sku?.includes('M') ? [0,1] : null),
                            image_url: pkg.image_url
                        });
                    }
                });
            }
            productsDB = processed.length ? processed : loadExtendedProducts();
            isLoading = false;
            toast(`✅ ${productsDB.length} products loaded`);
        } catch(e) {
            console.warn(e);
            productsDB = loadExtendedProducts();
            isLoading = false;
            toast(`📦 Demo mode: ${productsDB.length} items`);
        }
    }

    function loadRandomOrder() {
        if (!productsDB.length) return;
        const shuffled = [...productsDB];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const selected = shuffled.slice(0, Math.min(8, shuffled.length));
        currentOrder = { number: "1111", products: selected };
        assignments = {};
        
        for (let prod of selected) {
            const key = `${prod.isPackage ? 'pkg' : 'prd'}_${prod.sku}_${Date.now()}_${Math.random()}`;
            const poseCount = prod.pose || 1;
            let selectableMask = new Array(poseCount).fill(true);
            let autoLabels = new Array(poseCount).fill(null);
            
            if (prod.isPackage && prod.autoSlots) {
                prod.autoSlots.forEach(idx => {
                    if (idx < poseCount) { selectableMask[idx] = false; autoLabels[idx] = "Auto"; }
                });
            }
            
            assignments[key] = {
                key, sku: prod.sku, nameEn: prod.name_en, nameTh: prod.name_th,
                size: prod.size, pose: poseCount, image: prod.image_url,
                isPackage: prod.isPackage || false, hasOptions: prod.hasOptions || false,
                optionType: prod.optionType || null,
                values: new Array(poseCount).fill(null),
                selectableMask, autoLabels,
                // Additional options storage (foreground/background etc)
                extraOptions: {}
            };
        }
        render();
        toast(t('ok'));
    }

    const trans = {
        en: { enter: "Enter order number", btn: "Continue", invalid: "Use code 1111", ok: "✓ Order loaded",

        th: { enter: "กรอกเลขคำสั่งซื้อ", btn: "ดำเนินการ", invalid: "ใช้รหัส 1111", ok: "✓ โหลดแล้ว",
              dup: "⚠️ หมายเลขรูปซ้ำ", range: `ใช้ ${MIN_PHOTO}–${MAX_PHOTO}`, saved: "✓ บันทึกแล้ว",
              back: "← กลับ", notSelectable: "อัตโนมัติ", loading: "กำลังโหลด...", viewPhoto: "ดูรูป",
              size: "ขนาด", pose: "รูป", package: "แพ็คเกจ", foreground: "ภาพหน้า", background: "ภาพหลัง",
              designType: "รูปแบบดีไซน์", selectOption: "เลือก..." }
    };
    function t(key) { return trans[currentLang][key] || trans.en[key]; }
    function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 2000); }
    function isValid(n) { return !isNaN(n) && n >= MIN_PHOTO && n <= MAX_PHOTO && Number.isInteger(n); }
    function isUsedInProduct(prodKey, idx, num) { const a = assignments[prodKey]; if (!a) return false; for (let i=0; i<a.values.length; i++) if (i!==idx && a.values[i]===num) return true; return false; }

    function setValue(prodKey, idx, val) {
        const a = assignments[prodKey];
        if (!a) return false;
        if (a.selectableMask && a.selectableMask[idx] === false) { toast(t('notSelectable')); return false; }
        if (!isValid(val)) { toast(t('range')); return false; }
        if (isUsedInProduct(prodKey, idx, val)) { toast(t('dup')); return false; }
        a.values[idx] = val;
        render();
        return true;
    }

    function updateExtraOption(prodKey, optionName, value) {
        if (assignments[prodKey]) {
            assignments[prodKey].extraOptions[optionName] = value;
            toast(`✓ ${optionName}: ${value}`);
        }
    }

    function handleOvalClick(prodKey, idx, currentVal) {
        const a = assignments[prodKey];
        if (!a || (a.selectableMask && a.selectableMask[idx] === false)) { toast(t('notSelectable')); return; }
        const ovalDiv = document.getElementById(`oval_${prodKey}_${idx}`);
        if (!ovalDiv || editingSlot === `${prodKey}_${idx}`) return;
        const width = ovalDiv.offsetWidth, height = ovalDiv.offsetHeight;
        const input = document.createElement('input');
        input.type = 'number'; input.value = currentVal !== null ? currentVal : '';
        input.className = 'oval-input'; input.min = MIN_PHOTO; input.max = MAX_PHOTO;
        input.style.width = `${width}px`; input.style.height = `${height}px`;
        ovalDiv.replaceWith(input); input.focus();
        const save = () => {
            const newVal = parseInt(input.value);
            input.replaceWith(ovalDiv); editingSlot = null;
            if (!isNaN(newVal) && newVal !== currentVal) setValue(prodKey, idx, newVal);
            else if (isNaN(newVal) && currentVal !== null) setValue(prodKey, idx, null);
        };
        input.addEventListener('blur', save);
        input.addEventListener('keypress', e => { if (e.key === 'Enter') save(); });
        editingSlot = `${prodKey}_${idx}`;
    }

    function render() {
        const container = document.getElementById('app');
        if (isLoading) { container.innerHTML = `<div class="login-card"><div class="loading">⏳ ${t('loading')}</div></div>`; return; }
        if (!currentOrder) {
            container.innerHTML = `<div class="login-card"><h3>✨ ${t('enter')}</h3><input type="text" id="loginCode" class="order-input" placeholder="1111" value="1111"><button class="btn-primary" id="loginExec">${t('btn')}</button></div>`;
            document.getElementById('loginExec')?.addEventListener('click', () => { const code = document.getElementById('loginCode').value.trim(); if (code === '1111') loadRandomOrder(); else toast(t('invalid')); });
            return;
        }
        let totalSlots = 0, totalFilled = 0;
        for (let a of Object.values(assignments)) { totalSlots += a.values.length; totalFilled += a.values.filter(v => v !== null).length; }
        let html = `<div class="order-header"><div class="order-badge">📦 ORDER #${currentOrder.number}</div><div class="order-badge">📸 ${totalFilled}/${totalSlots}</div><button class="order-badge" id="backBtn" style="background:white;">${t('back')}</button></div><div class="products-grid">`;
        
        for (let [key, asgn] of Object.entries(assignments)) {
            const name = currentLang === 'en' ? asgn.nameEn : asgn.nameTh;
            const poseCount = asgn.pose;
            const hasOpt = asgn.hasOptions;
            const optionType = asgn.optionType;
            
            html += `<div class="product-card"><div class="product-content"><div class="product-top"><div class="product-info-main"><div class="product-header-row"><span class="sku-badge">🔖 ${asgn.sku}</span><div class="product-title-compact">${name || asgn.sku}${asgn.isPackage ? `<span class="badge-package">📦 ${t('package')}</span>` : ''}</div></div><div class="product-meta">${asgn.size ? `<span class="meta-item">📏 ${t('size')}: ${asgn.size}</span>` : ''}<span class="meta-item">📷 ${t('pose')}: ${poseCount}</span></div></div>${asgn.image ? `<img class="product-image" src="${asgn.image}" onerror="this.style.display='none'" onclick="showImageModal('${asgn.image}', '${name}')">` : `<div class="image-placeholder">📷</div>`}</div>`;
            
            // Slots
            html += `<div class="slots-section">`;
            for (let i = 0; i < poseCount; i++) {
                const val = asgn.values[i];
                const isAuto = asgn.selectableMask && asgn.selectableMask[i] === false;
                const autoLabel = asgn.autoLabels?.[i];
                if (!isAuto) {
                    html += `<div class="slot-group"><div class="slot-label"><span>Slot ${i+1}</span></div><div class="slots-row"><div class="slot-wrapper"><div id="oval_${key}_${i}" class="oval ${val !== null ? 'filled' : ''}" style="height:42px;" onclick="handleOvalClick('${key}', ${i}, ${val !== null ? val : 'null'})">${val !== null ? val : '___'}</div><span class="slot-number">#${i+1}</span></div></div></div>`;
                } else {
                    html += `<div class="slot-group"><div class="slot-label"><span>Slot ${i+1}</span><span class="slot-badge">🔒 ${autoLabel || t('notSelectable')}</span></div><div class="slots-row"><div class="slot-wrapper"><div class="oval disabled" style="height:42px;"></div><span class="slot-number">#${i+1}</span></div></div></div>`;
                }
            }
            html += `</div>`;
            
            // Additional options (Foreground/Background etc)
            if (hasOpt && poseCount >= 2) {
                const fgVal = asgn.extraOptions?.foreground || '';
                const bgVal = asgn.extraOptions?.background || '';
                html += `<div class="options-row"><div class="option-select"><label>🎬 ${t('foreground')}:</label><select data-key="${key}" data-opt="foreground"><option value="">${t('selectOption')}</option><option value="portrait" ${fgVal==='portrait'?'selected':''}>Portrait</option><option value="group" ${fgVal==='group'?'selected':''}>Group photo</option><option value="design" ${fgVal==='design'?'selected':''}>Design</option></select></div><div class="option-select"><label>🌄 ${t('background')}:</label><select data-key="${key}" data-opt="background"><option value="">${t('selectOption')}</option><option value="portrait" ${bgVal==='portrait'?'selected':''}>Portrait</option><option value="group" ${bgVal==='group'?'selected':''}>Group photo</option><option value="logo" ${bgVal==='logo'?'selected':''}>Logo</option></select></div></div>`;
            } else if (hasOpt && optionType === 'design') {
                html += `<div class="options-row"><div class="option-select"><label>🎨 ${t('designType')}:</label><select data-key="${key}" data-opt="design"><option value="">${t('selectOption')}</option><option value="modern">Modern</option><option value="classic">Classic</option><option value="minimal">Minimal</option></select></div></div>`;
            }
            html += `</div></div>`;
        }
        html += `</div><div class="global-actions"><button class="btn-primary" id="confirmBtn" style="width:auto; padding:0.7rem 2rem;">💾 ${t('saved')}</button></div>`;
        container.innerHTML = html;
        
        // Attach option change handlers
        document.querySelectorAll('.option-select select').forEach(select => {
            select.addEventListener('change', (e) => {
                const key = select.getAttribute('data-key');
                const opt = select.getAttribute('data-opt');
                if (key && opt) updateExtraOption(key, opt, select.value);
            });
        });
        document.getElementById('backBtn')?.addEventListener('click', () => { currentOrder = null; render(); });
        document.getElementById('confirmBtn')?.addEventListener('click', () => {
            let summary = "══════════════════\n   WHITE FOX STUDIO\n══════════════════\n";
            for (let [key,a] of Object.entries(assignments)) {
                const nm = currentLang === 'en' ? a.nameEn : a.nameTh;
                summary += `\n📦 ${a.sku} — ${nm}\n📏 ${a.size || '—'} | 📷 ${a.pose}\n`;
                for (let i=0; i<a.values.length; i++) {
                    summary += `   ${i+1}. ${a.values[i] || '❌'}`;
                    if (a.selectableMask && !a.selectableMask[i]) summary += ` [Auto]`;
                    summary += `\n`;
                }
                if (Object.keys(a.extraOptions).length) summary += `   ⚙️ Options: ${JSON.stringify(a.extraOptions)}\n`;
            }
            alert(summary);
            toast(t('saved'));
        });
    }

    window.handleOvalClick = handleOvalClick;
    window.showImageModal = (url, name) => {
        if (!url) return toast('No image');
        const modal = document.createElement('div'); modal.className = 'image-modal';
        const img = document.createElement('img'); img.src = url; img.alt = name;
        modal.appendChild(img); modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    };

    function updateLang() {
        const iconSpan = document.getElementById('langIcon'); const textSpan = document.getElementById('langText');
        if (iconSpan) iconSpan.innerText = currentLang === 'en' ? '🇬🇧' : '🇹🇭';
        if (textSpan) textSpan.innerText = currentLang === 'en' ? 'EN' : 'TH';
        if (currentOrder) render(); else render();
    }

    document.getElementById('langBtn')?.addEventListener('click', () => { currentLang = currentLang === 'en' ? 'th' : 'en'; updateLang(); });
    document.getElementById('checkBtn')?.addEventListener('click', () => { const code = document.getElementById('orderInput').value.trim(); if (code === '1111') loadRandomOrder(); else toast(t('invalid')); });
    document.getElementById('orderInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('checkBtn')?.click(); });
    (async () => { await loadProductsFromSupabase(); render(); updateLang(); })();
</script>
</body>
</html>
